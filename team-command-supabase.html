<script>
  (function(){
    var key='hg_hub_theme',media=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');
    function preference(){try{var saved=localStorage.getItem(key);if(saved==='light'||saved==='dark'||saved==='system')return saved;}catch(e){}return 'system';}
    function resolved(value){return value==='light'||value==='dark'?value:(media&&media.matches?'dark':'light');}
    function apply(value){var theme=resolved(value);document.documentElement.dataset.theme=theme;document.documentElement.style.colorScheme=theme;}
    apply(preference());window.addEventListener('message',function(event){if(!event.data||event.data.type!=='hg-theme-change')return;if(event.data.theme==='light'||event.data.theme==='dark')apply(event.data.theme);});window.addEventListener('storage',function(event){if(event.key===key)apply(preference());});
    if(media){var sync=function(){if(preference()==='system')apply('system');};if(media.addEventListener)media.addEventListener('change',sync);else if(media.addListener)media.addListener(sync);}
  })();
</script>

<style>
  :root{
    --bg:#0a0e1a; --panel:#141926; --panel2:#1c2335; --line:#2a3245;
    --ink:#ffffff; --mut:#a0a8b8; --acc:#f59e0b; --acc2:#d97706;
    --acc-soft:rgba(245,158,11,0.12);
    --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --blue:#3b82f6; --chip:#1c2335;

  }
  *{box-sizing:border-box}

    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}

    display:flex;align-items:center;gap:16px;padding:14px 22px;flex-wrap:wrap}
  .brand-block{display:flex;align-items:center;gap:14px}
  .brand-logo{width:46px;height:46px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:1.15rem;color:#0a0e1a;font-weight:900;letter-spacing:.02em}
  .brand-name{font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;line-height:1.1}
  .brand-sub{font-size:.8rem;color:var(--mut);margin-top:2px}
  header .meta-pills{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  header .mpill{background:var(--bg);border:1px solid var(--line);padding:8px 14px;border-radius:999px;
    font-size:.82rem;color:var(--mut);display:flex;align-items:center;gap:7px}

  nav{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:75px;z-index:19}
  nav button{background:transparent;border:1px solid transparent;color:var(--mut);padding:8px 15px;border-radius:10px;
    cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
  nav button.active{background:var(--acc);color:#0a0e1a}
  nav button:hover:not(.active){background:var(--panel2);color:var(--ink);border-color:var(--line)}
  main{padding:24px;max-width:1320px;margin:0 auto}
  .view{display:none}.view.active{display:block}
  h2{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;margin:0 0 16px}
  h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:var(--acc);margin:18px 0 8px;font-weight:700}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .row{display:flex;gap:14px;flex-wrap:wrap}.row>*{flex:1;min-width:150px}
  label{display:block;font-size:.82rem;color:var(--mut);margin:0 0 6px;font-weight:600}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
  textarea{resize:vertical;min-height:54px}
  button.btn{display:inline-flex;align-items:center;gap:8px;background:var(--acc);color:#0a0e1a;border:none;border-radius:10px;
    padding:11px 18px;font-weight:700;cursor:pointer;font-size:14px;font-family:inherit;transition:transform .1s,background .2s}
  button.btn:hover{background:var(--acc2)}button.btn:active{transform:translateY(1px)}
  button.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
  button.ghost:hover{background:var(--panel2);border-color:var(--acc)}
  button.sm{padding:6px 11px;font-size:12px;border-radius:8px}

  button.okbtn{background:var(--ok);color:#04240f}button.okbtn:hover{filter:brightness(1.1)}
  .muted{color:var(--mut)}

  td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:hover td{background:var(--panel2)}
  .right{text-align:right}

  .p-Completed,.p-Paid,.p-Available{background:#14432a;color:#86efac}
  .p-Scheduled,.p-Open,.p-Planned{background:#1e3a5f;color:#93c5fd}
  .p-InProgress,.p-Partial,.p-Dispatched{background:#4a3a12;color:#fcd34d}
  .p-Cancelled,.p-Void{background:var(--line);color:var(--mut)}
  .p-Unpaid{background:#374151;color:#d1d5db}
  .p-Overdue,.p-Deployed{background:#4c1d24;color:#fca5a5}

  .tag{display:inline-block;background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:11px;color:var(--mut)}

  dialog{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:var(--radius);padding:0;max-width:900px;width:95%;box-shadow:var(--shadow)}

  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .gate .card{max-width:430px;width:100%;text-align:center;padding:36px 30px}

  .msg{font-size:.86rem;margin-top:10px;min-height:20px;opacity:0;transition:opacity .2s}

<body>
<script>if(window.self!==window.top)document.body.classList.add('embedded');</script>

<!-- GATE 1 · LOGIN -->

<script>
/* ===================== AUTH (copied from transport-supabase.html) ===================== */
var sb=null, SESSION=null, IS_ADMIN=false;

function gel(id){return document.getElementById(id);}
function showMsg(id,t,ok){var m=gel(id);m.textContent=t;m.className='msg show '+(ok?'ok':'err');setTimeout(function(){m.classList.remove('show');},4500);}

async function start(){
  /* connect gate removed — same-origin hg-api */
  sb=window.hg.createClient();
  var s=await sb.auth.getSession();SESSION=s.data.session;
  sb.auth.onAuthStateChange(function(_e,session){if(!!session!==!!SESSION){SESSION=session;route();}});
  route();
}
async function route(){
  ['gateLogin','gateDenied'].forEach(function(g){gel(g).style.display='none';});
  gel('app').style.display='none';
  if(!SESSION){gel('gateLogin').style.display='flex';return;}
  var email=(SESSION.user.email||'').toLowerCase();
  var r={ data:{ email:email, is_admin:(SESSION.user.role==='admin') }, error:null };
  if(r.error){showMsg('loginMsg',r.error.message,false);gel('gateLogin').style.display='flex';return;}
  if(!r.data){gel('deniedEmail').textContent=email;gel('gateDenied').style.display='flex';return;}
  IS_ADMIN=!!r.data.is_admin;
  gel('app').style.display='block';
  DB.currentUser=email;
  gel('who').textContent=email;
  boot();
}
function signIn(){
  var email=((document.getElementById('loginEmail')||{}).value||'').trim();
  var pass=(document.getElementById('loginPass')||{}).value||'';
  if(!email||!pass){ showMsg('loginMsg','Enter email and password.', false); return; }
  sb.auth.signInWithPassword({email:email,password:pass}).then(function(r){
    if(r.error){ showMsg('loginMsg', r.error.message, false); return; }
    SESSION = r.data.session; route();
  });
}
function signOut(){sb.auth.signOut().then(function(){location.reload();});}
function ico(name){return '<i class="ui-icon" data-lucide="'+name+'" aria-hidden="true"></i>';}

/* ===================== GENERIC UI HELPERS (copied from transport-supabase.html) ===================== */
function toast(msg,kind){var t=gel('toast');t.textContent=msg;t.className=kind||'';t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},kind==='bad'?5500:2600);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function rm(n){return 'RM '+(Number(n)||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});}
function field(lbl,inner){return '<div><label>'+lbl+'</label>'+inner+'</div>';}
function stat(n,l,cls){return '<div class="stat"><div class="n '+(cls||'')+'">'+n+'</div><div class="l">'+l+'</div></div>';}
function val(id){var e=gel(id);return e?String(e.value).trim():'';}
function chk(id){var e=gel(id);return e?e.checked:false;}
function byId(arr,id){return arr.filter(function(x){return x.id===id;})[0];}
function busy(btn){if(btn){btn.disabled=true;btn.dataset.html=btn.innerHTML;btn.innerHTML='<span class="spin"></span> working&hellip;';}}
function unbusy(btn){if(btn&&btn.dataset.html){btn.disabled=false;btn.innerHTML=btn.dataset.html;}}
function openModal(t,b,f){gel('m-title').innerHTML=t;gel('m-body').innerHTML=b;gel('m-foot').innerHTML=f||'';gel('modal').showModal();initHubSelects(gel('modal'));syncHubSelects(gel('modal'));if(window.lucide)window.lucide.createIcons();}
function closeModal(){gel('modal').close();}

/* Shared HG Hub dropdown treatment (copied from transport-supabase.html). Native selects remain the source of truth. */
function closeHubSelects(except){document.querySelectorAll('.hub-select.open').forEach(function(wrap){if(wrap!==except){wrap.classList.remove('open','open-up');var trigger=wrap.querySelector('.hub-select-trigger');if(trigger)trigger.setAttribute('aria-expanded','false');}});}
function syncHubSelects(root){(root||document).querySelectorAll('select[data-hub-select]').forEach(function(select){if(select._hubSelectSync)select._hubSelectSync();});}
function initHubSelects(root){
  (root||document).querySelectorAll('select:not([data-hub-select]):not([multiple])').forEach(function(select){
    var wrap=document.createElement('div');wrap.className='hub-select';select.parentNode.insertBefore(wrap,select);wrap.appendChild(select);select.dataset.hubSelect='true';select.classList.add('hub-select-native');select.tabIndex=-1;select.setAttribute('aria-hidden','true');
    var trigger=document.createElement('button');trigger.type='button';trigger.className='hub-select-trigger';trigger.setAttribute('aria-haspopup','listbox');trigger.setAttribute('aria-expanded','false');var menu=document.createElement('div');menu.className='hub-select-menu';menu.setAttribute('role','listbox');wrap.appendChild(trigger);wrap.appendChild(menu);
    function sync(){var selected=select.options[select.selectedIndex];trigger.textContent=selected?selected.textContent:'Select';trigger.disabled=select.disabled;menu.innerHTML='';Array.prototype.forEach.call(select.options,function(option){var item=document.createElement('button');item.type='button';item.className='hub-select-option'+(option.selected?' selected':'');item.textContent=option.textContent;item.disabled=option.disabled;item.setAttribute('role','option');item.setAttribute('aria-selected',option.selected?'true':'false');item.addEventListener('click',function(event){event.stopPropagation();select.value=option.value;select.dispatchEvent(new Event('change',{bubbles:true}));closeHubSelects();});menu.appendChild(item);});}
    select._hubSelectSync=sync;select.addEventListener('change',sync);new MutationObserver(sync).observe(select,{childList:true,subtree:true,attributes:true});trigger.addEventListener('click',function(event){event.stopPropagation();var open=!wrap.classList.contains('open');closeHubSelects(wrap);sync();if(open){var rect=trigger.getBoundingClientRect(),estimated=Math.min(260,menu.children.length*44+10);wrap.classList.toggle('open-up',window.innerHeight-rect.bottom-16<estimated&&rect.top>window.innerHeight-rect.bottom);}else wrap.classList.remove('open-up');wrap.classList.toggle('open',open);trigger.setAttribute('aria-expanded',open?'true':'false');});sync();
  });
}
document.addEventListener('pointerdown',function(event){if(!event.target.closest('.hub-select'))closeHubSelects();},true);
document.addEventListener('keydown',function(event){if(event.key==='Escape')closeHubSelects();});
document.addEventListener('DOMContentLoaded',function(){initHubSelects(document);if(window.lucide)window.lucide.createIcons();new MutationObserver(function(records){records.forEach(function(record){record.addedNodes.forEach(function(node){if(node.nodeType===1)initHubSelects(node);});});}).observe(document.body,{childList:true,subtree:true});});

/* ===================== STATE / CONSTANTS ===================== */
var DB={currentUser:'',jobs:[],clients:[],sites:[],team:[],lorries:[],expenses:[],syncLog:[],settings:{},records:{}};
var MASTER_CLIENTS=null; /* canonical /api/masters/clients list; null = unavailable, fall back to tc_clients */
var TABS=[['jobs','Jobs'],['clients','Clients'],['sites','Sites'],['team','Team'],['lorries','Lorries'],['expenses','Expenses'],['records','Custom Records'],['sync','Sync Log']];
var SERVICES={scaffold:{label:'Scaffold',icon:'🏗️',color:'amber'},rorobin:{label:'Rorobin',icon:'♻️',color:'green'},storage:{label:'Storage',icon:'📦',color:'blue'},hoarding:{label:'Metal Hoarding',icon:'🧱',color:'purple'},lorry:{label:'Lorry Transport',icon:'🚛',color:'teal'},mover:{label:'Mover Service',icon:'💪',color:'pink'}};
var JOB_STATUSES=['quoted','active','completed','invoiced','paid'];
var STATUS_PILL={quoted:'Scheduled',active:'InProgress',completed:'Completed',invoiced:'Planned',paid:'Paid'};
var CLIENT_TYPES=['External','Internal (HGMR Team)','Hoarding'];
var CATEGORIES=['in-house','outsource'];
var JSON_TABLES=[['tc_scaffold_materials','Scaffold Materials','SM'],['tc_green_tag_logs','Green Tag Logs','GT'],['tc_rorobin_events','Rorobin Events','RE'],['tc_storage_reminders','Storage Reminders','SR'],['tc_hoarding_quotes','Hoarding Quotes','HQ']];
var recCurrent='tc_scaffold_materials';
var jobFilter={q:'',service:'',status:''};
var clientFilter='';

/* ===================== HELPERS ===================== */
function nowStr(){var d=new Date();function p(n){return('0'+n).slice(-2);}return d.getFullYear()+'-'+p(d.getMonth()+1)+'-'+p(d.getDate())+' '+p(d.getHours())+':'+p(d.getMinutes())+':'+p(d.getSeconds());}
function today(){return new Date().toISOString().slice(0,10);}
function fmtDate(s){if(!s)return'—';return String(s).slice(0,10);}
/* hg-api returns the _json column already deserialized to an object; older/raw rows
   may still be a JSON string. Handle both so nested serviceData/payments survive edits. */
function pj(row){if(!row||row._json==null)return {};var j=row._json;if(typeof j==='object')return j;try{return JSON.parse(j)||{};}catch(e){return {};}}
function newId(p){return p+Date.now()+Math.floor(Math.random()*1000);}
function pill(s){return '<span class="pill p-'+String(s).replace(/[^A-Za-z]/g,'')+'">'+esc(s)+'</span>';}
function opts(list,sel){return list.map(function(o){return '<option'+(String(o)===String(sel)?' selected':'')+'>'+esc(o)+'</option>';}).join('');}
function optsKV(list,sel){return list.map(function(o){return '<option value="'+esc(o[0])+'"'+(String(o[0])===String(sel)?' selected':'')+'>'+esc(o[1])+'</option>';}).join('');}
function svcLabel(k){return SERVICES[k]?SERVICES[k].label:(k||'—');}
function xlsx(rows,name){if(!window.XLSX){toast('XLSX library not loaded','bad');return;}if(!rows.length){toast('Nothing to export','bad');return;}var ws=XLSX.utils.json_to_sheet(rows);var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,name.slice(0,31));XLSX.writeFile(wb,'team-command-'+name.toLowerCase().replace(/[^a-z0-9]+/g,'-')+'-'+today()+'.xlsx');}
function toolbar(html){return '<div class="toolbar">'+html+'</div>';}

/* ===================== BOOTSTRAP ===================== */
function boot(){
  buildNav();
  try{
    gel('dateNow').textContent=new Date().toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'});
    loadBootstrap().then(renderAll).catch(function(e){gel('v-jobs').innerHTML='<div class="card card-error">'+ico('triangle-alert')+'<span>'+esc(e.message||e)+'</span></div>';if(window.lucide)window.lucide.createIcons();});
  }catch(e){gel('v-jobs').innerHTML='<div class="card card-error">'+ico('triangle-alert')+'<span>'+esc(e.message||e)+'</span></div>';}
}
function buildNav(){var n=gel('nav');n.innerHTML=TABS.map(function(t,i){return '<button data-t="'+t[0]+'"'+(i===0?' class="active"':'')+'>'+t[1]+'</button>';}).join('');
  n.querySelectorAll('button').forEach(function(b){b.onclick=function(){show(b.dataset.t);};});}
function show(t){document.querySelectorAll('nav button').forEach(function(b){b.classList.toggle('active',b.dataset.t===t);});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});gel('v-'+t).classList.add('active');window.scrollTo(0,0);}

async function loadBootstrap(){
  var res=await Promise.all([
    sb.from('tc_jobs').select('*'),
    sb.from('tc_clients').select('*'),
    sb.from('tc_sites').select('*'),
    sb.from('tc_team').select('*'),
    sb.from('tc_lorries').select('*'),
    sb.from('tc_expenses').select('*'),
    sb.from('tc_sync_log').select('*'),
    sb.from('tc_settings').select('*'),
    sb.from('tc_scaffold_materials').select('*'),
    sb.from('tc_green_tag_logs').select('*'),
    sb.from('tc_rorobin_events').select('*'),
    sb.from('tc_storage_reminders').select('*'),
    sb.from('tc_hoarding_quotes').select('*')
  ]);
  res.forEach(function(r){if(r.error)throw new Error(r.error.message);});
  DB.jobs=(res[0].data||[]).slice().sort(function(a,b){return (Number(b.no)||0)-(Number(a.no)||0);});
  DB.clients=(res[1].data||[]).slice().sort(function(a,b){return String(a.name||'').localeCompare(String(b.name||''));});
  DB.sites=res[2].data||[];
  DB.team=res[3].data||[];
  DB.lorries=res[4].data||[];
  DB.expenses=(res[5].data||[]).slice().sort(function(a,b){return String(b.date||'').localeCompare(String(a.date||''));});
  DB.syncLog=(res[6].data||[]).slice().sort(function(a,b){return String(b.timestamp||'').localeCompare(String(a.timestamp||''));});
  DB.settings={};var sr=(res[7].data||[]).filter(function(x){return x.key==='_settings';})[0];if(sr){try{DB.settings=JSON.parse(sr.value);}catch(e){}}
  DB.records={tc_scaffold_materials:res[8].data||[],tc_green_tag_logs:res[9].data||[],tc_rorobin_events:res[10].data||[],tc_storage_reminders:res[11].data||[],tc_hoarding_quotes:res[12].data||[]};
  /* Canonical shared client list from the Master Data backbone (tc_jobs stores the client NAME).
     Non-fatal: if unavailable, the job form falls back to this tool's local tc_clients list. */
  try{
    var mres=await fetch((window.HG_API_BASE||'')+'/api/masters/clients',{credentials:'include'});
    var mj=null;try{mj=await mres.json();}catch(e){}
    if(!mres.ok)throw new Error((mj&&mj.error&&mj.error.message)||('HTTP '+mres.status));
    MASTER_CLIENTS=((mj&&mj.data)||[]).slice().sort(function(a,b){return String(a.name||'').localeCompare(String(b.name||''));});
  }catch(e){MASTER_CLIENTS=null;}
}
async function reload(){await loadBootstrap();renderAll();}
function renderAll(){renderJobs();renderClients();renderSites();renderTeam();renderLorries();renderExpenses();renderRecords();renderSync();initHubSelects(document);syncHubSelects(document);if(window.lucide)window.lucide.createIcons();}

/* Generic write: keep promoted columns + refresh _json with full record; stamp user.
   Only tc_jobs actually has created_by/updated_by/updated_at columns — for every
   other table the acting user is preserved inside _json so nothing is lost, but we
   must NOT send those columns or the insert/update 400s (Unknown column). */
function saveRow(table,id,promoted,fullRecord,cb){
  var HAS_AUDIT=(table==='tc_jobs');
  fullRecord.updatedBy=DB.currentUser;
  if(!id&&!fullRecord.createdBy)fullRecord.createdBy=DB.currentUser;
  var row={};Object.keys(promoted).forEach(function(k){row[k]=promoted[k];});
  row._json=JSON.stringify(fullRecord);
  if(HAS_AUDIT){row.updated_by=DB.currentUser;row.updated_at=nowStr();}
  var q;
  if(id){q=sb.from(table).update(row).eq('id',id);}

    return '<tr><td>'+fmtDate(e.date)+'</td><td class="right"><strong>'+rm(e.amount)+'</strong></td>'+

      '<td>'+(lj?'#'+esc(lj.no)+' '+esc(lj.client_name||''):(e.linked_job_id?esc(e.linked_job_id):'—'))+'</td>'+
      '<td class="right"><button class="ghost sm" onclick="expenseForm(\''+e.id+'\')">Edit</button> <button class="danger sm" onclick="expenseDelete(\''+e.id+'\')">Del</button></td></tr>';
  }).join('');
  var total=DB.expenses.reduce(function(a,e){return a+(Number(e.amount)||0);},0);
  gel('v-expenses').innerHTML='<h2>Expenses</h2>'+
    toolbar('<button class="btn" onclick="expenseForm()">'+ico('plus')+'New Expense</button><button class="ghost" onclick="exportExpenses()">'+ico('sheet')+'Excel</button><button class="ghost" onclick="window.print()">'+ico('printer')+'Print</button>')+
    '<div class="card">'+(DB.expenses.length?'<table><thead><tr><th>Date</th><th class="right">Amount</th><th>Category</th><th>Description</th><th>Paid via</th><th>Linked job</th><th></th></tr></thead><tbody>'+tb+'</tbody></table>':'<div class="empty-state"><div><strong>No expenses</strong><span>Add one with New Expense.</span></div></div>')+'</div>'+
    (DB.expenses.length?'<div class="totbar"><span class="muted">'+DB.expenses.length+' expenses</span><span>Total</span><span class="big">'+rm(total)+'</span></div>':'');
}
function expenseForm(id){
  var e=id?byId(DB.expenses,id):null;var ex=e?pj(e):{};var d=e||{date:today(),paid_via:'Cash'};
  var cats=(DB.settings.expenseCategories||['Tipping fees','Diesel','Outsource driver','Material purchase','Repair & maintenance','Salary','Rent','Utilities','Other']);
  var pv=(DB.settings.paidViaOptions||['Cash','Bank transfer','Company card','Cheque','E-wallet','Other']);
  var jobOpts='<option value="">— none —</option>'+DB.jobs.map(function(j){return '<option value="'+esc(j.id)+'"'+(j.id===d.linked_job_id?' selected':'')+'>#'+esc(j.no)+' '+esc(j.client_name||'')+' — '+esc(svcLabel(j.service))+'</option>';}).join('');
  openModal(id?'Edit Expense':'New Expense',
    '<div class="row">'+field('Date','<input id="e-date" type="date" value="'+esc((d.date||today()).slice(0,10))+'">')+
      field('Amount (RM)','<input id="e-amount" type="number" step="0.01" value="'+esc(Number(d.amount)||0)+'">')+'</div>'+
    '<div class="row">'+field('Category','<select id="e-cat">'+opts(cats,d.category)+'</select>')+
      field('Paid via','<select id="e-pv">'+opts(pv,d.paid_via)+'</select>')+'</div>'+
    field('Description','<input id="e-desc" value="'+esc(d.description||'')+'" placeholder="What was this for?">')+
    field('Linked job (optional)','<select id="e-job">'+jobOpts+'</select>'),
    '<button class="ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="expenseSave(\''+(id||'')+'\',this)">Save expense</button>');
}
function expenseSave(id,btn){
  var desc=val('e-desc');if(!desc){toast('Description required','bad');return;}
  var e=id?byId(DB.expenses,id):null;var ex=e?pj(e):{};
  var amount=Number(val('e-amount'))||0;var linked=val('e-job');
  var full=Object.assign({},ex,{id:id||newId('E'),date:val('e-date'),amount:amount,category:val('e-cat'),description:desc,paidVia:val('e-pv'),linkedJobId:linked||''});
  var promoted={id:full.id,date:val('e-date')||null,amount:amount,category:val('e-cat'),description:desc,paid_via:val('e-pv'),linked_job_id:linked||null};
  busy(btn);saveRow('tc_expenses',id,promoted,full,function(r){if(r.error){unbusy(btn);toast(r.error.message,'bad');return;}reload().then(function(){closeModal();toast('Expense saved.','ok');});});
}
function expenseDelete(id){var e=byId(DB.expenses,id);if(!e)return;if(!confirm('Delete this expense?'))return;delRow('tc_expenses',id,function(r){if(r.error){toast(r.error.message,'bad');return;}reload().then(function(){toast('Expense deleted.','ok');});});}
function exportExpenses(){xlsx(DB.expenses.map(function(e){var lj=e.linked_job_id?byId(DB.jobs,e.linked_job_id):null;return {Date:fmtDate(e.date),'Amount (RM)':Number(e.amount)||0,Category:e.category,Description:e.description,'Paid Via':e.paid_via,'Linked Job':lj?('#'+lj.no+' '+(lj.client_name||'')):e.linked_job_id};}),'Expenses');}

/* ===================== CUSTOM RECORDS (JSON tables) ===================== */
function renderRecords(){
  var rows=DB.records[recCurrent]||[];
  var label=(JSON_TABLES.filter(function(t){return t[0]===recCurrent;})[0]||[,recCurrent])[1];
  var tb=rows.map(function(r){
    var preview=esc(String(r._json||'').slice(0,120));
    return '<tr><td><code>'+esc(r.id)+'</code></td><td class="muted" style="font-size:11px">'+esc((r.created_at||'').slice(0,19))+'</td><td style="font-family:monospace;font-size:11px">'+preview+(String(r._json||'').length>120?'&hellip;':'')+'</td>'+
      '<td class="right"><button class="ghost sm" onclick="recordForm(\''+esc(r.id)+'\')">Edit</button> <button class="danger sm" onclick="recordDelete(\''+esc(r.id)+'\')">Del</button></td></tr>';
  }).join('');
  gel('v-records').innerHTML='<h2>Custom Records</h2>'+
    '<div class="hint" style="margin-bottom:12px">'+ico('info')+' These tables store free-form records as JSON (id + _json). Edit the raw record below; new rows will render here automatically.</div>'+
    toolbar('<select id="rec-table" onchange="recCurrent=this.value;renderRecords()">'+optsKV(JSON_TABLES.map(function(t){return[t[0],t[1]];}),recCurrent)+'</select>'+
      '<button class="btn" onclick="recordForm()">'+ico('plus')+'New Record</button>')+
    '<div class="card">'+(rows.length?'<table><thead><tr><th>ID</th><th>Created</th><th>_json preview</th><th></th></tr></thead><tbody>'+tb+'</tbody></table>':'<div class="empty-state"><div><strong>No '+esc(label)+' yet</strong><span>Add one with New Record.</span></div></div>')+'</div>';
}
function recordForm(id){
  var rows=DB.records[recCurrent]||[];var r=id?byId(rows,id):null;
  var jsonStr='{\n  \n}';
  if(r){var o=pj(r);delete o.id;try{jsonStr=JSON.stringify(o,null,2);}catch(e){jsonStr=r._json||'{}';}}
  openModal(id?'Edit Record':'New Record',
    field('ID',id?'<input id="rec-id" value="'+esc(id)+'" disabled>':'<input id="rec-id" value="" placeholder="auto-generated if blank">')+
    field('Record (JSON)','<textarea id="rec-json" rows="12" style="font-family:monospace">'+esc(jsonStr)+'</textarea>')+
    '<div class="hint">'+ico('info')+' Enter a valid JSON object. It is stored in the _json column.</div>',
    '<button class="ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="recordSave(\''+(id||'')+'\',this)">Save record</button>');
}
function recordSave(id,btn){
  var raw=val('rec-json');var obj;
  try{obj=JSON.parse(raw);}catch(e){toast('Invalid JSON: '+e.message,'bad');return;}
  if(typeof obj!=='object'||Array.isArray(obj)||obj===null){toast('Record must be a JSON object','bad');return;}
  var pfx=(JSON_TABLES.filter(function(t){return t[0]===recCurrent;})[0]||[,,'R'])[2];
  var rid=id||val('rec-id')||(pfx+Date.now()+Math.floor(Math.random()*1000));
  obj.id=rid;
  var promoted={id:rid};
  busy(btn);saveRow(recCurrent,id,promoted,obj,function(r){if(r.error){unbusy(btn);toast(r.error.message,'bad');return;}reload().then(function(){closeModal();toast('Record saved.','ok');});});
}
function recordDelete(id){if(!confirm('Delete record '+id+'?'))return;delRow(recCurrent,id,function(r){if(r.error){toast(r.error.message,'bad');return;}reload().then(function(){toast('Record deleted.','ok');});});}

/* ===================== SYNC LOG (read-only) ===================== */
function renderSync(){
  var tb=DB.syncLog.map(function(l){return '<tr><td>'+esc((l.timestamp||'').replace('T',' ').slice(0,19))+'</td><td>'+esc(l.user||'—')+'</td>'+
    '<td>'+pill(l.action||'—')+'</td><td class="right">'+esc(l.job_count!=null?l.job_count:'—')+'</td><td class="right">'+esc(l.total_records!=null?l.total_records:'—')+'</td></tr>';}).join('');
  gel('v-sync').innerHTML='<h2>Sync Log</h2>'+
    '<div class="hint" style="margin-bottom:12px">'+ico('history')+' Read-only history from the original Team Command tool (newest first).</div>'+
    toolbar('<button class="ghost" onclick="exportSync()">'+ico('sheet')+'Excel</button><button class="ghost" onclick="window.print()">'+ico('printer')+'Print</button>')+
    '<div class="card">'+(DB.syncLog.length?'<table><thead><tr><th>Timestamp</th><th>User</th><th>Action</th><th class="right">Jobs</th><th class="right">Total records</th></tr></thead><tbody>'+tb+'</tbody></table>':'<div class="empty-state"><div><strong>No sync history</strong></div></div>')+'</div>';
}
function exportSync(){xlsx(DB.syncLog.map(function(l){return {Timestamp:l.timestamp,User:l.user,Action:l.action,Jobs:l.job_count,'Total Records':l.total_records};}),'Sync Log');}

start();
</script>
