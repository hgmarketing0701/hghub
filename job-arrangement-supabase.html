<script>
  (function(){
    var key='hg_hub_theme',media=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');
    function preference(){try{var saved=localStorage.getItem(key);if(saved==='light'||saved==='dark'||saved==='system')return saved;}catch(e){}return 'system';}
    function resolved(value){return value==='light'||value==='dark'?value:(media&&media.matches?'dark':'light');}
    function apply(value){var theme=resolved(value);document.documentElement.dataset.theme=theme;document.documentElement.style.colorScheme=theme;}
    apply(preference());window.addEventListener('message',function(event){if(!event.data||event.data.type!=='hg-theme-change')return;if(event.data.theme==='light'||event.data.theme==='dark')apply(event.data.theme);});window.addEventListener('storage',function(event){if(event.key===key)apply(preference());});
    if(media){var sync=function(){if(preference()==='system')apply('system');};if(media.addEventListener)media.addEventListener('change',sync);else if(media.addListener)media.addListener(sync);}
  })();
</script>

<style>
  :root{
    --bg:#0a0e1a; --panel:#141926; --panel2:#1c2335; --line:#2a3245;
    --ink:#ffffff; --mut:#a0a8b8; --acc:#f59e0b; --acc2:#d97706;
    --acc-soft:rgba(245,158,11,0.12);
    --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --blue:#3b82f6; --chip:#1c2335;

  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:var(--acc);cursor:pointer}
  header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:16px;padding:14px 22px;flex-wrap:wrap}
  .brand-block{display:flex;align-items:center;gap:14px}
  .brand-logo{width:46px;height:46px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:1.15rem;color:#0a0e1a;font-weight:900;letter-spacing:.02em}
  .brand-name{font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;line-height:1.1}
  .brand-sub{font-size:.8rem;color:var(--mut);margin-top:2px}
  header .meta-pills{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  header .mpill{background:var(--bg);border:1px solid var(--line);padding:8px 14px;border-radius:999px;
    font-size:.82rem;color:var(--mut);display:flex;align-items:center;gap:7px}
  header .mpill strong{color:var(--ink);font-weight:700}
  header .mpill button{background:none;border:none;color:var(--acc);cursor:pointer;font-size:.78rem;font-weight:700;font-family:inherit}
  nav{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:75px;z-index:19}
  nav button{background:transparent;border:1px solid transparent;color:var(--mut);padding:8px 15px;border-radius:10px;
    cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
  nav button.active{background:var(--acc);color:#0a0e1a}
  nav button:hover:not(.active){background:var(--panel2);color:var(--ink);border-color:var(--line)}
  main{padding:24px;max-width:1320px;margin:0 auto}
  .view{display:none}.view.active{display:block}
  h2{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;margin:0 0 16px}
  h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:var(--acc);margin:18px 0 8px;font-weight:700}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .row{display:flex;gap:14px;flex-wrap:wrap}.row>*{flex:1;min-width:150px}
  label{display:block;font-size:.82rem;color:var(--mut);margin:0 0 6px;font-weight:600}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
  textarea{resize:vertical;min-height:54px}
  button.btn{display:inline-flex;align-items:center;gap:8px;background:var(--acc);color:#0a0e1a;border:none;border-radius:10px;
    padding:11px 18px;font-weight:700;cursor:pointer;font-size:14px;font-family:inherit;transition:transform .1s,background .2s}
  button.btn:hover{background:var(--acc2)}button.btn:active{transform:translateY(1px)}
  button.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
  button.ghost:hover{background:var(--panel2);border-color:var(--acc)}
  button.sm{padding:6px 11px;font-size:12px;border-radius:8px}
  button.danger{background:transparent;border:1px solid var(--bad);color:#fca5a5}
  button.danger:hover{background:rgba(239,68,68,.12)}
  button.okbtn{background:var(--ok);color:#04240f}button.okbtn:hover{filter:brightness(1.1)}
  .muted{color:var(--mut)}
  table{width:100%;border-collapse:collapse;font-size:13px}

  td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:hover td{background:var(--panel2)}
  .right{text-align:right}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
  .p-Completed,.p-Paid,.p-Available{background:#14432a;color:#86efac}
  .p-Scheduled,.p-Open,.p-Planned{background:#1e3a5f;color:#93c5fd}
  .p-InProgress,.p-Partial,.p-Dispatched{background:#4a3a12;color:#fcd34d}
  .p-Cancelled,.p-Void{background:var(--line);color:var(--mut)}
  .p-Unpaid{background:#374151;color:#d1d5db}
  .p-Overdue,.p-Deployed{background:#4c1d24;color:#fca5a5}
  .p-Maintenance{background:#3a2a4a;color:#d8b4fe}
  .sv{display:inline-block;padding:2px 9px;border-radius:6px;font-size:11px;font-weight:700}
  .sv-Lorry{background:#13344a;color:#7dd3fc}.sv-Mover{background:#143a2a;color:#86efac}.sv-Rorobin{background:#4a3413;color:#fcd34d}
  .tag{display:inline-block;background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:11px;color:var(--mut)}
  .alert{display:flex;gap:10px;align-items:center;padding:9px 12px;border-radius:9px;margin-bottom:6px;font-size:13px;cursor:pointer}
  .alert.expired{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4)}
  .alert.expiring{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4)}

<script>
/* =====================================================================
   HG — Daily Job Arrangement (cPanel / hg-client edition)
   Rebuilt from Google-Apps-Script backend 13-dispatch/apps-script.gs.
   Look + auth copied from transport-supabase.html (verbatim style/gate/boot).
   Data layer swapped to hg-client (same-origin /api). No Supabase keys.

/* ===================== CONFIG / AUTH ===================== */
var sb=null, SESSION=null, IS_ADMIN=false, CUR_EMAIL='';
var SST_RATE=0.06;

function gel(id){return document.getElementById(id);}
function showMsg(id,t,ok){var m=gel(id);m.textContent=t;m.className='msg show '+(ok?'ok':'err');setTimeout(function(){m.classList.remove('show');},4500);}

async function start(){
  sb=window.hg.createClient();
  var s=await sb.auth.getSession();SESSION=s.data.session;
  sb.auth.onAuthStateChange(function(_e,session){if(!!session!==!!SESSION){SESSION=session;route();}});
  route();
}
async function route(){
  ['gateLogin','gateDenied'].forEach(function(g){gel(g).style.display='none';});
  gel('app').style.display='none';
  if(!SESSION){gel('gateLogin').style.display='flex';return;}
  var email=(SESSION.user.email||'').toLowerCase();
  IS_ADMIN=(SESSION.user.role==='admin');
  CUR_EMAIL=email;
  gel('app').style.display='block';
  gel('who').textContent=email;
  boot();
}
function signIn(){
  var email=((gel('loginEmail')||{}).value||'').trim();
  var pass=(gel('loginPass')||{}).value||'';
  if(!email||!pass){ showMsg('loginMsg','Enter email and password.', false); return; }
  sb.auth.signInWithPassword({email:email,password:pass}).then(function(r){
    if(r.error){ showMsg('loginMsg', r.error.message, false); return; }
    SESSION = r.data.session; route();
  });
}
function signOut(){sb.auth.signOut().then(function(){location.reload();});}

/* ja_audit_log: id(auto)/ts/user_email/action/details — insert only */
async function audit(action,details){
  try{await sb.from('ja_audit_log').insert({ts:new Date().toISOString(),user_email:CUR_EMAIL,action:action,details:details||''});}catch(e){}
}

/* ===================== HELPERS ===================== */
function toast(msg,kind){var t=gel('toast');t.textContent=msg;t.className=kind||'';t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},kind==='bad'?5500:2600);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function rm(n){return 'RM '+(Number(n)||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});}
function money_(n){return (Number(n)||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});}
function num_(v){return Number(v)||0;}
function round2_(n){return Math.round((Number(n)||0)*100)/100;}
function pill(s){if(!s)return '';return '<span class="pill p-'+String(s).replace(/[^A-Za-z]/g,'')+'">'+esc(s)+'</span>';}
function chip(label,s){if(!s)return '';return '<span class="pill p-'+String(s).replace(/[^A-Za-z]/g,'')+'" title="'+esc(label)+'">'+esc(label)+': '+esc(s)+'</span>';}

function val(id){var e=gel(id);return e?String(e.value).trim():'';}
function chk(id){var e=gel(id);return e?e.checked:false;}
function busy(btn){if(btn){btn.disabled=true;btn.dataset.html=btn.innerHTML;btn.innerHTML='<span class="spin"></span> working…';}}
function unbusy(btn){if(btn&&btn.dataset.html){btn.disabled=false;btn.innerHTML=btn.dataset.html;}}

/* Shared HG Hub dropdown treatment (verbatim from transport-supabase.html) */
function closeHubSelects(except){document.querySelectorAll('.hub-select.open').forEach(function(wrap){if(wrap!==except){wrap.classList.remove('open','open-up');var trigger=wrap.querySelector('.hub-select-trigger');if(trigger)trigger.setAttribute('aria-expanded','false');}});}
function syncHubSelects(root){(root||document).querySelectorAll('select[data-hub-select]').forEach(function(select){if(select._hubSelectSync)select._hubSelectSync();});}

function shiftLabel(s){var f=SHIFTS.filter(function(x){return x.v===s;})[0];return f?f.l:(s||'—');}
function shiftGroup(s){return String(s||'').toLowerCase().indexOf('night')===0?'Night':'Day';}

async function boot(){
  buildNav();
  gel('dateNow').textContent=new Date().toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'});
  try{
    await loadMasters();
    renderSchedule();
    renderWorkers();
  }catch(e){
    gel('v-sched').innerHTML='<div class="card card-error">'+ico('triangle-alert')+'<span>'+esc(e.message||e)+'</span></div>';

  }

function buildNav(){var n=gel('nav');n.innerHTML=TABS.map(function(t,i){return '<button data-t="'+t[0]+'"'+(i===0?' class="active"':'')+'>'+t[1]+'</button>';}).join('');
  n.querySelectorAll('button').forEach(function(b){b.onclick=function(){show(b.dataset.t);};});}
function show(t){document.querySelectorAll('nav button').forEach(function(b){b.classList.toggle('active',b.dataset.t===t);});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});gel('v-'+t).classList.add('active');
  if(t==='wages')renderWages();if(t==='reviews')renderReviews();window.scrollTo(0,0);}

async function loadMasters(){
  var res=await Promise.all([
    sb.from('ja_workers').select('*').order('name'),
    sb.from('ja_supervisors').select('*').order('name'),
    sb.from('ja_lorries').select('*').order('id'),
    sb.from('ja_lookups').select('*').limit(2000),
    sb.from('ja_states').select('*'),
    sb.from('ja_mall_states').select('*').limit(1000)
  ]);
  res.forEach(function(r){if(r.error)throw r.error;});
  M.workers=res[0].data||[];
  M.supervisors=res[1].data||[];
  M.lorries=res[2].data||[];
  var lk=res[3].data||[];
  M.malls=lk.filter(function(x){return x.type==='mall';}).map(function(x){return x.value;}).sort();
  M.clients=lk.filter(function(x){return x.type==='client';}).map(function(x){return x.value;}).sort();
  M.scopeFactory=lk.filter(function(x){return x.type==='scope_factory';}).map(function(x){return x.value;});
  M.scopeOnsite=lk.filter(function(x){return x.type==='scope_onsite';}).map(function(x){return x.value;});
  M.states=res[4].data||[];
  M.stateMap={};M.states.forEach(function(s){M.stateMap[s.state]=s;});
  M.mallStateRows=res[5].data||[];
  M.mallStates={};M.mallStateRows.forEach(function(m){M.mallStates[String(m.mall).toLowerCase()]=m.state;});
}

/* name lookups (mirror GAS nameMap) */
function svName(id){var s=byId(M.supervisors,id);return s?s.name:id;}
function wkName(id){var w=byId(M.workers,id);return w?w.name:id;}
function lyDetail(id){var l=byId(M.lorries,id);return l?(l.id+' - '+l.plate):id;}
function namesFrom(ids,fn){return (ids||[]).map(fn).join(', ');}

/* ============================================================
   TAB 1 · SCHEDULE — weekly board + insert-job sidebar
   ============================================================ */
var WEEK_START=null, WEEK_JOBS=[], SMART_CHECKED=false;
var SIDE_JOB=null, SIDE_SEL={sup:{},wk:{},ly:{}};
var DOW=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
var MON3=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function mondayOf(iso){var d=new Date(iso+'T00:00:00');var dow=(d.getDay()+6)%7;return addDays(iso,-dow);}
function fmtNice(iso){return Number(iso.slice(8,10))+' '+MON3[Number(iso.slice(5,7))-1]+' '+iso.slice(0,4);}
function rangeLabel(a,b){return Number(a.slice(8,10))+' '+MON3[Number(a.slice(5,7))-1]+' – '+fmtNice(b);}
function sumWorkers(list){
  // DISTINCT workers across the shift's jobs — night crews run several jobs per
  // night; counting per-job would inflate the pill (orig board counts people, not slots)
  var seen={};
  list.forEach(function(j){(parseJSON_(j.worker_ids,[])||[]).forEach(function(id){seen[id]=1;});});
  return Object.keys(seen).length;
}
function isNightShift(j){return shiftGroup(j.shift)==='Night';}

async function renderSchedule(){
  var v=gel('v-sched');
  if(!v.dataset.built){
    v.dataset.built='1';
    v.innerHTML='<h2>Schedule</h2><div class="sched-layout">'+
      '<aside class="sched-side card" id="sideForm"></aside>'+
      '<div class="sched-main">'+
        '<div class="wk-bar">'+
          '<button class="ghost sm" onclick="stepWeek(-1)" aria-label="Previous week">'+ico('chevron-left')+'</button>'+
          '<div class="wk-range" id="wkRange">—</div>'+
          '<button class="ghost sm" onclick="stepWeek(1)" aria-label="Next week">'+ico('chevron-right')+'</button>'+
          '<button class="ghost sm" onclick="goThisWeek()">Today</button>'+
          '<button class="btn sm wk-wa" onclick="waRoster(this)">📱 Today&#39;s Roster · WhatsApp</button>'+
        '</div>'+
        '<div id="wkNotice"></div>'+

      '</div></div>';

    if(window.lucide)window.lucide.createIcons();
  }
  WEEK_START=mondayOf(CUR_DATE||todayISO());
  await loadWeek();
}
function stepWeek(n){WEEK_START=addDays(WEEK_START,n*7);loadWeek();}
function goThisWeek(){WEEK_START=mondayOf(todayISO());loadWeek();}

async function loadWeek(){
  var end=addDays(WEEK_START,6);
  gel('wkRange').textContent=rangeLabel(WEEK_START,end);
  gel('wkGrid').innerHTML='<div class="card" style="grid-column:1/-1"><span class="spin"></span> Loading week…</div>';
  var r=await sb.from('ja_jobs').select('*').gte('date',WEEK_START).lte('date',end).order('date').limit(500);
  if(r.error){gel('wkGrid').innerHTML='<div class="card card-error" style="grid-column:1/-1">'+ico('triangle-alert')+'<span>'+esc(r.error.message)+'</span></div>';if(window.lucide)window.lucide.createIcons();return;}
  WEEK_JOBS=(r.data||[]).map(function(j){j.date=String(j.date||'').slice(0,10);return j;});
  if(!WEEK_JOBS.length&&!SMART_CHECKED){
    SMART_CHECKED=true;
    var last=await sb.from('ja_jobs').select('date').order('date',{ascending:false}).limit(1);
    var latest=last.data&&last.data[0]&&String(last.data[0].date||'').slice(0,10);
    if(latest&&mondayOf(latest)!==WEEK_START){
      WEEK_START=mondayOf(latest);
      gel('wkNotice').innerHTML='<div class="wk-notice">'+ico('info')+'<span>No jobs this week yet — showing latest scheduled week (data imported up to '+esc(fmtNice(latest))+'). New jobs you insert here are saved to the new database.</span><button onclick="this.parentNode.remove()" aria-label="Dismiss">×</button></div>';
      if(window.lucide)window.lucide.createIcons();
      return loadWeek();
    }
  }
  SMART_CHECKED=true;
  renderWeekGrid();
}
function renderWeekGrid(){
  var html='',today=todayISO();
  for(var i=0;i<7;i++){
    var iso=addDays(WEEK_START,i);
    var jobs=WEEK_JOBS.filter(function(j){return j.date===iso;});
    var day=jobs.filter(function(j){return !isNightShift(j);});
    var night=jobs.filter(isNightShift);
    var dW=sumWorkers(day),nW=sumWorkers(night);
    html+='<div class="wk-col'+(iso===today?' today':'')+'">'+
      '<div class="wk-colhead"><span class="wk-dow">'+DOW[i]+'</span><span class="wk-dnum">'+Number(iso.slice(8,10))+'</span><span class="wk-cnt">'+jobs.length+' job'+(jobs.length===1?'':'s')+'</span></div>'+
      (dW?'<div class="wk-shiftpill day">DAY · '+dW+' worker'+(dW===1?'':'s')+'</div>':'')+
      (nW?'<div class="wk-shiftpill night">NIGHT · '+nW+' worker'+(nW===1?'':'s')+'</div>':'')+
      day.map(wkCard).join('')+night.map(wkCard).join('')+
    '</div>';
  }
  gel('wkGrid').innerHTML=html;
  if(window.lucide)window.lucide.createIcons();
}
function wkCard(j){
  var night=isNightShift(j);
  var trim=function(s){return String(s).trim();};
  var sup=String(j.supervisor_names||'').split(',').map(trim).filter(Boolean);
  var lys=String(j.lorry_details||'').split(',').map(trim).filter(Boolean);
  var wn=(parseJSON_(j.worker_ids,[])||[]).length;
  var chips=sup.map(function(s){return '<span class="wk-chip sv">'+esc(s)+'</span>';}).join('')+
    lys.map(function(l){return '<span class="wk-chip ly">'+esc(l)+'</span>';}).join('')+
    (wn?'<span class="wk-chip wk">+'+wn+' worker'+(wn===1?'':'s')+'</span>':'');
  return '<div class="wk-card'+(night?' night':'')+'" onclick="sideLoad(\''+esc(j.id)+'\')">'+
    '<div class="wk-lbl">'+esc(shiftLabel(j.shift)).toUpperCase()+'</div>'+
    '<div class="wk-title">'+esc(j.scope||j.title||'Job')+'</div>'+
    (j.mall?'<div class="wk-line">Mall: '+esc(j.mall)+'</div>':'')+
    (j.lot?'<div class="wk-line">Lot: '+esc(j.lot)+'</div>':'')+
    (j.time?'<div class="wk-line">'+esc(j.time)+'</div>':'')+
    (chips?'<div class="wk-chips">'+chips+'</div>':'')+
  '</div>';
}

/* ---------- WhatsApp roster ---------- */
async function waRoster(btn){
  busy(btn);
  var r=await sb.from('ja_jobs').select('*').eq('date',todayISO()).order('shift').limit(200);
  unbusy(btn);
  if(r.error){toast(r.error.message,'bad');return;}
  var jobs=r.data||[];
  if(!jobs.length){toast('No jobs scheduled today.','bad');return;}
  var d=new Date();
  var lines=['*HG Job Arrangement — '+d.toLocaleDateString('en-MY',{weekday:'short',day:'numeric',month:'short',year:'numeric'})+'*'];
  [['Day','DAY SHIFT'],['Night','NIGHT SHIFT']].forEach(function(g){
    var list=jobs.filter(function(j){return shiftGroup(j.shift)===g[0];});
    if(!list.length)return;
    lines.push('','*'+g[1]+'*');
    list.forEach(function(j,i){
      var wn=(parseJSON_(j.worker_ids,[])||[]).length;
      lines.push((i+1)+'. '+[j.time,j.scope||j.title,j.mall,j.lot?'Lot '+j.lot:''].filter(Boolean).join(' · '));
      lines.push('   SV: '+(j.supervisor_names||'—')+' · '+wn+' worker'+(wn===1?'':'s'));
    });
  });
  window.open('https://wa.me/?text='+encodeURIComponent(lines.join('\n')),'_blank');
}

function refreshSideMasters(){
  if(!gel('sideForm'))return;
  gel('dl-side-client').innerHTML=dataOpts(M.clients);
  gel('dl-side-mall').innerHTML=dataOpts(M.malls);
  var st=gel('if-state'),cur=st.value;
  st.innerHTML=selOpts(M.states.map(function(s){return s.state;}),cur,'— select state —');
  updateScopeOptions();
  renderSupChips();renderWkChips();renderLyChips();
  syncHubSelects(gel('sideForm'));
}
function updateScopeOptions(desired){
  var sel=gel('if-scope');if(!sel)return;
  if(desired===undefined)desired=sel.value;
  var shift=(gel('if-shift')||{}).value||'';
  var list=(shift.indexOf('factory')>=0?M.scopeFactory:M.scopeOnsite).slice();
  if(desired&&list.indexOf(desired)<0)list.unshift(desired);
  sel.innerHTML=selOpts(list,desired,'— select scope —');
}
function updateStateHint(){
  var el=gel('if-stateHint');if(!el)return;
  var s=val('if-state');
  if(!s){el.textContent='Pick a state to see worker multipliers and incentive rates.';return;}
  var r=M.stateMap[s]||{};
  el.innerHTML='<b>'+esc(s)+'</b>: Worker = base ×'+num_(r.wk_mult||1)+' + RM'+num_(r.wk_allow||0)+
    ' · In-house incentive RM'+num_(r.inhouse_inc||0)+'/shift · Outsource RM'+num_(r.outsource_rate||0)+'/shift';
}
function sideAutoState(){
  var st=M.mallStates[val('if-mall').toLowerCase()];
  if(st){setSelectValue(gel('if-state'),st);syncHubSelects(gel('sideForm'));updateStateHint();}
}
function setSelectValue(sel,value,label){
  if(!sel)return;
  if(value&&!Array.prototype.some.call(sel.options,function(o){return o.value===String(value);})){
    var o=document.createElement('option');o.value=value;o.textContent=label||value;sel.appendChild(o);
  }
  sel.value=value||'';
}

/* chip multi-selects */
function chipBtn(kind,id,label){return '<button type="button" class="mchip'+(SIDE_SEL[kind][id]?' on':'')+'" onclick="toggleChip(\''+kind+'\',\''+esc(id)+'\',this)">'+esc(label)+'</button>';}
function renderSupChips(){var el=gel('if-supChips');if(!el)return;el.innerHTML=M.supervisors.map(function(s){return chipBtn('sup',s.id,s.name);}).join('')||'<span class="hint">None on file.</span>';updCounts();}
function renderWkChips(){var el=gel('if-wkChips');if(!el)return;var f=val('if-wkFilter').toLowerCase();
  var list=M.workers.filter(function(w){return !f||String(w.name).toLowerCase().indexOf(f)>=0||String(w.team||'').toLowerCase().indexOf(f)>=0;});
  el.innerHTML=list.map(function(w){return chipBtn('wk',w.id,w.name);}).join('')||'<span class="hint">No match.</span>';updCounts();}
function renderLyChips(){var el=gel('if-lyChips');if(!el)return;el.innerHTML=M.lorries.map(function(l){return chipBtn('ly',l.id,l.plate);}).join('')||'<span class="hint">None on file.</span>';updCounts();}
function toggleChip(kind,id,btn){
  if(SIDE_SEL[kind][id])delete SIDE_SEL[kind][id];else SIDE_SEL[kind][id]=1;
  if(btn)btn.classList.toggle('on',!!SIDE_SEL[kind][id]);
  updCounts();
}
function clearSel(kind){SIDE_SEL[kind]={};if(kind==='sup')renderSupChips();else if(kind==='wk')renderWkChips();else renderLyChips();}
function updCounts(){
  if(!gel('if-supCount'))return;
  gel('if-supCount').textContent=Object.keys(SIDE_SEL.sup).length+' selected';
  gel('if-wkCount').textContent=Object.keys(SIDE_SEL.wk).length+' / '+M.workers.length+' selected';
  gel('if-lyCount').textContent=Object.keys(SIDE_SEL.ly).length+' selected';
}
function selIds(kind,arr){return arr.filter(function(x){return SIDE_SEL[kind][x.id];}).map(function(x){return x.id;});}

/* load a board card into the sidebar */
function sideLoad(id){
  var j=null;
  for(var i=0;i<WEEK_JOBS.length;i++)if(String(WEEK_JOBS[i].id)===String(id)){j=WEEK_JOBS[i];break;}
  if(!j)return;
  SIDE_JOB=j;
  gel('if-client').value=j.client||'';
  setSelectValue(gel('if-shift'),j.shift||'day-inst',shiftLabel(j.shift));
  updateScopeOptions(j.scope||'');
  setSelectValue(gel('if-state'),j.state||'');
  gel('if-mall').value=j.mall||'';
  gel('if-lot').value=j.lot||'';
  gel('if-date').value=String(j.date||todayISO()).slice(0,10);
  gel('if-time').value='';
  try{gel('if-time').value=String(j.time||'').slice(0,5);}catch(e){}
  SIDE_SEL={sup:{},wk:{},ly:{}};
  (parseJSON_(j.supervisor_ids,[])||[]).forEach(function(x){SIDE_SEL.sup[x]=1;});
  (parseJSON_(j.worker_ids,[])||[]).forEach(function(x){SIDE_SEL.wk[x]=1;});
  (parseJSON_(j.lorry_ids,[])||[]).forEach(function(x){SIDE_SEL.ly[x]=1;});
  renderSupChips();renderWkChips();renderLyChips();
  updateStateHint();
  syncHubSelects(gel('sideForm'));
  setSideMode(true);
  if(window.innerWidth<980)gel('sideForm').scrollIntoView({behavior:'smooth'});
}
function setSideMode(editing){
  gel('sideTitle').innerHTML=(editing?ico('pencil')+' Edit Job':ico('plus')+' Insert Job');
  gel('if-saveBtn').innerHTML=(editing?ico('save')+' Update Job':ico('plus')+' Insert Job');
  gel('if-detailsBtn').style.display=editing?'':'none';
  gel('if-newBtn').style.display=editing?'':'none';
  if(window.lucide)window.lucide.createIcons();
}
function sideReset(){
  SIDE_JOB=null;SIDE_SEL={sup:{},wk:{},ly:{}};
  ['if-client','if-mall','if-lot','if-wkFilter'].forEach(function(id){var e=gel(id);if(e)e.value='';});
  gel('if-date').value=todayISO();gel('if-time').value='09:00';
  gel('if-shift').value='day-inst';
  updateScopeOptions('');
  gel('if-state').value='';
  renderSupChips();renderWkChips();renderLyChips();
  updateStateHint();
  syncHubSelects(gel('sideForm'));
  setSideMode(false);
}
/* save basic fields; on update all other columns are preserved (partial update) */
async function sideSave(btn){
  var date=val('if-date');
  if(!date){toast('Date is required.','bad');return;}
  var supIds=selIds('sup',M.supervisors),wkIds=selIds('wk',M.workers),lyIds=selIds('ly',M.lorries);
  var time=val('if-time');
  if(!time&&SIDE_JOB&&SIDE_JOB.time)time=SIDE_JOB.time; /* keep odd formats like 2200-0600 */
  var rec={client:val('if-client'),shift:val('if-shift'),scope:val('if-scope'),state:val('if-state'),
    mall:val('if-mall'),lot:val('if-lot'),date:date,time:time,
    supervisor_ids:supIds,worker_ids:wkIds,lorry_ids:lyIds,
    supervisor_names:namesFrom(supIds,svName),worker_names:namesFrom(wkIds,wkName),lorry_details:namesFrom(lyIds,lyDetail),
    updated_at:esNow()};
  busy(btn);var res,isNew=!SIDE_JOB;
  if(SIDE_JOB){
    res=await sb.from('ja_jobs').update(rec).eq('id',SIDE_JOB.id);
  }else{
    rec.id='job_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    rec.created_at=esNow();
    rec.worker_times={};rec.line_items=[];rec.has_tax=0;
    rec.invoice_status='Pending';rec.wage_status='Pending';rec.incentive_status='Pending';rec.allow_status='Pending';rec.cidb_status='Pending';
    res=await sb.from('ja_jobs').insert(rec);
  }
  unbusy(btn);
  if(res.error){toast(res.error.message,'bad');return;}
  audit(isNew?'Job inserted':'Job edited',date+' · '+(rec.scope||'Job')+(rec.mall?' @ '+rec.mall:''));
  toast(isNew?'Job inserted.':'Job updated.','ok');
  if(isNew)SIDE_JOB=rec;else for(var k in rec)SIDE_JOB[k]=rec[k];
  CUR_DATE=date;WEEK_START=mondayOf(date);
  gel('wkNotice').innerHTML='';
  await loadWeek();
  for(var i=0;i<WEEK_JOBS.length;i++)if(String(WEEK_JOBS[i].id)===String(SIDE_JOB.id))SIDE_JOB=WEEK_JOBS[i];
  setSideMode(true);
}

/* ---------- lookup list editor (ja_lookups) ---------- */
var LK={type:'',title:'',list:[]};
function editLookupList(type,title){
  LK.type=type;LK.title=title;
  LK.list=(type==='client'?M.clients:M.malls).slice();
  var rows=LK.list.map(function(v,i){return '<tr><td>'+esc(v)+'</td><td class="right"><button class="danger sm" onclick="delLookup('+i+',this)">Remove</button></td></tr>';}).join('');
  openModal2('Edit '+esc(title),
    '<div class="side-row" style="margin-bottom:10px"><input id="lk-new" placeholder="Add new value…" onkeydown="if(event.key===\'Enter\')addLookup(this)"><button class="btn sm" onclick="addLookup(this)">Add</button></div>'+
    '<table style="min-width:0"><thead><tr><th>Value</th><th></th></tr></thead><tbody>'+(rows||'<tr><td colspan="2" class="muted">None yet.</td></tr>')+'</tbody></table>',
    '<button class="ghost" onclick="closeModal2()">Done</button>');
}
async function addLookup(btn){
  var v=val('lk-new');
  if(!v){toast('Enter a value.','bad');return;}
  busy(btn);
  var r=await sb.from('ja_lookups').insert({type:LK.type,value:v});
  unbusy(btn);
  if(r.error){toast(r.error.message,'bad');return;}
  audit('Lookup added',LK.type+' · '+v);
  await loadMasters();refreshSideMasters();
  editLookupList(LK.type,LK.title);toast('Added.','ok');
}
async function delLookup(i,btn){
  var v=LK.list[i];
  if(!confirm('Remove "'+v+'" from the '+LK.title+'?'))return;
  busy(btn);
  var r=await sb.from('ja_lookups').delete().eq('type',LK.type).eq('value',v);
  unbusy(btn);
  if(r.error){toast(r.error.message,'bad');return;}
  audit('Lookup removed',LK.type+' · '+v);
  await loadMasters();refreshSideMasters();
  editLookupList(LK.type,LK.title);toast('Removed.','ok');
}

function multiChecklist(id,items,idKey,labelFn,selected,subFn){
  var sel={};(selected||[]).forEach(function(x){sel[x]=1;});
  return '<div class="checklist" id="'+id+'">'+items.map(function(it){
    var v=it[idKey];
    return '<label><input type="checkbox" value="'+esc(v)+'"'+(sel[v]?' checked':'')+'>'+esc(labelFn(it))+(subFn?'<span class="clsub">'+esc(subFn(it))+'</span>':'')+'</label>';
  }).join('')+(items.length?'':'<div class="hint">None on file.</div>')+'</div>';
}
function checklistValues(id){var el=gel(id);if(!el)return [];return Array.prototype.slice.call(el.querySelectorAll('input:checked')).map(function(c){return c.value;});}

function autoState(){var mall=val('jf-mall').toLowerCase();var st=M.mallStates[mall];if(st){var sel=gel('jf-state');if(sel){sel.value=st;sel.dispatchEvent(new Event('change',{bubbles:true}));}}}
function calcTotals(){
  var sub=0;CHARGE_FIELDS.forEach(function(c){sub+=num_(val('jf-'+c[0]));});
  sub-=num_(val('jf-discount'));
  var sst=chk('jf-hastax')?round2_(sub*SST_RATE):0;
  gel('jf-sub').textContent=rm(sub);gel('jf-sst').textContent=rm(sst);gel('jf-total').textContent=rm(sub+sst);
}
function liRow(li){li=li||{};return '<div class="li-row"><input placeholder="Description" data-li="desc" value="'+esc(li.desc||li.description||'')+'"><input type="number" step="0.01" placeholder="Qty" data-li="qty" value="'+esc(li.qty||'')+'"><input type="number" step="0.01" placeholder="Amount" data-li="amount" value="'+esc(li.amount||'')+'"><button class="li-x" onclick="this.parentNode.remove()">×</button></div>';}
function addLi(){var d=document.createElement('div');d.innerHTML=liRow({});gel('jf-li').appendChild(d.firstChild);}
function collectLineItems(){return Array.prototype.slice.call(document.querySelectorAll('#jf-li .li-row')).map(function(row){var o={};row.querySelectorAll('[data-li]').forEach(function(i){o[i.dataset.li]=i.dataset.li==='desc'?i.value:num_(i.value);});return o;}).filter(function(o){return o.desc||o.amount;});}

async function saveJob(id,btn){
  var supIds=checklistValues('jf-sup');
  var wkIds=checklistValues('jf-wk');
  var lyIds=checklistValues('jf-ly');
  var now=esNow();
  var rec={
    title:val('jf-title'),client:val('jf-client'),mall:val('jf-mall'),lot:val('jf-lot'),
    state:val('jf-state'),scope:val('jf-scope'),shift:val('jf-shift'),hoarding_size:val('jf-hsize'),
    date:val('jf-date'),time:val('jf-time'),client_reg_no:val('jf-regno'),client_address:val('jf-caddr'),
    /* JSON columns — pass arrays/objects; the hg-client shim serialises the body */
    supervisor_ids:supIds,worker_ids:wkIds,lorry_ids:lyIds,worker_times:parseJSON_(null,{})||{},
    line_items:collectLineItems(),
    supervisor_names:namesFrom(supIds,svName),
    worker_names:namesFrom(wkIds,wkName),
    lorry_details:namesFrom(lyIds,lyDetail),
    discount:num_(val('jf-discount')),has_tax:chk('jf-hastax')?1:0,
    po:val('jf-po'),quotation_no:val('jf-quo'),invoice_no:val('jf-invno'),invoice_status:val('jf-invst'),
    invoice_date:val('jf-invdate')||null,invoice_amount:num_(val('jf-invamt')),invoice_notes:val('jf-invnotes'),
    wage_status:val('jf-wagest'),wage_paid_date:val('jf-wagedt')||null,wage_notes:val('jf-wagenote'),
    incentive_status:val('jf-incst'),incentive_paid_date:val('jf-incdt')||null,incentive_notes:val('jf-incnote'),
    allow_status:val('jf-allowst'),allow_paid_date:val('jf-allowdt')||null,allow_notes:val('jf-allownote'),
    cidb_status:val('jf-cidbst'),cidb_submitted_date:val('jf-cidbdt')||null,cidb_reference:val('jf-cidbref'),cidb_submitted_by:val('jf-cidbby'),
    remarks:val('jf-remarks'),project_remarks:val('jf-premarks'),
    updated_at:now
  };
  CHARGE_FIELDS.forEach(function(c){rec[c[0]]=num_(val('jf-'+c[0]));});
  if(!rec.date){toast('Date is required.','bad');return;}
  busy(btn);
  var res;
  if(id){
    res=await sb.from('ja_jobs').update(rec).eq('id',id);
  }else{
    rec.id='job_'+Date.now()+'_'+Math.random().toString(36).slice(2,6);
    rec.created_at=now;
    res=await sb.from('ja_jobs').insert(rec);
    id=rec.id;
  }
  unbusy(btn);
  if(res.error){toast(res.error.message,'bad');return;}
  audit(rec.created_at?'Job inserted':'Job edited', (rec.date||'')+' · '+(rec.scope||rec.title||'Job')+(rec.mall?' @ '+rec.mall:''));
  CUR_DATE=rec.date;
  closeModal();renderSchedule();
  toast('Job saved.','ok');
}
async function delJob(id){
  if(!confirm('Delete this job? Cannot undo.'))return;
  var r=await sb.from('ja_jobs').delete().eq('id',id);
  if(r.error){toast(r.error.message,'bad');return;}
  audit('Job deleted',String(id));
  if(SIDE_JOB&&String(SIDE_JOB.id)===String(id)&&gel('sideForm'))sideReset();
  closeModal();renderSchedule();toast('Job deleted.','ok');
}

function nextId(prefix,arr,pad){var max=0;var re=new RegExp('^'+prefix+'0*(\\d+)$');arr.forEach(function(x){var m=re.exec(String(x.id));if(m){var n=+m[1];if(n>max)max=n;}});var num=String(max+1);if(pad)while(num.length<pad)num='0'+num;return prefix+num;}

async function saveWorker(id,btn){
  var name=val('wf-name');if(!name){toast('Name required.','bad');return;}
  var rec={name:name,team:val('wf-team'),rate:num_(val('wf-rate')),monthly_pay:num_(val('wf-monthly'))};
  if(IS_ADMIN){rec.bank_name=val('wf-bank');rec.account_name=val('wf-acname');rec.account_no=val('wf-acno');}
  busy(btn);var res;
  if(id){res=await sb.from('ja_workers').update(rec).eq('id',id);}
  else{rec.id=nextId('wk',M.workers,2);res=await sb.from('ja_workers').insert(rec);}
  unbusy(btn);
  if(res.error){toast(res.error.message,'bad');return;}
  audit(id?'Worker updated':'Worker added',name);
  await loadMasters();renderWorkers();closeModal2();toast('Worker saved.','ok');
}

    field('Name *','<input id="sf-name" value="'+esc(s.name||'')+'">')+
    field('Type','<select id="sf-type">'+selOpts(SV_TYPES,s.type||'sv_inhouse')+'</select>'),
    (id?'<button class="danger" onclick="delMaster(\'ja_supervisors\',\''+esc(id)+'\',\'Supervisor\')">Delete</button>':'')+'<div style="flex:1"></div><button class="ghost" onclick="closeModal2()">Cancel</button><button class="btn" onclick="saveSup('+(id?'\''+esc(id)+'\'':'null')+',this)">Save</button>');
}
async function saveSup(id,btn){
  var name=val('sf-name');if(!name){toast('Name required.','bad');return;}
  var rec={name:name,type:val('sf-type')};busy(btn);var res;
  if(id){res=await sb.from('ja_supervisors').update(rec).eq('id',id);}
  else{rec.id=nextId('sv',M.supervisors,2);res=await sb.from('ja_supervisors').insert(rec);}
  unbusy(btn);
  if(res.error){toast(res.error.message,'bad');return;}
  audit(id?'Supervisor updated':'Supervisor added',name);
  await loadMasters();renderWorkers();closeModal2();toast('Saved.','ok');
}

function lorryForm(id){
  var l=id?byId(M.lorries,id):{};
  openModal2(id?'Edit lorry':'Add lorry',
    '<div class="grid2">'+field('Code','<input id="lf-code" value="'+esc(l.id||'')+'" '+(id?'disabled':'placeholder="auto (STxx)"')+'>')+field('Plate *','<input id="lf-plate" value="'+esc(l.plate||'')+'">')+'</div>',
    (id?'<button class="danger" onclick="delMaster(\'ja_lorries\',\''+esc(id)+'\',\'Lorry\')">Delete</button>':'')+'<div style="flex:1"></div><button class="ghost" onclick="closeModal2()">Cancel</button><button class="btn" onclick="saveLorry('+(id?'\''+esc(id)+'\'':'null')+',this)">Save</button>');
}
async function saveLorry(id,btn){
  var plate=val('lf-plate');if(!plate){toast('Plate required.','bad');return;}
  busy(btn);var res;
  if(id){res=await sb.from('ja_lorries').update({plate:plate}).eq('id',id);}
  else{var code=val('lf-code')||nextId('ST',M.lorries,2);res=await sb.from('ja_lorries').insert({id:code,plate:plate});}
  unbusy(btn);
  if(res.error){toast(res.error.message,'bad');return;}
  audit(id?'Lorry updated':'Lorry added',plate);
  await loadMasters();renderWorkers();closeModal2();toast('Saved.','ok');
}
async function delMaster(table,id,label){
  if(!confirm('Delete this '+label+'?'))return;
  var r=await sb.from(table).delete().eq('id',id);
  if(r.error){toast(r.error.message,'bad');return;}
  audit(label+' deleted',String(id));
  await loadMasters();renderWorkers();closeModal2();toast(label+' deleted.','ok');
}

/* ============================================================
   TAB 4 · WAGES
   ------------------------------------------------------------
   WAGE FORMULA (inferred — see note below):
   The apps-script.gs backend only PERSISTS data; the original
   schedule.html held the pay maths, which is not in the repo.
   The ja_states rate table drives it, per worker per attended day:

       base   = ja_workers.rate               (default RM100)
       mult   = ja_states.wk_mult             (1 KL, 2 far states, 3 Kelantan)
       allow  = ja_states.wk_allow            (flat outstation allowance, RM)
       wage   = round2( base * mult + allow )

   The state comes from the JOB the worker was assigned to that
   date (ja_jobs.worker_ids contains the worker, ja_jobs.state).
   If no job is found, we fall back to KL/Selangor (mult 1, allow 0),
   so wage = base. Any ja_wage_adjustments row keyed
   wa_<workerId>_<date>_<category> overrides the computed amount
   (final = adjusted_amount; delta shown). Supervisor/driver
   incentives (inhouse_inc / outsource_rate) are a separate stream
   tracked on the job's incentive_status and are NOT in this table.
   ============================================================ */
async function renderWages(){
  var v=gel('v-wages');
  if(!v.dataset.init){
    v.dataset.init='1';
    v.innerHTML='<h2>Wages</h2>'+
      '<div class="datebar">'+
        field('From','<input type="date" id="wg-from" value="'+esc(monthStart(CUR_DATE))+'">')+
        field('To','<input type="date" id="wg-to" value="'+esc(CUR_DATE)+'">')+
        '<div style="align-self:flex-end"><button class="btn" onclick="loadWages(this)">'+ico('calculator')+' Compute</button></div>'+
      '</div>'+
      '<div class="hint">Wage = worker rate × state multiplier + state allowance. State is taken from the job the worker was on that day. Admins can override any row.</div>'+
      '<div id="wg-body" style="margin-top:14px"></div>';
    if(window.lucide)window.lucide.createIcons();
    loadWages();
  }
}
async function loadWages(btn){
  var from=val('wg-from'),to=val('wg-to');
  if(!from||!to){toast('Pick a date range.','bad');return;}
  if(btn)busy(btn);
  var body=gel('wg-body');body.innerHTML='<div class="card"><span class="spin"></span> Computing…</div>';
  var res=await Promise.all([
    sb.from('ja_attendance_log').select('*').gte('date',from).lte('date',to).order('date',{ascending:false}).limit(3000),
    sb.from('ja_jobs').select('id,date,state,worker_ids,shift').gte('date',from).lte('date',to).limit(4000),
    sb.from('ja_wage_adjustments').select('*').gte('date',from).lte('date',to).limit(3000)
  ]);
  if(btn)unbusy(btn);
  var err=res.filter(function(r){return r.error;})[0];
  if(err){body.innerHTML='<div class="card card-error">'+ico('triangle-alert')+'<span>'+esc(err.error.message)+'</span></div>';if(window.lucide)window.lucide.createIcons();return;}
  var att=res[0].data||[], jobs=res[1].data||[], adjs=res[2].data||[];
  /* date|workerId -> state (from jobs) */
  var stateByKey={};
  jobs.forEach(function(j){var ids=parseJSON_(j.worker_ids,[]);ids.forEach(function(wid){stateByKey[j.date+'|'+wid]=j.state;});});
  var adjByKey={};adjs.forEach(function(a){adjByKey[a.id]=a;adjByKey[(a.worker_id||'')+'|'+a.date+'|'+(a.category||'day')]=a;});

  var rows='',total=0,adjTotal=0;
  att.forEach(function(a){
    var w=byId(M.workers,a.worker_id);
    var rate=w?num_(w.rate):num_(a.rate)||100;
    var stName=stateByKey[a.date+'|'+a.worker_id]||'KL / Selangor';
    var st=M.stateMap[stName]||{wk_mult:1,wk_allow:0};
    var computed=round2_(rate*num_(st.wk_mult||1)+num_(st.wk_allow||0));
    var cat=a.category||'day';
    var adj=adjByKey['wa_'+a.worker_id+'_'+a.date+'_'+cat]||adjByKey[(a.worker_id||'')+'|'+a.date+'|'+cat];
    var final=adj?round2_(adj.adjusted_amount):computed;
    total+=final;if(adj)adjTotal+=round2_(final-computed);
    var adjBtn=IS_ADMIN?'<button class="ghost sm" onclick="adjustForm(\''+esc(a.worker_id||'')+'\',\''+esc(a.worker_name||'')+'\',\''+esc(a.date)+'\',\''+esc(cat)+'\','+computed+')">'+(adj?'Edit adj':'Adjust')+'</button>':'';
    rows+='<tr><td><b>'+esc(a.worker_name||a.worker_id||'—')+'</b></td><td>'+esc(a.date)+'</td><td>'+esc(cat)+'</td><td>'+esc(stName)+'</td>'+
      '<td class="right">'+money_(rate)+'</td><td class="right">×'+esc(st.wk_mult||1)+'</td><td class="right">'+money_(st.wk_allow||0)+'</td>'+
      '<td class="right">'+money_(computed)+'</td><td class="right">'+(adj?'<b>'+money_(final)+'</b> <span class="tag">'+(final-computed>=0?'+':'')+money_(final-computed)+'</span>':money_(final))+'</td>'+
      '<td class="right">'+adjBtn+'</td></tr>';
  });

  var snap='<div class="row tool-snapshot">'+stat(att.length,'Attendance rows')+stat(new Set(att.map(function(a){return a.worker_id;})).size,'Workers')+stat(rm(total),'Total wage')+stat(adjs.length,'Adjustments')+stat(rm(adjTotal),'Adj net',adjTotal<0?'bad':'')+stat(jobs.length,'Jobs in range')+'</div>';
  body.innerHTML=snap+
    '<div class="card"><table><thead><tr><th>Worker</th><th>Date</th><th>Cat</th><th>State</th><th class="right">Rate</th><th class="right">Mult</th><th class="right">Allow</th><th class="right">Computed</th><th class="right">Final</th><th></th></tr></thead>'+
    '<tbody>'+(rows||'<tr><td colspan="10" class="muted">No attendance in range.</td></tr>')+'</tbody></table></div>'+
    adjListHtml(adjs);
  if(window.lucide)window.lucide.createIcons();
}
function adjListHtml(adjs){
  if(!adjs.length)return '';
  var rows=adjs.map(function(a){return '<tr><td><b>'+esc(a.worker_name||a.worker_id)+'</b></td><td>'+esc(a.date)+'</td><td>'+esc(a.category||'')+'</td><td class="right">'+money_(a.original_amount)+'</td><td class="right">'+money_(a.adjusted_amount)+'</td><td class="right">'+((num_(a.delta)>=0?'+':'')+money_(a.delta))+'</td><td>'+esc(a.reason||'')+'</td><td>'+esc(a.adjusted_by||'')+'</td>'+(IS_ADMIN?'<td class="right"><button class="danger sm" onclick="delAdjustment(\''+esc(a.id)+'\')">Remove</button></td>':'<td></td>')+'</tr>';}).join('');
  return '<div class="card"><h3>Wage adjustments</h3><table><thead><tr><th>Worker</th><th>Date</th><th>Cat</th><th class="right">Original</th><th class="right">Adjusted</th><th class="right">Delta</th><th>Reason</th><th>By</th><th></th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}
function adjustForm(workerId,workerName,date,category,computed){
  if(!IS_ADMIN){toast('Admin only.','bad');return;}
  openModal2('Adjust wage · '+esc(workerName),
    '<div class="hint">Computed wage: <b>'+rm(computed)+'</b> · '+esc(date)+' · '+esc(category)+'</div>'+
    '<div class="grid2">'+field('Adjusted amount (RM)','<input type="number" step="0.01" id="ad-amt" value="'+computed+'">')+field('Category','<input id="ad-cat" value="'+esc(category)+'" disabled>')+'</div>'+
    field('Reason','<textarea id="ad-reason" placeholder="e.g. half day, deduction, bonus"></textarea>'),
    '<button class="ghost" onclick="closeModal2()">Cancel</button><button class="btn" onclick="saveAdjustment(\''+esc(workerId)+'\',\''+esc(workerName)+'\',\''+esc(date)+'\',\''+esc(category)+'\','+computed+',this)">Save adjustment</button>');
}
async function saveAdjustment(workerId,workerName,date,category,computed,btn){
  var adjusted=num_(val('ad-amt'));var orig=num_(computed);var delta=round2_(adjusted-orig);
  var rec={id:'wa_'+workerId+'_'+date+'_'+category,worker_id:workerId,worker_name:workerName,date:date,category:category,
    original_amount:orig,adjusted_amount:adjusted,delta:delta,reason:val('ad-reason'),adjusted_by:CUR_EMAIL,adjusted_at:esNow()};
  busy(btn);
  /* upsert: delete any existing then insert (deterministic id from GAS) */
  await sb.from('ja_wage_adjustments').delete().eq('id',rec.id);
  var r=await sb.from('ja_wage_adjustments').insert(rec);
  unbusy(btn);
  if(r.error){toast(r.error.message,'bad');return;}
  audit('Wage adjusted',workerName+' · '+date+' · delta='+delta);
  closeModal2();loadWages();toast('Adjustment saved.','ok');
}
async function delAdjustment(id){
  if(!confirm('Remove this adjustment?'))return;
  var r=await sb.from('ja_wage_adjustments').delete().eq('id',id);
  if(r.error){toast(r.error.message,'bad');return;}
  audit('Wage adjustment removed',String(id));loadWages();toast('Removed.','ok');
}

/* ============================================================
   TAB 5 · REVIEWS (disputes, shift conflicts, vehicle log)
   ============================================================ */
async function renderReviews(){
  var v=gel('v-reviews');
  v.innerHTML='<h2>Reviews</h2><div id="rv-body"><div class="card"><span class="spin"></span> Loading…</div></div>';
  var res=await Promise.all([
    sb.from('ja_disputes').select('*').order('submitted_at',{ascending:false}).limit(300),
    sb.from('ja_shift_conflict_reviews').select('*').order('created_at',{ascending:false}).limit(200),
    sb.from('ja_vehicle_log').select('*').order('date',{ascending:false}).limit(300)
  ]);
  var body=gel('rv-body');
  var err=res.filter(function(r){return r.error;})[0];
  if(err){body.innerHTML='<div class="card card-error">'+ico('triangle-alert')+'<span>'+esc(err.error.message)+'</span></div>';if(window.lucide)window.lucide.createIcons();return;}
  var disputes=res[0].data||[], conflicts=res[1].data||[], vlogs=res[2].data||[];
  var pend=disputes.filter(function(d){return (d.status||'Pending')==='Pending';}).length;
  var cpend=conflicts.filter(function(c){return (c.status||'Pending')==='Pending';}).length;

  var dRows=disputes.map(function(d){
    var acts='';
    if(IS_ADMIN&&(d.status||'Pending')==='Pending'){
      acts='<button class="okbtn sm" onclick="reviewDispute(\''+esc(d.id)+'\',\'Approved\')">Approve</button> <button class="danger sm" onclick="reviewDispute(\''+esc(d.id)+'\',\'Rejected\')">Reject</button>';
    }else{acts=esc(d.reviewer_note||'')+(d.reviewed_by?'<div class="hint">'+esc(d.reviewed_by)+'</div>':'');}
    return '<tr><td><b>'+esc(d.worker_name||d.worker_id)+'</b></td><td>'+esc(d.date)+'</td><td>'+esc(d.claimed_in||'—')+'→'+esc(d.claimed_out||'—')+(d.claimed_next_day==1?' +1':'')+'</td><td class="right">'+(d.claimed_amount?money_(d.claimed_amount):'—')+'</td><td>'+esc(d.worker_note||'')+'</td><td>'+pill(d.status||'Pending')+'</td><td class="right">'+acts+'</td></tr>';
  }).join('');

  var cRows=conflicts.map(function(c){
    var acts=(IS_ADMIN&&(c.status||'Pending')==='Pending')?'<button class="okbtn sm" onclick="resolveConflict(\''+esc(c.id)+'\')">Resolve</button>':esc(c.reviewer_note||'');
    return '<tr><td><b>'+esc(c.worker_name||c.worker_id)+'</b></td><td>'+esc(c.date)+'</td><td>'+esc(c.category||'')+'</td><td>'+esc((parseJSON_(c.shift_ids,[])||[]).join(', '))+'</td><td>'+pill(c.status||'Pending')+'</td><td class="right">'+acts+'</td></tr>';
  }).join('');

  var vRows=vlogs.map(function(g){
    var lp=byId(M.lorries,g.lorry_id);
    return '<tr><td>'+esc(g.date)+'</td><td>'+esc(lp?lp.id+' · '+lp.plate:(g.lorry_id||'—'))+'</td><td>'+esc(g.shift||'')+'</td><td>'+esc(g.depart_hg||'—')+'→'+esc(g.return_hg||'—')+(g.next_day_return==1?' +1':'')+'</td><td>'+esc(g.trip_details||g.notes||'')+'</td></tr>';
  }).join('');

  body.innerHTML=
    '<div class="row tool-snapshot">'+stat(disputes.length,'Disputes')+stat(pend,'Disputes pending',pend?'bad':'ok')+stat(conflicts.length,'Shift conflicts')+stat(cpend,'Conflicts pending',cpend?'bad':'ok')+stat(vlogs.length,'Vehicle logs')+stat(new Set(vlogs.map(function(g){return g.lorry_id;})).size,'Lorries logged')+'</div>'+
    '<div class="card"><h3>Attendance disputes</h3><table><thead><tr><th>Worker</th><th>Date</th><th>Claimed</th><th class="right">Amount</th><th>Note</th><th>Status</th><th></th></tr></thead><tbody>'+(dRows||'<tr><td colspan="7" class="muted">No disputes.</td></tr>')+'</tbody></table></div>'+
    '<div class="card"><h3>Shift conflict reviews</h3><table><thead><tr><th>Worker</th><th>Date</th><th>Cat</th><th>Shift IDs</th><th>Status</th><th></th></tr></thead><tbody>'+(cRows||'<tr><td colspan="6" class="muted">No conflicts.</td></tr>')+'</tbody></table></div>'+
    '<div class="card"><h3>Vehicle log</h3><table><thead><tr><th>Date</th><th>Lorry</th><th>Shift</th><th>Depart→Return</th><th>Details</th></tr></thead><tbody>'+(vRows||'<tr><td colspan="5" class="muted">No vehicle logs.</td></tr>')+'</tbody></table></div>';
  if(window.lucide)window.lucide.createIcons();
}
async function reviewDispute(id,status){
  if(!IS_ADMIN){toast('Admin only.','bad');return;}
  var note=prompt(status+' this dispute — reviewer note (optional):')||'';
  var r=await sb.from('ja_disputes').update({status:status,reviewer_note:note,reviewed_by:CUR_EMAIL,reviewed_at:esNow()}).eq('id',id);
  if(r.error){toast(r.error.message,'bad');return;}
  audit('Dispute '+status.toLowerCase(),id+' · '+note);
  renderReviews();toast('Dispute '+status.toLowerCase()+'.','ok');
}
async function resolveConflict(id){
  if(!IS_ADMIN){toast('Admin only.','bad');return;}
  var note=prompt('Resolution note (optional):')||'';
  var r=await sb.from('ja_shift_conflict_reviews').update({status:'Resolved',reviewer_note:note,reviewed_by:CUR_EMAIL,reviewed_at:esNow()}).eq('id',id);
  if(r.error){toast(r.error.message,'bad');return;}
  audit('Conflict reviewed',id+' → Resolved');
  renderReviews();toast('Resolved.','ok');
}

start();
</script>
