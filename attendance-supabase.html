<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>HG — Attendance Evidence Analyzer — Supabase</title>
<script>
  (function(){
    var key='hg_hub_theme',media=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');
    function preference(){try{var saved=localStorage.getItem(key);if(saved==='light'||saved==='dark'||saved==='system')return saved;}catch(e){}return 'system';}
    function resolved(value){return value==='light'||value==='dark'?value:(media&&media.matches?'dark':'light');}
    function apply(value){var theme=resolved(value);document.documentElement.dataset.theme=theme;document.documentElement.style.colorScheme=theme;}
    apply(preference());window.addEventListener('message',function(event){if(!event.data||event.data.type!=='hg-theme-change')return;if(event.data.theme==='light'||event.data.theme==='dark')apply(event.data.theme);});window.addEventListener('storage',function(event){if(event.key===key)apply(preference());});
    if(media){var sync=function(){if(preference()==='system')apply('system');};if(media.addEventListener)media.addEventListener('change',sync);else if(media.addListener)media.addListener(sync);}
  })();
</script>
<script src="hg-client.js"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/lucide@0.454.0/dist/umd/lucide.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0e1a; --panel:#141926; --panel2:#1c2335; --line:#2a3245;
    --ink:#ffffff; --mut:#a0a8b8; --acc:#f59e0b; --acc2:#d97706;
    --acc-soft:rgba(245,158,11,0.12);
    --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --blue:#3b82f6; --chip:#1c2335;
    --radius:14px; --shadow:0 10px 40px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:var(--acc);cursor:pointer}
  header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:16px;padding:14px 22px;flex-wrap:wrap}
  .brand-block{display:flex;align-items:center;gap:14px}
  .brand-logo{width:46px;height:46px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:1.15rem;color:#0a0e1a;font-weight:900;letter-spacing:.02em}
  .brand-name{font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;line-height:1.1}
  .brand-sub{font-size:.8rem;color:var(--mut);margin-top:2px}
  header .meta-pills{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  header .mpill{background:var(--bg);border:1px solid var(--line);padding:8px 14px;border-radius:999px;
    font-size:.82rem;color:var(--mut);display:flex;align-items:center;gap:7px}
  header .mpill strong{color:var(--ink);font-weight:700}
  header .mpill button{background:none;border:none;color:var(--acc);cursor:pointer;font-size:.78rem;font-weight:700;font-family:inherit}
  nav{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:75px;z-index:19}
  nav button{background:transparent;border:1px solid transparent;color:var(--mut);padding:8px 15px;border-radius:10px;
    cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
  nav button.active{background:var(--acc);color:#0a0e1a}
  nav button:hover:not(.active){background:var(--panel2);color:var(--ink);border-color:var(--line)}
  main{padding:24px;max-width:1320px;margin:0 auto}
  .view{display:none}.view.active{display:block}
  h2{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;margin:0 0 16px}
  h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:var(--acc);margin:18px 0 8px;font-weight:700}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .row{display:flex;gap:14px;flex-wrap:wrap}.row>*{flex:1;min-width:150px}
  label{display:block;font-size:.82rem;color:var(--mut);margin:0 0 6px;font-weight:600}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
  textarea{resize:vertical;min-height:54px}
  button.btn{display:inline-flex;align-items:center;gap:8px;background:var(--acc);color:#0a0e1a;border:none;border-radius:10px;
    padding:11px 18px;font-weight:700;cursor:pointer;font-size:14px;font-family:inherit;transition:transform .1s,background .2s}
  button.btn:hover{background:var(--acc2)}button.btn:active{transform:translateY(1px)}
  button.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
  button.ghost:hover{background:var(--panel2);border-color:var(--acc)}
  button.sm{padding:6px 11px;font-size:12px;border-radius:8px}
  button.danger{background:transparent;border:1px solid var(--bad);color:#fca5a5}
  button.danger:hover{background:rgba(239,68,68,.12)}
  button.okbtn{background:var(--ok);color:#04240f}button.okbtn:hover{filter:brightness(1.1)}
  button:disabled{opacity:.45;cursor:not-allowed}
  .muted{color:var(--mut)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:8px;border-bottom:1px solid var(--line)}
  td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:hover td{background:var(--panel2)}
  .right{text-align:right}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
  .vpill{display:inline-block;padding:2px 10px;border-radius:999px;font-size:11px;font-weight:800;white-space:nowrap;letter-spacing:.02em}
  .v-strong{background:var(--ok-soft);color:var(--ok)}
  .v-ok{background:rgba(59,130,246,.14);color:var(--blue)}
  .v-check{background:var(--warn-soft);color:var(--warn)}
  .v-mismatch{background:var(--bad-soft);color:var(--bad)}
  .v-dim{background:var(--panel2);color:var(--mut)}
  .tag{display:inline-block;background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:11px;color:var(--mut)}
  .stat{flex:1;min-width:120px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px;transition:border-color .2s}
  .stat:hover{border-color:var(--acc)}
  .stat .n{font-size:1.6rem;font-weight:800;color:var(--acc)}
  .stat .n.bad{color:var(--bad)}.stat .n.ok{color:var(--ok)}.stat .n.blue{color:var(--blue)}.stat .n.warn{color:var(--warn)}
  .stat .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .toolbar{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:12px}
  .toolbar .fld{flex:0 0 auto}
  .toolbar .fld input,.toolbar .fld select{width:auto}
  .hint{font-size:12px;color:var(--mut);margin-top:3px}
  .thumb{width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid var(--line);cursor:pointer;background:var(--panel2)}
  .thumb.ph{display:flex;align-items:center;justify-content:center;color:var(--mut);font-size:10px;text-align:center}
  .kv{width:100%}.kv td{padding:7px 8px;border-bottom:1px solid var(--line);vertical-align:top}.kv td.k{color:var(--mut);width:150px;font-size:12px}
  pre.json{background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:12px;overflow:auto;font-size:12px;
    font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;color:var(--ink);max-height:280px;white-space:pre-wrap;word-break:break-word}
  .drawer-img{max-width:100%;max-height:340px;border-radius:10px;border:1px solid var(--line);display:block;margin-bottom:12px}
  dialog{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:var(--radius);padding:0;max-width:820px;width:95%;box-shadow:var(--shadow)}
  dialog::backdrop{background:rgba(0,0,0,.75);backdrop-filter:blur(6px)}
  .modal-h{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}
  .modal-h h2{margin:0;font-size:1.15rem}
  .modal-h .x{margin-left:auto;background:none;border:none;color:var(--mut);font-size:22px;cursor:pointer}
  .modal-b{padding:18px;max-height:78vh;overflow:auto}
  .modal-f{display:flex;gap:8px;justify-content:flex-end;padding:14px 18px;border-top:1px solid var(--line);flex-wrap:wrap}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#000;border:1px solid var(--line);
    padding:11px 18px;border-radius:10px;z-index:100;display:none;max-width:90%}
  #toast.bad{border-color:var(--bad)}#toast.ok{border-color:var(--ok)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--mut);border-top-color:var(--acc);border-radius:50%;animation:s 1s linear infinite;vertical-align:-2px}
  @keyframes s{to{transform:rotate(360deg)}}
  .dz{border:1.5px dashed var(--line);border-radius:9px;padding:16px;text-align:center;cursor:pointer;background:var(--panel2);transition:.15s}
  .dz:hover,.dz.over{border-color:var(--acc);background:var(--acc-soft)}
  /* gates */
  .gate{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .gate .card{max-width:430px;width:100%;text-align:center;padding:36px 30px}
  .gate .brand-logo{margin:0 auto 16px;width:60px;height:60px;font-size:1.4rem}
  .gate h2{margin:0}
  .gate .sub{color:var(--mut);font-size:.85rem;margin-top:6px}
  .gate input{text-align:left;margin-bottom:8px}
  .gate label{text-align:left}
  .msg{font-size:.86rem;margin-top:10px;min-height:20px;opacity:0;transition:opacity .2s}
  .msg.show{opacity:1}.msg.ok{color:var(--ok)}.msg.err{color:#fca5a5}
  #imgModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:200;padding:20px;align-items:center;justify-content:center;flex-direction:column}
  #imgModal.show{display:flex}
  #imgModal img{max-width:92vw;max-height:88vh;border-radius:8px}
  @media print{nav,header .meta-pills,.noprint{display:none !important}
    body{background:#fff;color:#000}
    .card{border:none;background:#fff;color:#000}
    .thumb{width:40px;height:40px}}
</style>
</head>
<body>

<!-- GATE 1 · LOGIN -->
<div class="gate" id="gateLogin" style="display:none;">
  <div class="card">
    <div class="brand-logo">HG</div>
    <h2>Attendance Evidence</h2>
    <div class="sub">Sign in with your HG email and password.</div>
    <input id="loginEmail" type="email" placeholder="you@hggroup.com.my" autocomplete="username" style="width:100%;margin-bottom:8px;">
    <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password" style="width:100%;" onkeydown="if(event.key==='Enter'){signIn();}">
    <button class="btn" style="width:100%;margin-top:14px;justify-content:center;" onclick="signIn()">Sign in</button>
    <div id="loginMsg" class="msg"></div>
  </div>
</div>

<!-- GATE 2 · NOT ON ALLOWLIST -->
<div class="gate" id="gateDenied" style="display:none;">
  <div class="card">
    <div class="brand-logo" aria-hidden="true"><i class="ui-icon" data-lucide="lock-keyhole"></i></div>
    <h2>Not authorised</h2>
    <div class="sub"><span id="deniedEmail"></span> is not on the access list.<br>
      Ask your admin to add you under <b>Settings → Team access</b>.</div>
    <button class="ghost" style="width:100%;margin-top:10px;" onclick="signOut()">Use a different account</button>
  </div>
</div>

<!-- THE APP -->
<div id="app" style="display:none;">
<header>
  <div class="brand-block">
    <div class="brand-logo" aria-hidden="true"><i data-lucide="scan-face"></i></div>
    <div>
      <div class="brand-name">Attendance Evidence Analyzer</div>
      <div class="brand-sub">Review worker clock-in photo evidence — verdicts, EXIF, manual entry.</div>
    </div>
  </div>
  <div class="meta-pills">
    <div class="mpill" id="dateNow">—</div>
    <div class="mpill"><i class="ui-icon" data-lucide="user-round" aria-hidden="true"></i><strong id="who">…</strong><button onclick="signOut()">Sign out</button></div>
  </div>
</header>
<nav id="nav"></nav>
<main>
  <div class="view active" id="v-records"></div>
</main>
</div>

<dialog id="modal">
  <div class="modal-h"><h2 id="m-title">…</h2><button class="x" aria-label="Close" onclick="closeModal()">&times;</button></div>
  <div class="modal-b" id="m-body"></div>
  <div class="modal-f" id="m-foot"></div>
</dialog>
<div id="imgModal" onclick="this.classList.remove('show')"><img id="imgModalImg" alt=""></div>
<div id="toast"></div>

<script>
/* ===================== CONFIG / AUTH (copied pattern from transport-supabase.html) ===================== */
var sb=null, SESSION=null, IS_ADMIN=false;

function gel(id){return document.getElementById(id);}
function showMsg(id,t,ok){var m=gel(id);m.textContent=t;m.className='msg show '+(ok?'ok':'err');setTimeout(function(){m.classList.remove('show');},4500);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function toast(msg,kind){var t=gel('toast');t.textContent=msg;t.className=kind||'';t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},kind==='bad'?5500:2600);}

async function start(){
  sb=window.hg.createClient();
  var s=await sb.auth.getSession();SESSION=s.data.session;
  sb.auth.onAuthStateChange(function(_e,session){if(!!session!==!!SESSION){SESSION=session;route();}});
  route();
}
async function route(){
  ['gateLogin','gateDenied'].forEach(function(g){gel(g).style.display='none';});
  gel('app').style.display='none';
  if(!SESSION){gel('gateLogin').style.display='flex';return;}
  var email=(SESSION.user.email||'').toLowerCase();
  IS_ADMIN=(SESSION.user.role==='admin');
  gel('app').style.display='block';
  gel('who').textContent=email;
  boot();
}
function signIn(){
  var email=((gel('loginEmail')||{}).value||'').trim();
  var pass=(gel('loginPass')||{}).value||'';
  if(!email||!pass){ showMsg('loginMsg','Enter email and password.', false); return; }
  sb.auth.signInWithPassword({email:email,password:pass}).then(function(r){
    if(r.error){ showMsg('loginMsg', r.error.message, false); return; }
    SESSION = r.data.session; route();
  });
}
function signOut(){sb.auth.signOut().then(function(){location.reload();});}

function openModal(t,b,f){gel('m-title').innerHTML=t;gel('m-body').innerHTML=b;gel('m-foot').innerHTML=f||'';gel('modal').showModal();if(window.lucide)window.lucide.createIcons();}
function closeModal(){gel('modal').close();}

/* ===================== STATE ===================== */
var RECORDS=[];
var VERDICTS=['STRONG','OK','CHECK','MISMATCH'];
var FILTER={worker:'',verdict:'',from:'',to:''};

function verdictClass(v){
  var u=String(v||'').toUpperCase();
  if(/STRONG|PASS|VALID/.test(u))return 'v-strong';
  if(/^OK$|GOOD/.test(u))return 'v-ok';
  if(/CHECK|REVIEW|PENDING/.test(u))return 'v-check';
  if(/MISMATCH|FAIL|REJECT|BAD/.test(u))return 'v-mismatch';
  return 'v-dim';
}
function verdictPill(v){return '<span class="vpill '+verdictClass(v)+'">'+esc(v||'—')+'</span>';}
function safeParse(s){try{var v=(typeof s==='string')?JSON.parse(s):s;return v;}catch(e){return null;}}
function prettyJson(s){var v=safeParse(s);if(v==null||(typeof v==='object'&&!Object.keys(v).length))return null;return JSON.stringify(v,null,2);}

/* ===================== BOOT ===================== */
function boot(){
  gel('nav').innerHTML='<button class="active" data-t="records">Records</button>';
  gel('dateNow').textContent=new Date().toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'});
  loadData();
  if(window.lucide)window.lucide.createIcons();
}

async function loadData(){
  gel('v-records').innerHTML='<div class="card"><span class="spin"></span> Loading attendance records…</div>';
  var r=await sb.from('att_records').select('*').order('date',{ascending:false}).limit(5000);
  if(r.error){gel('v-records').innerHTML='<div class="card" style="color:var(--bad)">Failed to load: '+esc(r.error.message)+'</div>';return;}
  RECORDS=r.data||[];
  renderRecords();
}

/* ===================== FILTERS ===================== */
function filtered(){
  return RECORDS.filter(function(r){
    if(FILTER.worker && String(r.worker||'')!==FILTER.worker) return false;
    if(FILTER.verdict && String(r.verdict||'')!==FILTER.verdict) return false;
    var d=r.date||'';
    if(FILTER.from && (!d || d<FILTER.from)) return false;
    if(FILTER.to && (!d || d>FILTER.to)) return false;
    return true;
  });
}
function onFilter(){
  FILTER.worker=gel('fWorker').value;
  FILTER.verdict=gel('fVerdict').value;
  FILTER.from=gel('fFrom').value;
  FILTER.to=gel('fTo').value;
  renderRecords();
}
function clearFilters(){FILTER={worker:'',verdict:'',from:'',to:''};renderRecords();}

/* ===================== RENDER ===================== */
function renderRecords(){
  var list=filtered();
  var workers=Array.from(new Set(RECORDS.map(function(r){return String(r.worker||'').trim();}).filter(Boolean))).sort();
  var verdicts=Array.from(new Set(RECORDS.map(function(r){return String(r.verdict||'').trim();}).filter(Boolean)));
  VERDICTS.forEach(function(v){if(verdicts.indexOf(v)<0)verdicts.push(v);});

  var cnt=function(re){return list.filter(function(r){return re.test(String(r.verdict||'').toUpperCase());}).length;};
  var nStrong=cnt(/STRONG|PASS|VALID/), nOk=list.filter(function(r){return /^OK$|GOOD/.test(String(r.verdict||'').toUpperCase());}).length,
      nCheck=cnt(/CHECK|REVIEW|PENDING/), nMis=cnt(/MISMATCH|FAIL|REJECT|BAD/);

  var opt=function(arr,cur){return arr.map(function(v){return '<option'+(v===cur?' selected':'')+'>'+esc(v)+'</option>';}).join('');};

  gel('v-records').innerHTML=
    '<h2>Attendance Records</h2>'+
    '<div class="row" style="margin-bottom:16px">'+
      '<div class="stat"><div class="n">'+list.length+'</div><div class="l">Records</div></div>'+
      '<div class="stat"><div class="n ok">'+nStrong+'</div><div class="l">Strong</div></div>'+
      '<div class="stat"><div class="n blue">'+nOk+'</div><div class="l">OK</div></div>'+
      '<div class="stat"><div class="n warn">'+nCheck+'</div><div class="l">Needs Check</div></div>'+
      '<div class="stat"><div class="n bad">'+nMis+'</div><div class="l">Mismatch</div></div>'+
      '<div class="stat"><div class="n">'+workers.length+'</div><div class="l">Workers</div></div>'+
    '</div>'+
    '<div class="card noprint">'+
      '<div class="toolbar">'+
        '<div class="fld"><label>Worker</label><select id="fWorker" onchange="onFilter()"><option value="">All Workers</option>'+opt(workers,FILTER.worker)+'</select></div>'+
        '<div class="fld"><label>Verdict</label><select id="fVerdict" onchange="onFilter()"><option value="">All</option>'+opt(verdicts,FILTER.verdict)+'</select></div>'+
        '<div class="fld"><label>From</label><input type="date" id="fFrom" value="'+esc(FILTER.from)+'" onchange="onFilter()"></div>'+
        '<div class="fld"><label>To</label><input type="date" id="fTo" value="'+esc(FILTER.to)+'" onchange="onFilter()"></div>'+
        '<div class="fld"><button class="ghost sm" onclick="clearFilters()">Clear</button></div>'+
        '<div class="fld" style="margin-left:auto;display:flex;gap:8px">'+
          '<button class="btn sm" onclick="openEdit(null)"><i class="ui-icon" data-lucide="plus"></i> Add record</button>'+
          '<button class="ghost sm" onclick="exportXlsx()"><i class="ui-icon" data-lucide="download"></i> Export</button>'+
          '<button class="ghost sm" onclick="window.print()"><i class="ui-icon" data-lucide="printer"></i> Print</button>'+
        '</div>'+
      '</div>'+
      '<div style="overflow-x:auto"><table>'+
        '<thead><tr><th>Photo</th><th>Worker</th><th>Date</th><th>Time</th><th>App</th><th>Verify Code</th><th>Machine</th><th>EXIF</th><th>Verdict</th><th>Notes</th></tr></thead>'+
        '<tbody>'+(list.length?list.map(rowHtml).join(''):'<tr><td colspan="10" class="muted" style="padding:24px;text-align:center">No records match the filters.</td></tr>')+'</tbody>'+
      '</table></div>'+
    '</div>';
  if(window.lucide)window.lucide.createIcons();
}

function rowHtml(r){
  var thumb=r.thumb?'<img class="thumb" src="'+esc(r.thumb)+'" alt="" onclick="event.stopPropagation();enlarge(\''+esc(r.id)+'\')">':'<div class="thumb ph">no photo</div>';
  return '<tr style="cursor:pointer" onclick="openDetail(\''+esc(r.id)+'\')">'+
    '<td>'+thumb+'</td>'+
    '<td><b>'+esc(r.worker||'—')+'</b></td>'+
    '<td>'+esc(r.date||'—')+'</td>'+
    '<td><b>'+esc(r.time||'—')+'</b></td>'+
    '<td>'+esc(r.app||'—')+'</td>'+
    '<td style="font-size:11px">'+esc(r.verify_code||'—')+'</td>'+
    '<td>'+(r.machine_tick?esc(r.machine_tick):'—')+'</td>'+
    '<td><span class="tag">'+esc(r.exif_check||'—')+'</span></td>'+
    '<td>'+verdictPill(r.verdict)+'</td>'+
    '<td class="muted" style="max-width:240px;font-size:12px">'+esc((r.notes||'').slice(0,140))+'</td>'+
  '</tr>';
}

function byId(id){for(var i=0;i<RECORDS.length;i++)if(String(RECORDS[i].id)===String(id))return RECORDS[i];return null;}

function enlarge(id){var r=byId(id);if(!r)return;var src=r.photo_drive_id||r.thumb||'';if(!src)return;gel('imgModalImg').src=src;gel('imgModal').classList.add('show');}

/* ===================== DETAIL DRAWER ===================== */
function openDetail(id){
  var r=byId(id);if(!r)return;
  var img=r.thumb?'<img class="drawer-img" src="'+esc(r.thumb)+'" alt="">':'';
  var photoLink=r.photo_drive_id?'<tr><td class="k">Photo</td><td><a href="'+esc(r.photo_drive_id)+'" target="_blank" rel="noopener">Open full photo</a></td></tr>':'';
  var ai=prettyJson(r.ai_json), ex=prettyJson(r.exif_json);
  var body=img+
    '<table class="kv">'+
      '<tr><td class="k">Worker</td><td><b>'+esc(r.worker||'—')+'</b></td></tr>'+
      '<tr><td class="k">Date</td><td>'+esc(r.date||'—')+'</td></tr>'+
      '<tr><td class="k">Time</td><td>'+esc(r.time||'—')+'</td></tr>'+
      '<tr><td class="k">App</td><td>'+esc(r.app||'—')+'</td></tr>'+
      '<tr><td class="k">Verify code</td><td style="font-size:12px">'+esc(r.verify_code||'—')+'</td></tr>'+
      '<tr><td class="k">Machine tick</td><td>'+esc(r.machine_tick||'—')+'</td></tr>'+
      '<tr><td class="k">Verdict</td><td>'+verdictPill(r.verdict)+'</td></tr>'+
      '<tr><td class="k">EXIF check</td><td>'+esc(r.exif_check||'—')+'</td></tr>'+
      '<tr><td class="k">Keyed by</td><td>'+esc(r.keyed_by||'—')+'</td></tr>'+
      '<tr><td class="k">Added at</td><td>'+esc((r.added_at||'').replace('T',' ').slice(0,19)||'—')+'</td></tr>'+
      photoLink+
      '<tr><td class="k">Notes</td><td>'+esc(r.notes||'—')+'</td></tr>'+
    '</table>'+
    (ai?'<h3>AI JSON</h3><pre class="json">'+esc(ai)+'</pre>':'')+
    (ex?'<h3>EXIF JSON</h3><pre class="json">'+esc(ex)+'</pre>':'');
  var foot=
    '<button class="ghost" title="server endpoint pending" disabled><i class="ui-icon" data-lucide="sparkles"></i> AI re-verify (coming soon)</button>'+
    '<button class="danger" onclick="delRec(\''+esc(id)+'\')">Delete</button>'+
    '<button class="btn" onclick="closeModal();openEdit(\''+esc(id)+'\')">Edit</button>';
  openModal('Record — '+esc(r.worker||r.file_name||id),body,foot);
}

/* ===================== ADD / EDIT ===================== */
function openEdit(id){
  var r=id?byId(id):null;
  var vopts=VERDICTS.map(function(v){return '<option'+(r&&r.verdict===v?' selected':'')+'>'+v+'</option>';}).join('');
  var body=
    '<div class="row">'+
      '<div><label>Worker</label><input id="eWorker" value="'+esc(r?r.worker:'')+'" placeholder="Worker name"></div>'+
      '<div><label>Verdict</label><select id="eVerdict"><option value="">—</option>'+vopts+'</select></div>'+
    '</div>'+
    '<div class="row">'+
      '<div><label>Date</label><input type="date" id="eDate" value="'+esc(r?(r.date||'').slice(0,10):'')+'"></div>'+
      '<div><label>Time</label><input id="eTime" value="'+esc(r?r.time:'')+'" placeholder="HH:MM"></div>'+
      '<div><label>Machine tick</label><select id="eTick"><option value="">No</option><option value="YES"'+(r&&r.machine_tick?' selected':'')+'>YES</option></select></div>'+
    '</div>'+
    '<div class="row">'+
      '<div><label>App</label><input id="eApp" value="'+esc(r?r.app:'')+'" placeholder="Timemark"></div>'+
      '<div><label>Verify code</label><input id="eCode" value="'+esc(r?r.verify_code:'')+'"></div>'+
      '<div><label>EXIF check</label><input id="eExif" value="'+esc(r?r.exif_check:'')+'" placeholder="MATCH / NO EXIF"></div>'+
    '</div>'+
    '<div><label>Notes</label><textarea id="eNotes" placeholder="Notes / findings">'+esc(r?r.notes:'')+'</textarea></div>'+
    '<div style="margin-top:12px"><label>Photo</label>'+
      '<div class="dz" id="dz" onclick="gel(\'ePhoto\').click()" ondragover="event.preventDefault();this.classList.add(\'over\')" ondragleave="this.classList.remove(\'over\')" ondrop="edrop(event)">'+
        '<i class="ui-icon" data-lucide="camera"></i> Tap to snap or upload a photo (uploads to the attendance bucket)'+
        '<div class="hint" id="dzInfo">'+(r&&r.photo_drive_id?'Current: <a href="'+esc(r.photo_drive_id)+'" target="_blank" rel="noopener">existing photo</a>':'')+'</div>'+
      '</div>'+
      '<input type="file" id="ePhoto" accept="image/*" style="display:none" onchange="epick(this.files)"></div>';
  var foot='<button class="ghost" onclick="closeModal()">Cancel</button>'+
           '<button class="btn" id="eSave" onclick="saveRec('+(id?"'"+esc(id)+"'":'null')+')"><i class="ui-icon" data-lucide="save"></i> '+(id?'Save changes':'Add record')+'</button>';
  openModal(id?'Edit record':'Add record',body,foot);
  window._epFile=null;
}
function edrop(e){e.preventDefault();e.currentTarget.classList.remove('over');epick(e.dataTransfer.files);}
function epick(files){var f=files&&files[0];if(!f)return;window._epFile=f;gel('dzInfo').innerHTML='Selected: '+esc(f.name);}

function fileToThumb(file,max){return new Promise(function(res){
  var url=URL.createObjectURL(file);var img=new Image();
  img.onload=function(){var scale=Math.min(1,max/Math.max(img.width,img.height));
    var c=document.createElement('canvas');c.width=Math.round(img.width*scale);c.height=Math.round(img.height*scale);
    c.getContext('2d').drawImage(img,0,0,c.width,c.height);URL.revokeObjectURL(url);
    try{res(c.toDataURL('image/jpeg',0.6));}catch(e){res('');}};
  img.onerror=function(){URL.revokeObjectURL(url);res('');};img.src=url;});}

async function uploadPhoto(file){
  var ext=(file.name&&file.name.indexOf('.')>=0)?file.name.slice(file.name.lastIndexOf('.')+1):'jpg';
  var path='att/'+Date.now()+'-'+Math.random().toString(36).slice(2,7)+'.'+ext;
  var up=await sb.storage.from('attendance').upload(path,file);
  if(up.error)throw up.error;
  var pub=sb.storage.from('attendance').getPublicUrl((up.data&&up.data.path)||path);
  return pub.data.publicUrl;
}

async function saveRec(id){
  var btn=gel('eSave');btn.disabled=true;var old=btn.innerHTML;btn.innerHTML='<span class="spin"></span> saving…';
  try{
    var patch={
      worker:gel('eWorker').value.trim(),
      date:gel('eDate').value||null,
      time:gel('eTime').value.trim(),
      app:gel('eApp').value.trim(),
      verify_code:gel('eCode').value.trim(),
      machine_tick:gel('eTick').value,
      exif_check:gel('eExif').value.trim(),
      verdict:gel('eVerdict').value,
      notes:gel('eNotes').value.trim()
    };
    var f=window._epFile;
    if(f){
      try{patch.photo_drive_id=await uploadPhoto(f);}catch(e){throw new Error('Photo upload failed: '+(e.message||e));}
      var t=await fileToThumb(f,140);if(t)patch.thumb=t;
    }
    var email=(SESSION&&SESSION.user.email)||'';
    if(id){
      var res=await sb.from('att_records').update(patch).eq('id',id);
      if(res.error)throw res.error;
      toast('Record updated','ok');
    }else{
      patch.id=Date.now()+'_'+Math.random().toString(36).slice(2,8);
      patch.keyed_by=email;
      patch.added_at=new Date().toISOString();
      patch.file_name=f?f.name:'manual entry';
      patch.file_key='manual|'+patch.id;
      var ins=await sb.from('att_records').insert(patch);
      if(ins.error)throw ins.error;
      toast('Record added','ok');
    }
    closeModal();
    window._epFile=null;
    await loadData();
  }catch(e){
    btn.disabled=false;btn.innerHTML=old;
    toast(e.message||String(e),'bad');
  }
}

async function delRec(id){
  var r=byId(id);
  if(!confirm('Delete this record'+(r&&r.worker?' ('+r.worker+(r.date?' — '+r.date:'')+')':'')+'?'))return;
  var res=await sb.from('att_records').delete().eq('id',id);
  if(res.error){toast(res.error.message,'bad');return;}
  closeModal();
  toast('Deleted','ok');
  await loadData();
}

/* ===================== EXPORT ===================== */
function exportXlsx(){
  var rows=filtered().map(function(r){return {
    'Worker':r.worker,'Date':r.date,'Time':r.time,'App':r.app,'Verify Code':r.verify_code,
    'Machine Tick':r.machine_tick,'Verdict':r.verdict,'EXIF Check':r.exif_check,'Notes':r.notes,
    'Photo URL':r.photo_drive_id,'Keyed By':r.keyed_by,'Added At':r.added_at};});
  if(!rows.length){toast('Nothing to export','bad');return;}
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows),'Attendance');
  XLSX.writeFile(wb,'HG-Attendance-Evidence-'+new Date().toISOString().slice(0,10)+'.xlsx');
}

/* ===================== GO ===================== */
start();
</script>
