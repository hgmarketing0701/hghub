<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<base target="_top">
<style>
  :root{
    --bg:#0a0e1a; --panel:#141926; --panel2:#1c2335; --line:#2a3245;
    --ink:#ffffff; --mut:#a0a8b8; --acc:#f59e0b; --acc2:#d97706;
    --acc-soft:rgba(245,158,11,0.12);
    --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --blue:#3b82f6; --chip:#1c2335;
    --radius:14px; --shadow:0 10px 40px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:var(--acc)}
  header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:16px;padding:14px 22px;flex-wrap:wrap}
  .brand-block{display:flex;align-items:center;gap:14px}
  .brand-logo{width:46px;height:46px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:1.15rem;color:#0a0e1a;font-weight:900;letter-spacing:.02em}
  .brand-name{font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;line-height:1.1}
  .brand-sub{font-size:.8rem;color:var(--mut);margin-top:2px}
  header .meta-pills{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  header .mpill{background:var(--bg);border:1px solid var(--line);padding:8px 14px;border-radius:999px;
    font-size:.82rem;color:var(--mut);display:flex;align-items:center;gap:7px}
  header .mpill strong{color:var(--ink);font-weight:700}
  nav{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:75px;z-index:19}
  nav button{background:transparent;border:1px solid transparent;color:var(--mut);padding:8px 15px;border-radius:10px;
    cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
  nav button.active{background:var(--acc);color:#0a0e1a}
  nav button:hover:not(.active){background:var(--panel2);color:var(--ink);border-color:var(--line)}
  main{padding:24px;max-width:1280px;margin:0 auto}
  .view{display:none}.view.active{display:block}
  h2{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;margin:0 0 16px}
  h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:var(--acc);margin:18px 0 8px;font-weight:700}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .row{display:flex;gap:14px;flex-wrap:wrap}.row>*{flex:1;min-width:150px}
  label{display:block;font-size:.82rem;color:var(--mut);margin:0 0 6px;font-weight:600}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
  textarea{resize:vertical;min-height:54px}
  button.btn{display:inline-flex;align-items:center;gap:8px;background:var(--acc);color:#0a0e1a;border:none;border-radius:10px;
    padding:11px 18px;font-weight:700;cursor:pointer;font-size:14px;font-family:inherit;transition:transform .1s,background .2s}
  button.btn:hover{background:var(--acc2)}button.btn:active{transform:translateY(1px)}
  button.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
  button.ghost:hover{background:var(--panel2);border-color:var(--acc)}
  button.sm{padding:6px 11px;font-size:12px;border-radius:8px}
  button.danger{background:transparent;border:1px solid var(--bad);color:#fca5a5}
  button.danger:hover{background:rgba(239,68,68,.12)}
  button.okbtn{background:var(--ok);color:#04240f}button.okbtn:hover{filter:brightness(1.1)}
  .muted{color:var(--mut)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th{text-align:left;color:var(--mut);font-weight:600;font-size:11px;text-transform:uppercase;letter-spacing:.05em;padding:8px;border-bottom:1px solid var(--line)}
  td{padding:9px 8px;border-bottom:1px solid var(--line);vertical-align:top}
  tr:hover td{background:var(--panel2)}
  .right{text-align:right}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
  .p-Active,.p-Paid{background:#14432a;color:#86efac}
  .p-Expiring,.p-Partial{background:#4a3a12;color:#fcd34d}
  .p-Expired,.p-Overdue{background:#4c1d24;color:#fca5a5}
  .p-Vacated,.p-Released,.p-Void{background:var(--line);color:var(--mut)}
  .p-SoldOff{background:#0a0e1a;color:#fff;border:1px solid var(--line)}
  .p-Internal{background:#1e3a5f;color:#93c5fd}
  .p-Unpaid{background:#374151;color:#d1d5db}
  .tag{display:inline-block;background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:11px;color:var(--mut)}
  .alert{display:flex;gap:10px;align-items:center;padding:9px 12px;border-radius:9px;margin-bottom:6px;font-size:13px;cursor:pointer}
  .alert.expired{background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.4)}
  .alert.expiring{background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.4)}
  .stat{flex:1;min-width:130px;background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:16px;transition:border-color .2s}
  .stat:hover{border-color:var(--acc)}
  .stat .n{font-size:1.6rem;font-weight:800;color:var(--acc)}
  .stat .n.bad{color:var(--bad)}.stat .n.ok{color:var(--ok)}
  .stat .l{font-size:11px;color:var(--mut);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}
  .toolbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:12px}
  .toolbar input,.toolbar select{width:auto;flex:0 0 auto}
  .hint{font-size:12px;color:var(--mut);margin-top:3px}
  /* lot board */
  .zone{margin-bottom:16px}
  .zone h3{margin:0 0 8px}
  .lots{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:9px}
  .lot{border:1px solid var(--line);border-radius:10px;padding:11px;cursor:pointer;background:var(--panel2);position:relative;transition:.15s}
  .lot:hover{border-color:var(--acc)}
  .lot.occ{border-left:4px solid var(--bad)}.lot.avail{border-left:4px solid var(--ok)}.lot.int{border-left:4px solid var(--blue)}
  .lot .id{font-weight:800;font-size:15px}
  .lot .meta{font-size:11px;color:var(--mut);margin-top:2px}
  .ltag{font-size:9px;font-weight:800;padding:2px 7px;border-radius:99px;position:absolute;top:9px;right:9px;letter-spacing:.03em}
  .ltag.avail{background:#14432a;color:#86efac}.ltag.occ{background:#4c1d24;color:#fca5a5}.ltag.int{background:#1e3a5f;color:#93c5fd}
  .photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .photos a img{height:64px;border-radius:6px;border:1px solid var(--line)}
  .kv{width:100%}.kv td{padding:6px 8px;border-bottom:1px solid var(--line)}.kv td.k{color:var(--mut);width:170px}
  /* modal */
  dialog{background:var(--panel);color:var(--ink);border:1px solid var(--line);border-radius:var(--radius);padding:0;max-width:860px;width:94%;box-shadow:var(--shadow)}
  dialog::backdrop{background:rgba(0,0,0,.75);backdrop-filter:blur(6px)}
  .modal-h{display:flex;align-items:center;padding:14px 18px;border-bottom:1px solid var(--line)}
  .modal-h h2{margin:0;font-size:1.15rem}
  .modal-h .x{margin-left:auto;background:none;border:none;color:var(--mut);font-size:22px;cursor:pointer}
  .modal-b{padding:18px;max-height:74vh;overflow:auto}
  .modal-f{display:flex;gap:8px;justify-content:flex-end;padding:14px 18px;border-top:1px solid var(--line);flex-wrap:wrap}
  #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#000;border:1px solid var(--line);
    padding:11px 18px;border-radius:10px;z-index:100;display:none;max-width:90%}
  #toast.bad{border-color:var(--bad)}#toast.ok{border-color:var(--ok)}
  .spin{display:inline-block;width:14px;height:14px;border:2px solid var(--mut);border-top-color:var(--acc);border-radius:50%;animation:s 1s linear infinite;vertical-align:-2px}
  @keyframes s{to{transform:rotate(360deg)}}
  .dz{border:1.5px dashed var(--line);border-radius:9px;padding:12px;text-align:center;cursor:pointer;background:var(--panel2);transition:.15s}
  .dz:hover,.dz.over{border-color:var(--acc);background:var(--acc-soft)}
  .dz-files{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;justify-content:center}
  .dz-chip{background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-size:11px}
  .dz-chip b{color:var(--bad);cursor:pointer;margin-left:4px;font-weight:700}
  .totbar{display:flex;gap:18px;justify-content:flex-end;align-items:baseline;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  .totbar .big{font-size:20px;font-weight:800;color:var(--acc)}
  .clientOnly,.internalOnly{display:block}
</style>
</head>
<body>
<header>
  <div class="brand-block">
    <div class="brand-logo">BL</div>
    <div>
      <div class="brand-name">Temporary Storage Rental</div>
      <div class="brand-sub">Black Lee · HG Group</div>
    </div>
  </div>
  <div class="meta-pills">
    <div class="mpill" id="dateNow">—</div>
    <div class="mpill">👤 <strong id="who">…</strong></div>
  </div>
</header>
<nav id="nav"></nav>
<main>
  <div class="view active" id="v-dash"></div>
  <div class="view" id="v-board"></div>
  <div class="view" id="v-rentals"></div>
  <div class="view" id="v-invoices"></div>
  <div class="view" id="v-reports"></div>
  <div class="view" id="v-lots"></div>
  <div class="view" id="v-audit"></div>
</main>

<dialog id="modal">
  <div class="modal-h"><h2 id="m-title">…</h2><button class="x" onclick="closeModal()">×</button></div>
  <div class="modal-b" id="m-body"></div>
  <div class="modal-f" id="m-foot"></div>
</dialog>
<dialog id="modal2">
  <div class="modal-h"><h2 id="m2-title">…</h2><button class="x" onclick="closeModal2()">×</button></div>
  <div class="modal-b" id="m2-body"></div>
  <div class="modal-f" id="m2-foot"></div>
</dialog>
<div id="toast"></div>

<script>
/* ===================== STATE ===================== */
var DB={lots:[],rentals:[],invoices:[],payments:[],config:{},stats:{},alerts:[],currentUser:'',sstRate:0.06,today:''};
var TABS=[['dash','Dashboard'],['board','Availability'],['rentals','Rentals'],['invoices','Invoices & Payments'],['reports','Reports'],['lots','Lots'],['audit','Audit Log']];
var RENTAL_LABEL={Active:'Active',Expiring:'Expiring',Expired:'Expired',Vacated:'Vacated',SoldOff:'Sold off',Internal:'Internal',Released:'Released'};
var INV_LABEL={Paid:'Paid',Partial:'Partial',Unpaid:'Unpaid',Overdue:'Overdue',Void:'Void'};

/* ===================== BRIDGE / HELPERS ===================== */
function call(fn,args){return new Promise(function(res,rej){
  var run=google.script.run.withSuccessHandler(res).withFailureHandler(rej);
  if(typeof run[fn]!=='function'){rej(new Error('Server function "'+fn+'" not found — the Apps Script Code.gs is out of date. Re-paste the latest Code.gs, Save, then redeploy: Deploy → Manage deployments → Edit (pencil) → Version: New version → Deploy.'));return;}
  run[fn].apply(run,args||[]);
});}
function toast(msg,kind){var t=document.getElementById('toast');t.textContent=msg;t.className=kind||'';t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},kind==='bad'?5200:2600);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function rm(n){return 'RM '+(Number(n)||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});}
function num(n){return (Number(n)||0).toLocaleString('en-MY',{maximumFractionDigits:2});}
function pill(s,lbl){return '<span class="pill p-'+s+'">'+((lbl||{})[s]||s)+'</span>';}
function rpill(s){return pill(s,RENTAL_LABEL);}
function ipill(s){return pill(s,INV_LABEL);}
function field(lbl,inner){return '<div><label>'+lbl+'</label>'+inner+'</div>';}
function stat(n,l,cls){return '<div class="stat"><div class="n '+(cls||'')+'">'+n+'</div><div class="l">'+l+'</div></div>';}
function val(id){var e=document.getElementById(id);return e?e.value.trim():'';}
function today(){return DB.today||new Date().toISOString().slice(0,10);}

function openModal(t,b,f){document.getElementById('m-title').innerHTML=t;document.getElementById('m-body').innerHTML=b;document.getElementById('m-foot').innerHTML=f||'';document.getElementById('modal').showModal();}
function closeModal(){document.getElementById('modal').close();}
function openModal2(t,b,f){document.getElementById('m2-title').innerHTML=t;document.getElementById('m2-body').innerHTML=b;document.getElementById('m2-foot').innerHTML=f||'';document.getElementById('modal2').showModal();}
function closeModal2(){document.getElementById('modal2').close();}

/* dropzone (multi photo) */
var DROPS={};
function dz(id,multiple,accept,label){DROPS[id]={files:[],multiple:!!multiple};
  return '<div class="dz" id="dz-'+id+'" ondragover="dzOver(event,\''+id+'\')" ondragleave="dzLeave(\''+id+'\')" ondrop="dzDrop(event,\''+id+'\')" onclick="document.getElementById(\'dzi-'+id+'\').click()">'+
    '<input type="file" id="dzi-'+id+'" '+(multiple?'multiple':'')+' accept="'+(accept||'')+'" style="display:none" onchange="dzPick(\''+id+'\',this.files)">'+
    '<div class="hint">'+(label||'Drag here or click to upload')+'</div><div class="dz-files" id="dzf-'+id+'"></div></div>';}
function dzOver(e,id){e.preventDefault();var el=document.getElementById('dz-'+id);if(el)el.classList.add('over');}
function dzLeave(id){var el=document.getElementById('dz-'+id);if(el)el.classList.remove('over');}
function dzDrop(e,id){e.preventDefault();dzLeave(id);dzPick(id,e.dataTransfer.files);}
function dzPick(id,fl){var d=DROPS[id];if(!d)return;var arr=Array.prototype.slice.call(fl);d.files=d.multiple?d.files.concat(arr):arr.slice(0,1);dzRender(id);}
function dzRender(id){var d=DROPS[id];var el=document.getElementById('dzf-'+id);if(!el)return;el.innerHTML=d.files.map(function(f,i){return '<span class="dz-chip">'+esc(f.name)+'<b onclick="event.stopPropagation();dzRemove(\''+id+'\','+i+')">×</b></span>';}).join('');}
function dzRemove(id,i){DROPS[id].files.splice(i,1);dzRender(id);}
function fileB64(f){return new Promise(function(res){var r=new FileReader();r.onload=function(){res({base64:r.result,mime:f.type||'application/octet-stream',name:f.name});};r.readAsDataURL(f);});}
function dzAll(id){return Promise.all(((DROPS[id]&&DROPS[id].files)||[]).map(fileB64));}
function dzOne(id){var fs=(DROPS[id]&&DROPS[id].files)||[];return fs.length?fileB64(fs[0]):Promise.resolve(null);}

/* ===================== BOOT ===================== */
function boot(){
  buildNav();
  call('bootstrap').then(function(d){
    DB=d;document.getElementById('who').textContent=d.currentUser;
    try{document.getElementById('dateNow').textContent=new Date(d.serverTime.replace(' ','T')).toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'});}catch(_){}
    renderAll();
  }).catch(function(e){document.getElementById('v-dash').innerHTML='<div class="card">⚠️ '+esc(e.message||e)+'</div>';});
}
function buildNav(){var n=document.getElementById('nav');n.innerHTML=TABS.map(function(t,i){return '<button data-t="'+t[0]+'"'+(i===0?' class="active"':'')+'>'+t[1]+'</button>';}).join('');
  n.querySelectorAll('button').forEach(function(b){b.onclick=function(){show(b.dataset.t);};});}
function show(t){document.querySelectorAll('nav button').forEach(function(b){b.classList.toggle('active',b.dataset.t===t);});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});document.getElementById('v-'+t).classList.add('active');
  if(t==='audit')renderAudit();}
function renderAll(){renderDash();renderBoard();renderRentals();renderInvoices();renderReports();renderLots();}
function refresh(d){if(d)DB=d;renderAll();}

/* ===================== DASHBOARD ===================== */
function renderDash(){
  var s=DB.stats;
  var alerts=DB.alerts.length?DB.alerts.map(function(a){
    var icon=a.level==='expired'?'⛔':'⚠️';
    var lbl=a.kind==='invoice'?'Invoice':'Rental';
    var fn=a.kind==='invoice'?'openInvoice':'openRental';
    return '<div class="alert '+a.level+'" onclick="'+fn+'(\''+a.id+'\')">'+icon+' <b>'+lbl+' · '+esc(a.who)+'</b> — '+esc(a.msg)+'</div>';
  }).join(''):'<div class="muted">No expiring rentals or overdue invoices. ✅</div>';

  document.getElementById('v-dash').innerHTML=
    '<h2>Dashboard <button class="ghost sm" style="float:right" onclick="settingsForm()">⚙ Settings</button></h2>'+
    '<div class="row" style="margin-bottom:14px">'+
      stat(s.occupancyPct+'%','Occupancy')+stat(s.free,'Lots free','ok')+stat(s.occupied,'Client-occupied')+stat(s.internal,'Internal (HG)')+
    '</div>'+
    '<div class="row" style="margin-bottom:14px">'+
      stat(rm(s.mrr),'Monthly recurring')+
      stat(rm(s.outstanding),'Outstanding',s.outstanding>0?'bad':'')+
      stat(s.overdueCount,'Overdue invoices',s.overdueCount>0?'bad':'')+
      stat(rm(s.collectedThisMonth),'Collected this month','ok')+
      stat(rm(s.deposits),'Deposits held')+
    '</div>'+
    '<div class="card"><h3 style="margin-top:0">⏰ Renewal & payment alerts</h3>'+alerts+'</div>'+
    '<div class="card"><div class="toolbar"><h3 style="margin:0;flex:1">Recent engagements</h3>'+
      '<button class="btn sm" onclick="show(\'rentals\');rentalForm(null)">+ New engagement</button></div>'+
      rentalsTable(DB.rentals.slice().sort(byUpdated).slice(0,8))+'</div>';
}
function byUpdated(a,b){return String(b.updatedAt||'').localeCompare(String(a.updatedAt||''));}

/* ===================== BOARD ===================== */
function renderBoard(){
  var zones={};DB.lots.forEach(function(l){(zones[l.zone]=zones[l.zone]||[]).push(l);});
  var html=Object.keys(zones).sort().map(function(z){
    var floor=zones[z][0].floor;
    return '<div class="zone"><h3>Zone '+esc(z)+' · '+esc(floor)+'</h3><div class="lots">'+
      zones[z].map(function(l){
        var st=l.lotStatus,cls=st==='Internal'?'int':(st==='Occupied'?'occ':'avail'),tag=st==='Internal'?'INTERNAL':(st==='Occupied'?'TAKEN':'FREE');
        var area=l.areaSqm?num(l.areaSqm)+' m²':'size TBC';var sub=area;
        if(st==='Occupied')sub=esc(l.holder.clientCompany)+' · ends '+esc(l.holder.endDate);
        if(st==='Internal')sub='HG '+esc(l.holder.department||'')+(l.holder.endDate?' · ends '+esc(l.holder.endDate):' · open-ended');
        return '<div class="lot '+cls+'" onclick="lotClick(\''+esc(l.id)+'\')"><span class="ltag '+cls+'">'+tag+'</span>'+
          '<div class="id">'+esc(l.id)+'</div><div class="meta">🔒 '+esc(l.lockset)+'</div><div class="meta">'+sub+'</div></div>';
      }).join('')+'</div></div>';
  }).join('');
  document.getElementById('v-board').innerHTML='<h2>Availability Board</h2>'+
    '<div class="toolbar"><span class="muted" style="flex:1">🟢 free · 🔴 client · 🔵 internal HG. Click a lot to view or rent it.</span></div>'+
    '<div class="card">'+html+'</div>';
}
function lotClick(id){
  var l=DB.lots.filter(function(x){return x.id===id;})[0];
  if(l.holder)openRental(l.holder.id);
  else{show('rentals');rentalForm(null,id);}
}

/* ===================== RENTALS ===================== */
function renderRentals(){
  document.getElementById('v-rentals').innerHTML=
    '<h2>Engagements</h2>'+
    '<div class="toolbar"><input id="r-q" placeholder="Search company / dept / lot / PIC" oninput="filterRentals()" style="min-width:240px">'+
      '<select id="r-type" onchange="filterRentals()"><option value="">All types</option><option>Client</option><option>Internal</option></select>'+
      '<select id="r-status" onchange="filterRentals()"><option value="">All status</option>'+Object.keys(RENTAL_LABEL).map(function(s){return '<option>'+s+'</option>';}).join('')+'</select>'+
      '<button class="btn" style="margin-left:auto" onclick="rentalForm(null)">+ New engagement</button></div>'+
    '<div class="card" id="r-list">'+rentalsTable(DB.rentals)+'</div>';
}
function filterRentals(){
  var q=val('r-q').toLowerCase(),ty=val('r-type'),st=val('r-status');
  var rows=DB.rentals.filter(function(r){
    if(ty&&r.engagementType!==ty)return false;
    if(st&&r.liveStatus!==st)return false;
    if(q){var s=(r.clientCompany+' '+r.department+' '+r.lotId+' '+r.clientPIC).toLowerCase();if(s.indexOf(q)<0)return false;}
    return true;
  });
  document.getElementById('r-list').innerHTML=rentalsTable(rows);
}
function rentalsTable(rows){
  if(!rows.length)return '<div class="muted">No engagements yet.</div>';
  return '<table><thead><tr><th>Lot</th><th>Holder</th><th>Period</th><th>Days</th><th>Rate</th><th>Status</th><th>Handled</th><th></th></tr></thead><tbody>'+
    rows.map(function(r){
      var internal=r.engagementType==='Internal';
      var holder=internal?('HG — '+esc(r.department||'')):esc(r.clientCompany);

function filterInvoices(){
  var q=val('i-q').toLowerCase(),st=val('i-status');
  var rows=DB.invoices.filter(function(i){
    var s=i.overdue?'Overdue':i.payStatus;
    if(st&&s!==st)return false;
    if(q){var t=(i.invNo+' '+i.clientCompany+' '+i.lotId).toLowerCase();if(t.indexOf(q)<0)return false;}
    return true;
  });
  document.getElementById('i-list').innerHTML=invoicesTable(rows);
}
function invoicesTable(rows){
  if(!rows.length)return '<div class="muted">No invoices yet.</div>';
  rows=rows.slice().sort(function(a,b){return String(b.invDate).localeCompare(String(a.invDate));});
  return '<table><thead><tr><th>Inv No</th><th>Client</th><th>Lot</th><th>Date</th><th>Due</th><th class="right">Total</th><th class="right">Paid</th><th class="right">Balance</th><th>Status</th><th></th></tr></thead><tbody>'+
    rows.map(function(i){
      return '<tr><td><b>'+esc(i.invNo)+'</b></td><td>'+esc(i.clientCompany)+'</td><td>'+esc(i.lotId||'—')+'</td>'+
        '<td>'+esc(i.invDate)+'</td><td>'+esc(i.dueDate||'—')+'</td>'+
        '<td class="right">'+rm(i.total)+'</td><td class="right">'+rm(i.amountPaid)+'</td><td class="right">'+rm(i.balance)+'</td>'+
        '<td>'+ipill(i.overdue?'Overdue':i.payStatus)+'</td>'+

    }).join('')+'</tbody></table>';

function lotById(id){return DB.lots.filter(function(l){return l.id===id;})[0]||{};}
function repDays(date){return date?Math.round((new Date(date+'T00:00:00')-new Date(today()+'T00:00:00'))/86400000):null;}
/* New vs Existing client: New if the company's earliest engagement started within NEW_CLIENT_DAYS */
function clientTenure(r){
  if(r.engagementType==='Internal')return 'Internal';
  var co=(r.clientCompany||'').trim().toLowerCase();
  if(!co)return 'New';
  var starts=DB.rentals.filter(function(x){return x.engagementType!=='Internal'&&(x.clientCompany||'').trim().toLowerCase()===co&&x.startDate;}).map(function(x){return x.startDate;}).sort();
  var earliest=starts[0]||r.startDate;
  if(!earliest)return 'New';
  var days=Math.round((new Date(today()+'T00:00:00')-new Date(earliest+'T00:00:00'))/86400000);
  var win=Number(DB.config.NEW_CLIENT_DAYS)||60;
  return days>win?'Existing':'New';
}

function buildReport(type){
  var month=val('rep-month')||today().slice(0,7);
  if(type==='rentroll'){
    var nw=0,ex=0;
    var rows=DB.rentals.filter(function(r){return ['Active','Expiring','Expired','Internal'].indexOf(r.liveStatus)>=0;})
      .map(function(r){var l=lotById(r.lotId);var t=clientTenure(r);if(t==='New')nw++;else if(t==='Existing')ex++;
        return {lot:r.lotId,zone:l.zone||'',holder:r.engagementType==='Internal'?('HG — '+(r.department||'')):r.clientCompany,
        client:t,type:r.engagementType,start:r.startDate,end:r.endDate||'open-ended',rate:r.monthlyRate,deposit:r.deposit,status:r.liveStatus};});
    var mrr=0,dep=0,cli=0,intl=0;
    DB.rentals.forEach(function(r){if(['Active','Expiring','Expired','Internal'].indexOf(r.liveStatus)<0)return;
      if(r.engagementType==='Internal')intl++;else{cli++;if(['Active','Expiring'].indexOf(r.liveStatus)>=0)mrr+=r.monthlyRate;if(r.depositStatus!=='Refunded')dep+=r.deposit;}});
    return {title:'Rent Roll — current engagements',summary:[{label:'Engagements',val:rows.length},{label:'New clients',val:nw},{label:'Existing clients',val:ex},{label:'Internal',val:intl},{label:'Monthly recurring',val:rm(mrr)},{label:'Deposits held',val:rm(dep)}],
      columns:[{key:'lot',label:'Lot'},{key:'zone',label:'Zone'},{key:'holder',label:'Holder'},{key:'client',label:'Client'},{key:'type',label:'Type'},{key:'start',label:'Start'},{key:'end',label:'End'},{key:'rate',label:'Rate',right:1,money:1},{key:'deposit',label:'Deposit',right:1,money:1},{key:'status',label:'Status'}],
      rows:rows};
  }
  if(type==='occupancy'){
    var zones={};DB.lots.forEach(function(l){(zones[l.zone]=zones[l.zone]||[]).push(l);});
    var rows=Object.keys(zones).sort().map(function(z){var ls=zones[z];
      var free=ls.filter(function(l){return l.lotStatus==='Available';}).length;
      var occ=ls.filter(function(l){return l.lotStatus==='Occupied';}).length;
      var intl=ls.filter(function(l){return l.lotStatus==='Internal';}).length;
      return {zone:z,floor:ls[0].floor,total:ls.length,free:free,occupied:occ,internal:intl,pct:Math.round(((occ+intl)/ls.length)*100)};});
    var s=DB.stats;
    return {title:'Occupancy by zone',summary:[{label:'Total lots',val:s.lotsTotal},{label:'Free',val:s.free},{label:'Client-occupied',val:s.occupied},{label:'Internal',val:s.internal},{label:'Occupancy',val:s.occupancyPct+'%'}],
      columns:[{key:'zone',label:'Zone'},{key:'floor',label:'Floor'},{key:'total',label:'Total',right:1},{key:'free',label:'Free',right:1},{key:'occupied',label:'Client',right:1},{key:'internal',label:'Internal',right:1},{key:'pct',label:'Occupancy %',right:1,pct:1}],
      rows:rows};
  }
  if(type==='revenue'){
    var billed=0,sst=0,collected=0,outstanding=0;
    var rows=DB.invoices.filter(function(i){return i.payStatus!=='Void'&&String(i.invDate).slice(0,7)===month;})
      .sort(function(a,b){return String(a.invDate).localeCompare(String(b.invDate));})
      .map(function(i){return {invNo:i.invNo,date:i.invDate,client:i.clientCompany,lot:i.lotId,total:i.total,paid:i.amountPaid,balance:i.balance,status:i.overdue?'Overdue':i.payStatus};});
    DB.invoices.forEach(function(i){if(i.payStatus==='Void')return;if(String(i.invDate).slice(0,7)===month){billed+=i.total;sst+=i.sstAmount;}outstanding+=i.balance;});
    DB.payments.forEach(function(p){if(String(p.payDate).slice(0,7)===month)collected+=p.amount;});
    return {title:'Revenue & Collections — '+month,sub:month,summary:[{label:'Billed ('+month+')',val:rm(billed)},{label:'incl. SST',val:rm(sst)},{label:'Collected ('+month+')',val:rm(collected)},{label:'Outstanding (all)',val:rm(outstanding)}],
      columns:[{key:'invNo',label:'Inv No'},{key:'date',label:'Date'},{key:'client',label:'Client'},{key:'lot',label:'Lot'},{key:'total',label:'Total',right:1,money:1},{key:'paid',label:'Paid',right:1,money:1},{key:'balance',label:'Balance',right:1,money:1},{key:'status',label:'Status'}],
      rows:rows};
  }
  if(type==='aging'){
    var buckets={'Not due':0,'1–30':0,'31–60':0,'61–90':0,'90+':0};
    var rows=DB.invoices.filter(function(i){return i.payStatus!=='Void'&&i.balance>0.005;}).map(function(i){
      var d=i.dueDate?repDays(i.dueDate):null;var over=d===null?0:-d;var b=over<=0?'Not due':over<=30?'1–30':over<=60?'31–60':over<=90?'61–90':'90+';
      buckets[b]+=i.balance;
      return {invNo:i.invNo,client:i.clientCompany,lot:i.lotId,due:i.dueDate||'—',overdue:over>0?over:0,balance:i.balance,status:i.overdue?'Overdue':i.payStatus};
    }).sort(function(a,b){return b.overdue-a.overdue;});
    return {title:'Outstanding & Aging',summary:Object.keys(buckets).map(function(k){return {label:k+' days',val:rm(buckets[k])};}),
      columns:[{key:'invNo',label:'Inv No'},{key:'client',label:'Client'},{key:'lot',label:'Lot'},{key:'due',label:'Due date'},{key:'overdue',label:'Days overdue',right:1},{key:'balance',label:'Balance',right:1,money:1},{key:'status',label:'Status'}],
      rows:rows};
  }
  // renewals
  var rows2=DB.rentals.filter(function(r){return r.engagementType!=='Internal'&&['Active','Expiring','Expired'].indexOf(r.liveStatus)>=0&&r.endDate;})
    .sort(function(a,b){return (a.daysToExpiry==null?9e9:a.daysToExpiry)-(b.daysToExpiry==null?9e9:b.daysToExpiry);})
    .map(function(r){return {lot:r.lotId,client:r.clientCompany,pic:r.clientPIC,end:r.endDate,days:r.daysToExpiry<0?(-r.daysToExpiry)+'d overdue':r.daysToExpiry+'d left',rate:r.monthlyRate,status:r.liveStatus,handled:r.handledBy};});
  var expiring=DB.rentals.filter(function(r){return r.liveStatus==='Expiring';}).length;
  var expired=DB.rentals.filter(function(r){return r.liveStatus==='Expired';}).length;
  return {title:'Renewals & Expiring',summary:[{label:'Expiring soon',val:expiring},{label:'Expired',val:expired}],
    columns:[{key:'lot',label:'Lot'},{key:'client',label:'Client'},{key:'pic',label:'PIC'},{key:'end',label:'End date'},{key:'days',label:'Status'},{key:'rate',label:'Rate',right:1,money:1},{key:'status',label:'State'},{key:'handled',label:'Handled by'}],
    rows:rows2};
}
function fmtCell(v,c){if(c.money)return rm(v);if(c.pct)return (Number(v)||0)+'%';return esc(v==null?'':v);}
function repTable(r){
  if(!r.rows.length)return '<div class="muted">No data for this report.</div>';
  return '<table><thead><tr>'+r.columns.map(function(c){return '<th'+(c.right?' class="right"':'')+'>'+c.label+'</th>';}).join('')+'</tr></thead><tbody>'+
    r.rows.map(function(row){return '<tr>'+r.columns.map(function(c){return '<td'+(c.right?' class="right"':'')+'>'+fmtCell(row[c.key],c)+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';
}
function drawReport(){
  LAST_REPORT=buildReport(CUR_REP);
  document.getElementById('rep-monthwrap').style.display=(CUR_REP==='revenue')?'inline-block':'none';
  var sum=LAST_REPORT.summary&&LAST_REPORT.summary.length?'<div class="row" style="margin-bottom:14px">'+LAST_REPORT.summary.map(function(s){return stat(s.val,s.label);}).join('')+'</div>':'';
  document.getElementById('rep-body').innerHTML=sum+repTable(LAST_REPORT);
}
function csvEscape(v){v=String(v==null?'':v);return /[",\n]/.test(v)?'"'+v.replace(/"/g,'""')+'"':v;}
function downloadReportCsv(){
  var r=LAST_REPORT;if(!r)return;
  var lines=[r.columns.map(function(c){return c.label;})];
  r.rows.forEach(function(row){lines.push(r.columns.map(function(c){return c.money?(Number(row[c.key])||0):row[c.key];}));});
  var csv='﻿'+lines.map(function(a){return a.map(csvEscape).join(',');}).join('\r\n');
  try{
    var blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
    var a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download=r.title.replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,'')+'_'+today()+'.csv';
    document.body.appendChild(a);a.click();setTimeout(function(){a.remove();URL.revokeObjectURL(a.href);},1000);
    toast('CSV downloaded','ok');
  }catch(e){toast('Download blocked here — use Print / Save PDF instead.',1);}
}

  var tbl='<table><thead><tr>'+r.columns.map(function(col){return '<th'+(col.right?' class="r"':'')+'>'+col.label+'</th>';}).join('')+'</tr></thead><tbody>'+
    r.rows.map(function(row){return '<tr>'+r.columns.map(function(col){return '<td'+(col.right?' class="r"':'')+'>'+fmtCell(row[col.key],col)+'</td>';}).join('')+'</tr>';}).join('')+'</tbody></table>';
  if(!r.rows.length)tbl='<p>No data for this report.</p>';
  var w=window.open('','_blank');
  w.document.write('<html><head><title>'+esc(r.title)+'</title><style>body{font:12px/1.5 Arial;max-width:1000px;margin:24px auto;padding:0 20px;color:#111}h1{font-size:20px;margin:0}h2{font-size:15px;margin:14px 0 4px}.muted{color:#666;font-size:11px}'+
    'table{width:100%;border-collapse:collapse;margin-top:10px}th,td{border:1px solid #ccc;padding:5px 8px;text-align:left}th{background:#f3f3f3}.r{text-align:right}'+
    '.sum{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}.sum div{border:1px solid #ddd;border-radius:8px;padding:8px 14px;min-width:110px}.sum span{display:block;font-size:10px;color:#666;text-transform:uppercase}.sum b{font-size:16px}'+
    '@media print{button{display:none}}</style></head><body>'+
    '<button onclick="print()" style="float:right;padding:8px 14px">🖨 Print / Save PDF</button>'+
    '<h1>'+esc(c.COMPANY_NAME||'HG Group')+'</h1><div class="muted">Temporary Storage Rental</div>'+
    '<h2>'+esc(r.title)+'</h2><div class="muted">Generated '+today()+' · by '+esc(DB.currentUser)+'</div>'+
    sumHtml+tbl+'</body></html>');

}

    field('Address','<textarea id="c-addr">'+esc(c.COMPANY_ADDRESS)+'</textarea>');
  openModal('⚙ Settings',body,'<button class="ghost" onclick="closeModal()">Cancel</button><button class="btn" id="c-save">Save settings</button>');
  document.getElementById('c-save').onclick=function(){
    call('saveConfig',[{NOTICE1_DAYS:val('c-n1'),NOTICE2_DAYS:val('c-n2'),INVOICE_DUE_SOON_DAYS:val('c-due'),NEW_CLIENT_DAYS:val('c-newdays'),REMINDER_TO:val('c-to'),
      INVOICE_PREFIX:val('c-prefix'),INVOICE_TERMS_DAYS:val('c-terms'),AUTO_INVOICE_SST:val('c-autosst'),
      COMPANY_NAME:val('c-name'),COMPANY_REG:val('c-reg'),SST_NO:val('c-sst'),COMPANY_PHONE:val('c-phone'),COMPANY_ADDRESS:val('c-addr')}])
      .then(function(d){refresh(d);closeModal();toast('Settings saved ✓','ok');}).catch(function(e){toast(e.message||e,'bad');});
  };
}

    '<tr><td class="k">Client (Owner of Goods)</td><td colspan="3">'+esc(r.clientCompany)+(r.clientPIC?' — attn: '+esc(r.clientPIC):'')+'</td></tr>'+
    '<tr><td class="k">Contact</td><td>'+esc(r.clientContact||'-')+'</td><td class="k">Email</td><td>'+esc(r.clientEmail||'-')+'</td></tr>'+
    '<tr><td class="k">Storage Lot</td><td>'+esc(r.lotId)+' (Zone '+esc(lot.zone||'')+', '+esc(lot.floor||'')+')</td><td class="k">Lockset No</td><td>'+esc(lot.lockset||'-')+'</td></tr>'+
    '<tr><td class="k">Lot Size</td><td>'+esc(size)+'</td><td class="k">Deposit</td><td>'+(r.deposit?rm(r.deposit):'-')+'</td></tr>'+
    '<tr><td class="k">Storage Period</td><td>'+esc(r.startDate)+' to '+esc(r.endDate)+'</td><td class="k">Rate</td><td>'+(r.monthlyRate?rm(r.monthlyRate)+' / month':'as quoted')+'</td></tr>'+
    '<tr><td class="k">CCTV Ref</td><td colspan="3">'+esc(r.cctvNo||'-')+' '+(r.cctvUrl?'('+esc(r.cctvUrl)+')':'')+'</td></tr></table>'+

    '<li><b>No warranty, no insurance.</b> HG gives NO warranty and provides NO insurance over the stored goods. The Client stores goods entirely at the Client\'s own risk and is responsible for arranging its own insurance.</li>'+
    '<li><b>Liability.</b> HG shall not be liable for any loss, theft, damage, fire, flood, pest, deterioration or loss of profit/business, save for HG\'s own proven gross negligence, capped at one (1) month\'s storage fee.</li>'+
    '<li><b>Lock & keys.</b> Lot is secured by the lockset above. The Client holds the key/combination. HG holds no duplicate.</li>'+
    '<li><b>Prohibited goods.</b> No illegal, hazardous, flammable, explosive, perishable, living, or foul-smelling items, and no cash/valuables/documents.</li>'+
    '<li><b>Payment.</b> Storage fees are payable in advance per the invoice. Access may be suspended on overdue payment.</li>'+

    '<li><b>Non-renewal / abandonment.</b> If the period expires and the Client does not renew or collect the goods after the two reminders, the goods are deemed <b>abandoned</b>. HG may dispose of, clear, or <b>sell off</b> the goods, and <b>ownership shall pass to HG</b>. Sale proceeds may be applied to outstanding fees and costs; the Client remains liable for any shortfall.</li>'+

function printInvoice(id){call('getInvoiceData',[id]).then(buildInvoice).catch(function(e){toast(e.message||e,'bad');});}
function buildInvoice(o){

  var paysRows=pays.map(function(p){return '<tr><td>'+esc(p.payDate)+'</td><td>'+esc(p.method||'')+'</td><td>'+esc(p.reference||'')+'</td><td style="text-align:right">'+rm(p.amount)+'</td></tr>';}).join('');
  var w=window.open('','_blank');
  w.document.write('<html><head><title>Invoice '+esc(i.invNo)+'</title><style>body{font:13px/1.6 Arial;max-width:760px;margin:28px auto;padding:0 20px;color:#111}h1{font-size:22px;margin:0}.r{text-align:right}.head{display:flex;justify-content:space-between;border-bottom:2px solid #111;padding-bottom:12px;margin-bottom:16px}table{width:100%;border-collapse:collapse;margin:12px 0}th,td{padding:7px 9px;border:1px solid #ccc}th{background:#f5f5f5;text-align:left}.tot td{border:none;padding:3px 9px}.tot .big{font-size:17px;font-weight:bold}.muted{color:#666;font-size:12px}@media print{button{display:none}}</style></head><body>'+
    '<button onclick="print()" style="float:right;padding:8px 14px">🖨 Print / Save PDF</button>'+
    '<div class="head"><div><h1>'+esc(c.COMPANY_NAME||'HG Group')+'</h1><div class="muted">'+esc(c.COMPANY_REG||'')+(c.SST_NO?' · SST: '+esc(c.SST_NO):'')+'<br>'+esc(c.COMPANY_ADDRESS||'').replace(/\n/g,'<br>')+(c.COMPANY_PHONE?'<br>Tel: '+esc(c.COMPANY_PHONE):'')+'</div></div>'+
    '<div class="r"><h1 style="color:#888">'+(i.sstEnabled?'TAX INVOICE':'INVOICE')+'</h1><div><b>'+esc(i.invNo)+'</b><br>Date: '+esc(i.invDate)+(i.dueDate?'<br>Due: '+esc(i.dueDate):'')+'</div></div></div>'+
    '<div><b>Bill to:</b><br>'+esc(i.clientCompany)+'</div>'+
    '<table><thead><tr><th>Description</th><th class="r">Amount</th></tr></thead><tbody>'+
    '<tr><td>'+esc(i.description||('Storage rental — Lot '+i.lotId))+(lot.lockset?'<div class="muted">Lot '+esc(i.lotId)+' · Lockset '+esc(lot.lockset)+(i.periodFrom?' · '+esc(i.periodFrom)+' → '+esc(i.periodTo||''):'')+'</div>':'')+'</td><td class="r">'+rm(i.amount)+'</td></tr>'+
    '</tbody></table>'+
    '<table class="tot" style="width:300px;margin-left:auto"><tr><td>Subtotal</td><td class="r">'+rm(i.amount)+'</td></tr>'+
    (i.sstEnabled?'<tr><td>SST 6%</td><td class="r">'+rm(i.sstAmount)+'</td></tr>':'')+
    '<tr><td class="big">Total</td><td class="r big">'+rm(i.total)+'</td></tr>'+
    (i.amountPaid>0?'<tr><td>Paid</td><td class="r">-'+rm(i.amountPaid)+'</td></tr><tr><td class="big">Balance due</td><td class="r big">'+rm(i.balance)+'</td></tr>':'')+
    '</table>'+
    (paysRows?'<h3 style="font-size:13px">Payments received</h3><table><thead><tr><th>Date</th><th>Method</th><th>Reference</th><th class="r">Amount</th></tr></thead><tbody>'+paysRows+'</tbody></table>':'')+
    (i.notes?'<p class="muted">'+esc(i.notes)+'</p>':'')+
    '<p class="muted" style="margin-top:30px">This is a computer-generated invoice.</p></body></html>');
  w.document.close();
}
