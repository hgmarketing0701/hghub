<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>HG — Daily Site Tracking</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #141926;
    --surface-2: #1c2335;
    --border: #2a3245;
    --text: #ffffff;
    --text-dim: #a0a8b8;
    --accent: #f59e0b;
    --accent-hover: #d97706;
    --accent-soft: rgba(245, 158, 11, 0.12);
    --green: #22c55e;
    --green-soft: rgba(34, 197, 94, 0.15);
    --red: #ef4444;
    --red-soft: rgba(239, 68, 68, 0.15);
    --blue: #3b82f6;
    --blue-soft: rgba(59, 130, 246, 0.15);
    --grey: #6b7280;
    --grey-soft: rgba(107, 114, 128, 0.18);
    --radius: 12px;
    --shadow: 0 10px 40px rgba(0,0,0,0.4);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  .container { max-width: 1280px; margin: 0 auto; padding: 32px 24px; }

  /* HEADER */
  .topbar {
    display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap;
    gap: 20px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 32px;
  }
  .brand {
    font-size: 1.4rem; font-weight: 800; letter-spacing: -0.02em;
  }
  .brand span { color: var(--accent); }
  .brand .sub {
    display: block;
    font-size: 0.8rem; font-weight: 500;
    color: var(--text-dim);
    letter-spacing: 0;
    margin-top: 2px;
  }
  .meta {
    display: flex; gap: 24px; align-items: center; flex-wrap: wrap;
  }
  .meta-item .num {
    font-size: 1.6rem; font-weight: 800; color: var(--accent);
    line-height: 1;
  }
  .meta-item .lbl {
    font-size: 0.75rem; color: var(--text-dim);
    text-transform: uppercase; letter-spacing: 0.05em; margin-top: 4px;
  }
  .date-pill {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 0.9rem;
    color: var(--text-dim);
  }

  /* ACTIONS BAR */
  .actions {
    display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 24px;
  }
  .btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 600;
    text-decoration: none;
    border: none;
    cursor: pointer;
    font-size: 0.95rem;
    font-family: inherit;
    transition: transform 0.1s, background 0.2s;
  }
  .btn:active { transform: translateY(1px); }
  .btn-primary { background: var(--accent); color: #0a0e1a; }
  .btn-primary:hover { background: var(--accent-hover); }
  .btn-ghost {
    background: var(--surface);
    color: var(--text);
    border: 1px solid var(--border);
  }
  .btn-ghost:hover { background: var(--surface-2); border-color: var(--accent); }
  .btn-danger {
    background: var(--surface);
    color: var(--red);
    border: 1px solid var(--border);
  }
  .btn-danger:hover { border-color: var(--red); }
  .btn-sm { padding: 6px 12px; font-size: 0.85rem; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 80px 20px;
    background: var(--surface);
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    color: var(--text-dim);
  }
  .empty h3 { color: var(--text); margin-bottom: 8px; }

  /* SITE CARDS */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    display: flex; flex-direction: column; gap: 14px;
  }
  .card-head {
    display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
  }
  .card-title {
    font-size: 1.1rem; font-weight: 700; letter-spacing: -0.01em;
  }
  .card-sub {
    font-size: 0.85rem; color: var(--text-dim); margin-top: 2px;
  }
  .badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 0.78rem;
    font-weight: 600;
    border: 1px solid transparent;
    white-space: nowrap;
  }
  .badge-green { background: var(--green-soft); color: var(--green); border-color: var(--green); }
  .badge-red   { background: var(--red-soft);   color: var(--red);   border-color: var(--red); }
  .badge-blue  { background: var(--blue-soft);  color: var(--blue);  border-color: var(--blue); }
  .badge-grey  { background: var(--grey-soft);  color: var(--grey);  border-color: var(--grey); }

  .field-row {
    font-size: 0.92rem;
  }
  .field-row .k {
    color: var(--text-dim);
    font-size: 0.78rem;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 4px;
    font-weight: 600;
  }
  .field-row .v {
    color: var(--text);
    white-space: pre-wrap;
  }
  .field-row .v.dim { color: var(--text-dim); font-style: italic; }

  .progress {
    height: 8px; background: var(--bg);
    border-radius: 999px; overflow: hidden;
    border: 1px solid var(--border);
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 0.3s;
  }
  .progress-row {
    display: flex; align-items: center; gap: 10px;
    font-size: 0.85rem; color: var(--text-dim);
  }
  .progress-row .progress { flex: 1; }

  .card-actions {
    display: flex; gap: 8px; margin-top: 4px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
  }

  /* MODAL */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    display: none;
    align-items: flex-start; justify-content: center;
    padding: 40px 20px;
    z-index: 1000;
    overflow-y: auto;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px;
    width: 100%; max-width: 640px;
    box-shadow: var(--shadow);
  }
  .modal-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 20px;
  }
  .modal-head h2 { font-size: 1.3rem; }
  .x-btn {
    background: transparent; border: none; color: var(--text-dim);
    font-size: 1.4rem; cursor: pointer; line-height: 1;
  }
  .x-btn:hover { color: var(--text); }

  /* FORM */
  .form-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 14px;
  }
  .form-grid .full { grid-column: 1 / -1; }
  @media (max-width: 540px) { .form-grid { grid-template-columns: 1fr; } }
  .form-field label {
    display: block;
    font-weight: 600; font-size: 0.85rem; margin-bottom: 6px;
  }
  .form-field input,
  .form-field textarea,
  .form-field select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 11px 13px;
    border-radius: 8px;
    font-size: 0.95rem;
    font-family: inherit;
  }
  .form-field input:focus,
  .form-field textarea:focus,
  .form-field select:focus {
    outline: none; border-color: var(--accent);
  }
  .form-field textarea { resize: vertical; min-height: 70px; }
  .form-foot {
    display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px;
    flex-wrap: wrap;
  }

  /* REPORT MODAL */
  .report-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    font-family: 'Courier New', Consolas, monospace;
    font-size: 0.85rem;
    line-height: 1.55;
    color: var(--text);
    white-space: pre-wrap;
    max-height: 60vh;
    overflow-y: auto;
  }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--green);
    color: #06120a;
    padding: 12px 22px;
    border-radius: 999px;
    font-weight: 700;
    box-shadow: 0 10px 30px rgba(34, 197, 94, 0.4);
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s, transform 0.2s;
    z-index: 2000;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-6px); }

  /* HG Hub light tool shell */
  :root { --bg:#fff; --surface:#fff; --surface-2:#f8f7f4; --border:#e4ded6; --text:#171717; --text-dim:#8b837b; --accent:#143d4a; --accent-hover:#0e303b; --accent-soft:#eef6f3; --green:#15945d; --green-soft:#edf8f3; --red:#d84d4f; --red-soft:#fff1ee; --blue:#2f7fa5; --blue-soft:#eef7fb; --grey:#6d756f; --grey-soft:#f1f0ed; --radius:8px; --shadow:0 12px 30px rgba(23,23,23,.08); }
  body { font-family:"Manrope",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif; color:var(--text); line-height:1.55; }
  .container { max-width:none; padding:26px 28px 88px; }
  .tool-page-header { display:flex; align-items:center; justify-content:space-between; min-height:46px; padding:0 0 20px; margin-bottom:22px; border-bottom:1px solid var(--border); }
  .tool-page-title { display:flex; align-items:center; gap:10px; color:var(--text); font-size:1.05rem; font-weight:800; letter-spacing:-.02em; }
  body.embedded .tool-page-header { display:none; }
  .topbar { align-items:center; padding-bottom:20px; margin-bottom:22px; gap:16px; }
  .brand { color:var(--text); font-size:1.1rem; font-weight:800; }
  .brand span { color:var(--accent); }
  .brand .sub { color:var(--text-dim); font-size:.78rem; margin-top:3px; }
  .brand-title { display:flex; align-items:center; gap:9px; }
  .tool-icon { width:20px; height:20px; color:var(--accent); flex:0 0 20px; }
  .tool-live { display:inline-flex; align-items:center; height:21px; padding:0 9px; border-radius:999px; background:var(--green-soft); color:var(--green); font-size:.64rem; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
  .date-pill { background:var(--surface-2); border-color:var(--border); color:#716b65; border-radius:8px; padding:8px 12px; font-size:.8rem; }
  .actions { gap:10px; margin-bottom:18px; }
  .btn { padding:10px 14px; border-radius:8px; font-size:.86rem; font-weight:700; }
  .btn-primary { background:var(--accent); color:#fff; } .btn-primary:hover { background:var(--accent-hover); }
  .btn-ghost { background:var(--surface); color:var(--accent); border-color:var(--border); } .btn-ghost:hover { background:var(--surface-2); border-color:#cfc8bd; }
  .btn-danger { color:var(--red); background:var(--surface); border-color:var(--border); } .btn-danger:hover { background:var(--red-soft); border-color:#f1c8c5; }
  .btn-sm { padding:7px 10px; font-size:.78rem; }
  .tool-snapshot { margin-bottom:18px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); overflow:hidden; }
  .tool-snapshot-title { padding:16px 18px 10px; color:var(--text); font-size:.98rem; font-weight:800; }
  .tool-snapshot-row { display:grid; grid-template-columns:repeat(4,minmax(0,1fr)); padding:0 0 10px; }
  .meta { display:contents; }
  .meta-item { position:relative; display:grid; grid-template-rows:18px 36px; align-content:start; gap:2px; padding:10px 18px 8px; min-width:0; }
  .meta-item:not(:last-child)::after { content:""; position:absolute; top:7px; right:0; bottom:10px; width:1px; background:var(--border); }
  .meta-item .num { order:2; color:var(--accent); font-size:1.55rem; line-height:36px; font-weight:800; font-variant-numeric:tabular-nums; white-space:nowrap; }
  .meta-item:nth-child(2) .num { color:var(--red); } .meta-item:nth-child(3) .num { color:var(--blue); } .meta-item:nth-child(4) .num { color:var(--grey); }
  .meta-item .lbl { order:1; min-height:18px; color:#817b75; font-size:.66rem; line-height:18px; font-weight:800; letter-spacing:.07em; white-space:nowrap; }
  .board-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; flex-wrap:wrap; margin-bottom:16px; }
  .board-head h1 { color:var(--text); font-size:1.42rem; font-weight:800; letter-spacing:-.03em; }
  .board-head p { color:#716b65; font-size:.92rem; margin-top:3px; }
  .grid { grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:14px; }
  .card { background:var(--surface); border-color:var(--border); border-radius:var(--radius); padding:18px; gap:14px; box-shadow:none; }
  .card:hover { border-color:#cfc8bd; } .card-title { color:var(--text); font-size:1rem; font-weight:800; } .card-sub { color:var(--text-dim); font-size:.82rem; }
  .badge { padding:4px 9px; border:0; font-size:.68rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
  .badge-green { background:var(--green-soft); color:var(--green); } .badge-red { background:var(--red-soft); color:var(--red); } .badge-blue { background:var(--blue-soft); color:var(--blue); } .badge-grey { background:var(--grey-soft); color:var(--grey); }
  .field-row { font-size:.88rem; } .field-row .k { color:#817b75; font-size:.66rem; font-weight:800; letter-spacing:.07em; margin-bottom:4px; } .field-row .v { color:#413d39; } .field-row .v.dim { color:var(--text-dim); }
  .field-row.blockers .k, .field-row.blockers .v { color:var(--red); } .field-row.actions-row .k { color:var(--accent); }
  .progress { background:#f1efeb; border:0; height:7px; } .progress-fill { background:#16847a; } .progress-row { color:var(--text-dim); font-size:.78rem; }
  .card-actions { border-top-color:var(--border); margin-top:auto; padding-top:13px; }
  .empty { background:var(--surface); border-color:var(--border); border-radius:var(--radius); color:var(--text-dim); padding:56px 20px; } .empty h3 { color:var(--text); font-size:1rem; }
  .modal-bg { background:rgba(23,23,23,.38); backdrop-filter:blur(4px); } .modal { background:var(--surface); border-color:var(--border); border-radius:12px; padding:22px; box-shadow:var(--shadow); }
  .modal-head { border-bottom:1px solid var(--border); margin:-22px -22px 20px; padding:18px 22px; } .modal-head h2 { color:var(--text); font-size:1.05rem; font-weight:800; } .x-btn { color:var(--text-dim); }
  .form-field label { color:#716b65; font-size:.72rem; font-weight:800; letter-spacing:.04em; text-transform:uppercase; }
  #siteForm .form-grid { padding-inline:4px; }
  .form-field input, .form-field textarea, .form-field select { background:#fff; border-color:#ded8cf; color:var(--text); border-radius:8px; padding:10px 11px; font-size:.9rem; }
  .status-select { position:relative; }
  .status-select-native { position:absolute; width:1px; height:1px; opacity:0; pointer-events:none; }
  .status-select-trigger { display:flex; align-items:center; justify-content:space-between; width:100%; min-height:44px; padding:10px 16px 10px 11px; border:1px solid #ded8cf; border-radius:8px; background:#fff; color:var(--text); font:inherit; font-size:.9rem; text-align:left; cursor:pointer; }
  .status-select-trigger:focus { outline:none; border-color:var(--accent); box-shadow:0 0 0 3px rgba(20,61,74,.08); }
  .status-select-trigger svg { width:16px; height:16px; color:var(--accent); flex:0 0 16px; }
  .status-select-menu { position:absolute; z-index:30; top:calc(100% + 6px); left:0; display:none; width:100%; padding:4px; border:1px solid var(--border); border-radius:8px; background:#fff; box-shadow:var(--shadow); }
  .status-select-menu.open { display:block; }
  .status-select.open-up .status-select-menu { top:auto; bottom:calc(100% + 6px); }
  .status-select-option { display:block; width:100%; min-height:44px; padding:10px 11px; border:0; border-radius:6px; background:transparent; color:#413d39; font:inherit; font-size:.88rem; font-weight:600; text-align:left; cursor:pointer; }
  .status-select-option:hover, .status-select-option:focus { outline:none; background:var(--surface-2); color:var(--accent); }
  .status-select-option[aria-selected="true"] { background:var(--accent-soft); color:var(--accent); }
  .form-field input:focus, .form-field textarea:focus, .form-field select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(20,61,74,.08); }
  .form-foot { border-top:1px solid var(--border); margin:20px -22px -22px; padding:16px 22px; }
  .report-box { background:var(--surface-2); border-color:var(--border); color:#413d39; font-family:ui-monospace,"Cascadia Code",Consolas,monospace; }
  .toast { background:var(--accent); color:#fff; box-shadow:0 10px 30px rgba(20,61,74,.2); }
  @media (max-width:680px) { .container { padding:18px 16px 56px; } .topbar { align-items:flex-start; margin-bottom:18px; } .date-pill { width:100%; } .tool-snapshot-row { grid-template-columns:repeat(2,minmax(0,1fr)); } .meta-item:nth-child(2)::after,.meta-item:nth-child(4)::after { display:none; } .meta-item { padding:10px 14px 8px; } .meta-item:nth-child(n + 3) { border-top:1px solid var(--border); } .tool-snapshot-title { padding-left:14px; } .board-head h1 { font-size:1.25rem; } .actions { display:grid; grid-template-columns:1fr 1fr; } .actions .btn { justify-content:center; } .actions .btn-danger { grid-column:1 / -1; } .grid { grid-template-columns:1fr; } }
</style>
</head>
<body>

<script>
  if (window.self !== window.top) document.body.classList.add('embedded');
</script>

<div class="container">

  <div class="tool-page-header">
    <div class="tool-page-title">Daily Site Tracking <span class="tool-live">Live</span></div>
  </div>

  <div class="board-head">
    <div>
      <h1>Today’s Site Board</h1>
      <p>Capture progress, blockers, and tomorrow’s plan in one shared daily board.</p>
    </div>
    <div class="date-pill" id="todayDate">—</div>
  </div>

  <div class="tool-snapshot">
    <div class="tool-snapshot-title">Site Snapshot</div>
    <div class="tool-snapshot-row">
      <div class="meta">
      <div class="meta-item"><div class="num" id="cntActive">0</div><div class="lbl">Active</div></div>
      <div class="meta-item"><div class="num" id="cntDelayed">0</div><div class="lbl">Delayed</div></div>
      <div class="meta-item"><div class="num" id="cntWaiting">0</div><div class="lbl">Awaiting</div></div>
      <div class="meta-item"><div class="num" id="cntDone">0</div><div class="lbl">Done</div></div>
      </div>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="openAdd()">+ Add Site</button>
    <button class="btn btn-ghost" onclick="openReport()">Generate daily report</button>
    <button class="btn btn-ghost" onclick="loadSample()">Load example sites</button>
    <button class="btn btn-danger" onclick="clearAll()">Clear local data</button>
  </div>

  <div id="board"></div>

</div>

<!-- ADD/EDIT MODAL -->
<div class="modal-bg" id="formModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="formTitle">Add Site</h2>
      <button class="x-btn" onclick="closeForm()">✕</button>
    </div>
    <form id="siteForm" onsubmit="return saveSite(event)">
      <input type="hidden" id="fId" />
      <div class="form-grid">
        <div class="form-field">
          <label for="fClient">Client / Site</label>
          <input type="text" id="fClient" required placeholder="e.g. ABC Sdn Bhd" />
        </div>
        <div class="form-field">
          <label for="fProject">Project / Location</label>
          <input type="text" id="fProject" placeholder="e.g. KL Tower lvl 12 fit-out" />
        </div>
        <div class="form-field">
          <label id="fStatusLabel" for="fStatus">Status</label>
          <div class="status-select">
            <select class="status-select-native" id="fStatus" required tabindex="-1" aria-hidden="true">
              <option value="in_progress">In Progress</option>
              <option value="delayed">Delayed</option>
              <option value="awaiting_client">Awaiting Client</option>
              <option value="completed">Completed</option>
            </select>
            <button type="button" class="status-select-trigger" id="fStatusTrigger" aria-labelledby="fStatusLabel fStatusValue" aria-haspopup="listbox" aria-expanded="false" onclick="toggleStatusSelect()"><span id="fStatusValue">In Progress</span><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="m6 9 6 6 6-6"/></svg></button>
            <div class="status-select-menu" id="fStatusMenu" role="listbox" aria-labelledby="fStatusLabel">
              <button type="button" class="status-select-option" role="option" aria-selected="true" data-status="in_progress" onclick="setStatusSelect('in_progress')">In Progress</button>
              <button type="button" class="status-select-option" role="option" aria-selected="false" data-status="delayed" onclick="setStatusSelect('delayed')">Delayed</button>
              <button type="button" class="status-select-option" role="option" aria-selected="false" data-status="awaiting_client" onclick="setStatusSelect('awaiting_client')">Awaiting Client</button>
              <button type="button" class="status-select-option" role="option" aria-selected="false" data-status="completed" onclick="setStatusSelect('completed')">Completed</button>
            </div>
          </div>
        </div>
        <div class="form-field">
          <label for="fPercent">% Complete</label>
          <input type="number" id="fPercent" min="0" max="100" value="0" />
        </div>
        <div class="form-field full">
          <label for="fToday">Today's update</label>
          <textarea id="fToday" placeholder="e.g. Hoarding install 80m completed"></textarea>
        </div>
        <div class="form-field full">
          <label for="fTomorrow">Next shift plan</label>
          <textarea id="fTomorrow" placeholder="e.g. Visual tarpaulin paste"></textarea>
        </div>
        <div class="form-field full">
          <label for="fIssues">Blockers</label>
          <textarea id="fIssues" placeholder="e.g. Sliding door — supplier delay"></textarea>
        </div>
        <div class="form-field full">
          <label for="fActions">Action items (one per line)</label>
          <textarea id="fActions" placeholder="Chase supplier on sliding door
Get design confirmation from client"></textarea>
        </div>
      </div>
      <div class="form-foot">
        <button type="button" class="btn btn-ghost" onclick="closeForm()">Cancel</button>
        <button type="submit" class="btn btn-primary">Save Site</button>
      </div>
    </form>
  </div>
</div>

<!-- REPORT MODAL -->
<div class="modal-bg" id="reportModal">
  <div class="modal" style="max-width: 760px;">
    <div class="modal-head">
      <h2>Daily Site Tracking Report</h2>
      <button class="x-btn" onclick="closeReport()">✕</button>
    </div>
    <div class="report-box" id="reportText">—</div>
    <div class="form-foot">
      <button class="btn btn-ghost" onclick="closeReport()">Close</button>
      <button class="btn btn-primary" onclick="copyReport()">Copy report</button>
      <button class="btn btn-ghost" onclick="sendReportWA()">Send via WhatsApp</button>
    </div>
  </div>
</div>

<div class="toast" id="toast">Copied!</div>

<script>
  const KEY = 'bl_sites_v1';
  const STATUS = {
    in_progress:    { label: 'In Progress',    cls: 'badge-green' },
    delayed:        { label: 'Delayed',        cls: 'badge-red' },
    awaiting_client:{ label: 'Awaiting Client', cls: 'badge-blue' },
    completed:      { label: 'Completed',      cls: 'badge-grey' },
  };

  function getSites() {
    try { return JSON.parse(localStorage.getItem(KEY)) || []; }
    catch { return []; }
  }
  function setSites(arr) {
    localStorage.setItem(KEY, JSON.stringify(arr));
  }

  function todayStr() {
    const d = new Date();
    return d.toLocaleDateString('en-GB', { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' });
  }
  function todayShort() {
    const d = new Date();
    return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
  }

  function render() {
    document.getElementById('todayDate').textContent = todayStr();
    const sites = getSites();

    const cnt = { in_progress: 0, delayed: 0, awaiting_client: 0, completed: 0 };
    sites.forEach(s => { cnt[s.status] = (cnt[s.status] || 0) + 1; });
    document.getElementById('cntActive').textContent  = cnt.in_progress;
    document.getElementById('cntDelayed').textContent = cnt.delayed;
    document.getElementById('cntWaiting').textContent = cnt.awaiting_client;
    document.getElementById('cntDone').textContent    = cnt.completed;

    const board = document.getElementById('board');
    if (sites.length === 0) {
      board.innerHTML = `
        <div class="empty">
          <h3>No sites being tracked</h3>
          <p>Add a site to begin today’s board, or load example sites to review the full workflow.</p>
        </div>`;
      return;
    }

    board.innerHTML = '<div class="grid">' + sites.map(siteCard).join('') + '</div>';
  }

  function siteCard(s) {
    const st = STATUS[s.status] || STATUS.in_progress;
    return `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">${escapeHtml(s.client)}</div>
            ${s.project ? `<div class="card-sub">${escapeHtml(s.project)}</div>` : ''}
          </div>
          <span class="badge ${st.cls}">${st.label}</span>
        </div>

        <div class="field-row">
          <div class="k">Today's update</div>
          <div class="v ${s.todayWork ? '' : 'dim'}">${escapeHtml(s.todayWork) || '—'}</div>
        </div>

        <div class="field-row">
          <div class="k">Next shift</div>
          <div class="v ${s.tomorrowPlan ? '' : 'dim'}">${escapeHtml(s.tomorrowPlan) || '—'}</div>
        </div>

        ${s.issues ? `
        <div class="field-row blockers">
          <div class="k">Blockers</div>
          <div class="v">${escapeHtml(s.issues)}</div>
        </div>` : ''}

        ${s.actions ? `
        <div class="field-row actions-row">
          <div class="k">Action items</div>
          <div class="v">${escapeHtml(s.actions)}</div>
        </div>` : ''}

        <div class="progress-row">
          <span>${s.percent || 0}%</span>
          <div class="progress"><div class="progress-fill" style="width:${s.percent || 0}%"></div></div>
        </div>

        <div class="card-actions">
          <button class="btn btn-ghost btn-sm" onclick="openEdit('${s.id}')">Edit</button>
          <button class="btn btn-danger btn-sm" onclick="deleteSite('${s.id}')">Delete</button>
        </div>
      </div>`;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return String(str).replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  function closeStatusSelect() {
    document.getElementById('fStatusMenu').classList.remove('open');
    document.querySelector('.status-select').classList.remove('open-up');
    document.getElementById('fStatusTrigger').setAttribute('aria-expanded', 'false');
  }
  function syncStatusSelect() {
    const value = document.getElementById('fStatus').value;
    const option = document.querySelector('#fStatusMenu [data-status="' + value + '"]');
    document.getElementById('fStatusValue').textContent = option ? option.textContent : 'In Progress';
    document.querySelectorAll('#fStatusMenu .status-select-option').forEach(btn => {
      btn.setAttribute('aria-selected', String(btn.dataset.status === value));
    });
    closeStatusSelect();
  }
  function toggleStatusSelect() {
    const menu = document.getElementById('fStatusMenu');
    const isOpen = menu.classList.toggle('open');
    const wrap = document.querySelector('.status-select');
    if (isOpen) {
      const rect = document.getElementById('fStatusTrigger').getBoundingClientRect();
      wrap.classList.toggle('open-up', window.innerHeight - rect.bottom - 16 < 190 && rect.top > window.innerHeight - rect.bottom);
    } else wrap.classList.remove('open-up');
    document.getElementById('fStatusTrigger').setAttribute('aria-expanded', String(isOpen));
  }
  function setStatusSelect(value) {
    document.getElementById('fStatus').value = value;
    syncStatusSelect();
  }

  function openAdd() {
    document.getElementById('formTitle').textContent = 'Add Site';
    document.getElementById('siteForm').reset();
    document.getElementById('fId').value = '';
    document.getElementById('fPercent').value = 0;
    syncStatusSelect();
    document.getElementById('formModal').classList.add('open');
  }
  function openEdit(id) {
    const s = getSites().find(x => x.id === id);
    if (!s) return;
    document.getElementById('formTitle').textContent = 'Edit Site';
    document.getElementById('fId').value = s.id;
    document.getElementById('fClient').value = s.client || '';
    document.getElementById('fProject').value = s.project || '';
    document.getElementById('fStatus').value = s.status || 'in_progress';
    syncStatusSelect();
    document.getElementById('fPercent').value = s.percent || 0;
    document.getElementById('fToday').value = s.todayWork || '';
    document.getElementById('fTomorrow').value = s.tomorrowPlan || '';
    document.getElementById('fIssues').value = s.issues || '';
    document.getElementById('fActions').value = s.actions || '';
    document.getElementById('formModal').classList.add('open');
  }
  function closeForm() {
    closeStatusSelect();
    document.getElementById('formModal').classList.remove('open');
  }

  function saveSite(e) {
    e.preventDefault();
    const id = document.getElementById('fId').value || ('s_' + Date.now());
    const sites = getSites();
    const idx = sites.findIndex(x => x.id === id);
    const site = {
      id,
      client: document.getElementById('fClient').value.trim(),
      project: document.getElementById('fProject').value.trim(),
      status: document.getElementById('fStatus').value,
      percent: parseInt(document.getElementById('fPercent').value, 10) || 0,
      todayWork: document.getElementById('fToday').value.trim(),
      tomorrowPlan: document.getElementById('fTomorrow').value.trim(),
      issues: document.getElementById('fIssues').value.trim(),
      actions: document.getElementById('fActions').value.trim(),
      updatedAt: new Date().toISOString(),
    };
    if (idx >= 0) sites[idx] = site;
    else sites.push(site);
    setSites(sites);
    closeForm();
    render();
    showToast(idx >= 0 ? 'Updated.' : 'Site added.');
    return false;
  }

  function deleteSite(id) {
    if (!confirm('Delete this site from the tracker?')) return;
    setSites(getSites().filter(x => x.id !== id));
    render();
    showToast('Deleted.');
  }

  function clearAll() {
    if (!confirm('Clear all local site data? This cannot be undone.')) return;
    setSites([]);
    render();
    showToast('Local data cleared.');
  }

  /* REPORT GENERATION */
  function buildReport() {
    const sites = getSites();
    if (sites.length === 0) return 'No sites to report.';

    const cnt = { in_progress: 0, delayed: 0, awaiting_client: 0, completed: 0 };
    sites.forEach(s => { cnt[s.status] = (cnt[s.status] || 0) + 1; });

    const lines = [];
    lines.push('DAILY SITE TRACKING REPORT — ' + todayShort());
    lines.push('');
    lines.push('═══════════════════════════════════════════════════');
    lines.push('');

    sites.forEach((s, i) => {
      const st = STATUS[s.status] || STATUS.in_progress;
      lines.push('SITE ' + (i + 1) + ' — ' + s.client + (s.project ? '  (' + s.project + ')' : ''));
      lines.push('Status:       ' + st.label.toUpperCase());
      lines.push('Today:        ' + (s.todayWork || '—'));
      lines.push('Tomorrow:     ' + (s.tomorrowPlan || '—'));
      if (s.issues) lines.push('Issues:       ' + s.issues);
      lines.push('% Complete:   ' + (s.percent || 0) + '%');
      lines.push('───────────────────────────────────────────────────');
    });

    const allActions = sites
      .filter(s => s.actions && s.actions.trim())
      .map(s => ({ client: s.client, lines: s.actions.split('\n').filter(l => l.trim()) }));

    if (allActions.length) {
      lines.push('');
      lines.push('ACTION REQUIRED:');
      let n = 1;
      allActions.forEach(a => {
        a.lines.forEach(line => {
          lines.push(n + '. [' + a.client + '] ' + line.trim());
          n++;
        });
      });
    }

    lines.push('');
    lines.push('📊 SUMMARY:');
    lines.push('- ' + sites.length + ' sites total');
    if (cnt.in_progress)      lines.push('- ' + cnt.in_progress + ' active');
    if (cnt.delayed)          lines.push('- ' + cnt.delayed + ' delayed');
    if (cnt.awaiting_client)  lines.push('- ' + cnt.awaiting_client + ' awaiting client');
    if (cnt.completed)        lines.push('- ' + cnt.completed + ' completed');

    return lines.join('\n');
  }

  function openReport() {
    document.getElementById('reportText').textContent = buildReport();
    document.getElementById('reportModal').classList.add('open');
  }
  function closeReport() {
    document.getElementById('reportModal').classList.remove('open');
  }
  function copyReport() {
    const text = document.getElementById('reportText').textContent;
    navigator.clipboard.writeText(text).then(() => showToast('Copied to clipboard!'));
  }
  function sendReportWA() {
    const text = document.getElementById('reportText').textContent;
    const url = 'https://wa.me/?text=' + encodeURIComponent(text);
    window.open(url, '_blank');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 1800);
  }

  /* SAMPLE DATA — based on the Lesson 1 proof moment */
  function loadSample() {
    if (getSites().length && !confirm('This will replace existing data. Continue?')) return;
    const sample = [
      {
        id: 's_sample_1',
        client: 'ABC Sdn Bhd',
        project: 'KL high-rise hoarding',
        status: 'in_progress',
        percent: 60,
        todayWork: 'Hoarding install — 80m completed',
        tomorrowPlan: 'Visual tarpaulin paste',
        issues: 'Minor injury reported — no work stoppage',
        actions: '',
        updatedAt: new Date().toISOString(),
      },
      {
        id: 's_sample_2',
        client: 'XYZ Construction',
        project: 'Mall lvl 2 fit-out',
        status: 'delayed',
        percent: 40,
        todayWork: 'Counterweight delivered, 50% installed',
        tomorrowPlan: 'Complete counterweight installation',
        issues: 'Sliding door — supplier delay',
        actions: 'Chase supplier on sliding door delivery',
        updatedAt: new Date().toISOString(),
      },
      {
        id: 's_sample_3',
        client: 'DEF Builders',
        project: 'Office reinstatement',
        status: 'awaiting_client',
        percent: 55,
        todayWork: 'Reinstatement tiling — 60% done',
        tomorrowPlan: 'Continue tiling',
        issues: 'Plaster ceiling — awaiting client design',
        actions: 'Get design confirmation from DEF Builders on plaster ceiling',
        updatedAt: new Date().toISOString(),
      },
    ];
    setSites(sample);
    render();
    showToast('Sample loaded.');
  }

  /* CLOSE MODAL ON BG CLICK */
  document.querySelectorAll('.modal-bg').forEach(bg => {
    bg.addEventListener('click', e => {
      if (e.target === bg) bg.classList.remove('open');
    });
  });
  document.addEventListener('click', e => {
    if (!e.target.closest('.status-select')) closeStatusSelect();
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeStatusSelect();
  });

  render();
</script>

</body>
</html>
