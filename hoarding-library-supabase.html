<script>
  (function(){
    var key='hg_hub_theme',media=window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)');
    function preference(){try{var saved=localStorage.getItem(key);if(saved==='light'||saved==='dark'||saved==='system')return saved;}catch(e){}return 'system';}
    function resolved(value){return value==='light'||value==='dark'?value:(media&&media.matches?'dark':'light');}
    function apply(value){var theme=resolved(value);document.documentElement.dataset.theme=theme;document.documentElement.style.colorScheme=theme;}
    apply(preference());window.addEventListener('message',function(event){if(!event.data||event.data.type!=='hg-theme-change')return;if(event.data.theme==='light'||event.data.theme==='dark')apply(event.data.theme);});window.addEventListener('storage',function(event){if(event.key===key)apply(preference());});
    if(media){var sync=function(){if(preference()==='system')apply('system');};if(media.addEventListener)media.addEventListener('change',sync);else if(media.addListener)media.addListener(sync);}
  })();
</script>

<style>
  :root{
    --bg:#0a0e1a; --panel:#141926; --panel2:#1c2335; --line:#2a3245;
    --ink:#ffffff; --mut:#a0a8b8; --acc:#f59e0b; --acc2:#d97706;
    --acc-soft:rgba(245,158,11,0.12);
    --ok:#22c55e; --warn:#f59e0b; --bad:#ef4444; --blue:#3b82f6; --chip:#1c2335;
    --radius:14px; --shadow:0 10px 40px rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;
    background:var(--bg);color:var(--ink);font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;min-height:100vh}
  a{color:var(--acc);cursor:pointer}
  header{position:sticky;top:0;z-index:20;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:16px;padding:14px 22px;flex-wrap:wrap}
  .brand-block{display:flex;align-items:center;gap:14px}
  .brand-logo{width:46px;height:46px;background:linear-gradient(135deg,var(--acc),var(--acc2));border-radius:12px;
    display:flex;align-items:center;justify-content:center;font-size:1.15rem;color:#0a0e1a;font-weight:900;letter-spacing:.02em}
  .brand-name{font-size:1.15rem;font-weight:800;letter-spacing:-0.02em;line-height:1.1}
  .brand-sub{font-size:.8rem;color:var(--mut);margin-top:2px}
  header .meta-pills{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  header .mpill{background:var(--bg);border:1px solid var(--line);padding:8px 14px;border-radius:999px;
    font-size:.82rem;color:var(--mut);display:flex;align-items:center;gap:7px}

  nav{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px;background:var(--panel);border-bottom:1px solid var(--line);
    position:sticky;top:75px;z-index:19}
  nav button{background:transparent;border:1px solid transparent;color:var(--mut);padding:8px 15px;border-radius:10px;
    cursor:pointer;font-size:13px;font-weight:600;font-family:inherit}
  nav button.active{background:var(--acc);color:#0a0e1a}
  nav button:hover:not(.active){background:var(--panel2);color:var(--ink);border-color:var(--line)}
  main{padding:24px;max-width:1320px;margin:0 auto}
  .view{display:none}.view.active{display:block}
  h2{font-size:1.4rem;font-weight:800;letter-spacing:-0.02em;margin:0 0 16px}
  h3{font-size:.85rem;text-transform:uppercase;letter-spacing:.05em;color:var(--acc);margin:18px 0 8px;font-weight:700}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:20px;margin-bottom:16px}
  .row{display:flex;gap:14px;flex-wrap:wrap}.row>*{flex:1;min-width:150px}
  label{display:block;font-size:.82rem;color:var(--mut);margin:0 0 6px;font-weight:600}
  input,select,textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);
    border-radius:8px;padding:10px 12px;font-size:14px;font-family:inherit}
  input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc)}
  textarea{resize:vertical;min-height:54px}
  button.btn{display:inline-flex;align-items:center;gap:8px;background:var(--acc);color:#0a0e1a;border:none;border-radius:10px;
    padding:11px 18px;font-weight:700;cursor:pointer;font-size:14px;font-family:inherit;transition:transform .1s,background .2s}
  button.btn:hover{background:var(--acc2)}button.btn:active{transform:translateY(1px)}
  button.ghost{background:var(--panel);color:var(--ink);border:1px solid var(--line)}
  button.ghost:hover{background:var(--panel2);border-color:var(--acc)}

  button.okbtn{background:var(--ok);color:#04240f}button.okbtn:hover{filter:brightness(1.1)}
  .muted{color:var(--mut)}

  tr:hover td{background:var(--panel2)}
  .right{text-align:right}
  .pill{display:inline-block;padding:2px 9px;border-radius:999px;font-size:11px;font-weight:700;white-space:nowrap}
  .p-Completed,.p-Paid,.p-Available{background:#14432a;color:#86efac}
  .p-Scheduled,.p-Open,.p-Planned{background:#1e3a5f;color:#93c5fd}
  .p-InProgress,.p-Partial,.p-Dispatched{background:#4a3a12;color:#fcd34d}
  .p-Cancelled,.p-Void{background:var(--line);color:var(--mut)}
  .p-Unpaid{background:#374151;color:#d1d5db}
  .p-Overdue,.p-Deployed{background:#4c1d24;color:#fca5a5}
  .p-Maintenance{background:#3a2a4a;color:#d8b4fe}

  .sv-Lorry{background:#13344a;color:#7dd3fc}.sv-Mover{background:#143a2a;color:#86efac}.sv-Rorobin{background:#4a3413;color:#fcd34d}
  .tag{display:inline-block;background:var(--chip);border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:11px;color:var(--mut)}

  dialog{background:var(--panel);color:var(--ink);border-color:var(--line);border-radius:12px}dialog::backdrop{background:rgba(12,18,20,.58);backdrop-filter:blur(2px)}.modal-h{padding:18px 20px}.modal-b{padding:20px}.modal-f{position:sticky;bottom:0;background:var(--panel);padding:14px 20px}
  html[data-theme="dark"]{--bg:#1b2527;--panel:#202b2d;--panel2:#253133;--line:#394749;--ink:#f3f6f4;--mut:#b3bebb;--acc:#73aeba;--acc2:#8bc0c9;--acc-soft:#293d40;--ok:#65c99a;--ok-soft:#1d352b;--warn:#e2ae5b;--warn-soft:#382f1e;--bad:#ef8587;--bad-soft:#3a2528;--blue:#79b2ce;--chip:#253133;--shadow:0 14px 34px rgba(0,0,0,.38)}html[data-theme="dark"] header .mpill,html[data-theme="dark"] .card,html[data-theme="dark"] input,html[data-theme="dark"] select,html[data-theme="dark"] textarea,html[data-theme="dark"] button.hub-select-trigger,html[data-theme="dark"] .hub-select-menu,html[data-theme="dark"] dialog,html[data-theme="dark"] .bin{background:var(--panel);border-color:var(--line);color:var(--ink)}html[data-theme="dark"] .bin.over{border-color:var(--bad)}html[data-theme="dark"] select{background-image:none}html[data-theme="dark"] .brand-sub,html[data-theme="dark"] nav button,html[data-theme="dark"] label,html[data-theme="dark"] .stat .l,html[data-theme="dark"] th{color:var(--mut)}html[data-theme="dark"] button.ghost{background:var(--panel);color:#c5dde1}html[data-theme="dark"] button.danger{background:var(--panel)}html[data-theme="dark"] button.hub-select-option:hover,html[data-theme="dark"] button.hub-select-option.selected{background:var(--acc-soft);color:#c8e4e8}
  @media(max-width:760px){#app{padding:20px 16px 84px}header{flex-wrap:nowrap}.brand-sub{display:none}.meta-pills #dateNow{display:none}nav{gap:24px;margin-left:-16px;margin-right:-16px;padding:0 16px}.view>h2{font-size:1.35rem}.row.tool-snapshot{grid-template-columns:repeat(2,minmax(0,1fr));padding:0}.row.tool-snapshot .stat{padding:16px 18px;border-right:1px solid var(--line);border-bottom:1px solid var(--line)}.row.tool-snapshot .stat:nth-child(2n){border-right:0}.row.tool-snapshot .stat:last-child{border-bottom:0}.toolbar{align-items:stretch}.toolbar input,.toolbar .hub-select,.toolbar button{width:100%;min-width:0;flex:1 1 100%}table{min-width:760px}.card:has(>table){overflow-x:auto}.modal-f>*{flex:1 1 auto;min-height:44px}.hub-select-menu{max-height:min(260px,45vh)}button.hub-select-option{min-height:44px}.section-head{align-items:flex-start;flex-direction:column}.section-head button{width:100%}}
  @media print{nav,header .meta-pills,.noprint{display:none}}

</head>
<body>
<script>if(window.self!==window.top)document.body.classList.add('embedded');</script>

<!-- GATE 1 · LOGIN -->
<div class="gate" id="gateLogin" style="display:none;">
  <div class="card">
    <div class="brand-logo">HG</div>
    <h2>Hoarding Measurement Library</h2>
    <div class="sub">Sign in with your HG email and password.</div>
    <input id="loginEmail" type="email" placeholder="you@hggroup.com.my" autocomplete="username" style="width:100%;margin-bottom:8px;">
      <input id="loginPass" type="password" placeholder="Password" autocomplete="current-password" style="width:100%;" onkeydown="if(event.key==='Enter'){signIn();}">
      <button class="btn" style="width:100%;margin-top:14px;justify-content:center;" onclick="signIn()">Sign in</button>
    <div id="loginMsg" class="msg"></div>
  </div>
</div>

<!-- GATE 2 · NOT ON ALLOWLIST -->
<div class="gate" id="gateDenied" style="display:none;">
  <div class="card">
    <div class="brand-logo" aria-hidden="true"><i class="ui-icon" data-lucide="lock-keyhole"></i></div>
    <h2>Not authorised</h2>
    <div class="sub"><span id="deniedEmail"></span> is not on the access list.<br>
      Ask your admin to add you under <b>Settings → Team access</b>.</div>
    <button class="ghost" style="width:100%;margin-top:10px;" onclick="signOut()">Use a different account</button>
  </div>
</div>

<!-- THE APP -->
<div id="app" style="display:none;">
<header>
  <div class="brand-block">
    <div class="brand-logo" aria-hidden="true"><i data-lucide="ruler"></i></div>
    <div>
      <div class="brand-name">Hoarding Library <span class="tool-live">Live</span></div>
      <div class="brand-sub">Measurement records, mall rates, and the Gmail mail-bot log.</div>
    </div>
  </div>
  <div class="meta-pills">
    <div class="mpill" id="dateNow">—</div>
    <div class="mpill"><i class="ui-icon" data-lucide="user-round" aria-hidden="true"></i><strong id="who">…</strong><button onclick="signOut()">Sign out</button></div>
  </div>
</header>
<nav id="nav"></nav>
<main>
  <div class="view active" id="v-records"></div>
  <div class="view" id="v-rates"></div>
  <div class="view" id="v-mailbot"></div>
</main>
</div>

<dialog id="modal">
  <div class="modal-h"><h2 id="m-title">…</h2><button class="x" aria-label="Close" onclick="closeModal()"><i class="ui-icon" data-lucide="x"></i></button></div>
  <div class="modal-b" id="m-body"></div>
  <div class="modal-f" id="m-foot"></div>
</dialog>
<div id="toast"></div>

<script>
/* ===================== CONFIG / AUTH (copied from transport-supabase template) ===================== */
var sb=null, SESSION=null, IS_ADMIN=false;
var SST_RATE=0.06;

function gel(id){return document.getElementById(id);}
function showMsg(id,t,ok){var m=gel(id);m.textContent=t;m.className='msg show '+(ok?'ok':'err');setTimeout(function(){m.classList.remove('show');},4500);}

async function start(){
  /* same-origin hg-api — no connect gate */
  sb=window.hg.createClient();
  var s=await sb.auth.getSession();SESSION=s.data.session;
  sb.auth.onAuthStateChange(function(_e,session){if(!!session!==!!SESSION){SESSION=session;route();}});
  route();
}
async function route(){
  ['gateLogin','gateDenied'].forEach(function(g){gel(g).style.display='none';});
  gel('app').style.display='none';
  if(!SESSION){gel('gateLogin').style.display='flex';return;}
  var email=(SESSION.user.email||'').toLowerCase();
  IS_ADMIN=(SESSION.user.role==='admin');
  gel('app').style.display='block';
  DB.currentUser=email;
  gel('who').textContent=email;
  boot();
}
function signIn(){
  var email=((document.getElementById('loginEmail')||{}).value||'').trim();
  var pass=(document.getElementById('loginPass')||{}).value||'';
  if(!email||!pass){ showMsg('loginMsg','Enter email and password.', false); return; }
  sb.auth.signInWithPassword({email:email,password:pass}).then(function(r){
    if(r.error){ showMsg('loginMsg', r.error.message, false); return; }
    SESSION = r.data.session; route();
  });
}
function signOut(){sb.auth.signOut().then(function(){location.reload();});}
async function audit(action,recordType,recordId,details){
  try{await sb.rpc('log_audit',{p_action:action+(recordType?' '+recordType:''),p_details:(recordId?recordId+' · ':'')+(details||'')});}catch(e){}
}
function ico(name){return '<i class="ui-icon" data-lucide="'+name+'" aria-hidden="true"></i>';}

/* ===================== SHARED HELPERS (from template) ===================== */
var DB={currentUser:''};
function toast(msg,kind){var t=gel('toast');t.textContent=msg;t.className=kind||'';t.style.display='block';clearTimeout(t._t);t._t=setTimeout(function(){t.style.display='none';},kind==='bad'?5500:2600);}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
function rm(n){return 'RM '+(Number(n)||0).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2});}
function num(n){return (Number(n)||0).toLocaleString('en-MY',{maximumFractionDigits:2});}
function num_(v){return Number(v)||0;}
function round2_(n){return Math.round((Number(n)||0)*100)/100;}
function field(lbl,inner){return '<div><label>'+lbl+'</label>'+inner+'</div>';}
function stat(n,l,cls){return '<div class="stat"><div class="n '+(cls||'')+'">'+n+'</div><div class="l">'+l+'</div></div>';}
function val(id){var e=gel(id);return e?String(e.value).trim():'';}
function byId(arr,id){return arr.filter(function(x){return String(x.id)===String(id);})[0];}
function busy(btn){if(btn){btn.disabled=true;btn.dataset.html=btn.innerHTML;btn.innerHTML='<span class="spin"></span> working…';}}
function unbusy(btn){if(btn&&btn.dataset.html){btn.disabled=false;btn.innerHTML=btn.dataset.html;}}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,7);}
function openModal(t,b,f){gel('m-title').innerHTML=t;gel('m-body').innerHTML=b;gel('m-foot').innerHTML=f||'';gel('modal').showModal();initHubSelects(gel('modal'));syncHubSelects(gel('modal'));if(window.lucide)window.lucide.createIcons();}
function closeModal(){gel('modal').close();}
function fmtRM(n){return n==null?'—':rm(n);}

/* Shared HG Hub dropdown treatment. Native selects remain the source of truth. */
function closeHubSelects(except){document.querySelectorAll('.hub-select.open').forEach(function(wrap){if(wrap!==except){wrap.classList.remove('open','open-up');var trigger=wrap.querySelector('.hub-select-trigger');if(trigger)trigger.setAttribute('aria-expanded','false');}});}
function syncHubSelects(root){(root||document).querySelectorAll('select[data-hub-select]').forEach(function(select){if(select._hubSelectSync)select._hubSelectSync();});}
function initHubSelects(root){
  (root||document).querySelectorAll('select:not([data-hub-select]):not([multiple])').forEach(function(select){
    var wrap=document.createElement('div');wrap.className='hub-select';select.parentNode.insertBefore(wrap,select);wrap.appendChild(select);select.dataset.hubSelect='true';select.classList.add('hub-select-native');select.tabIndex=-1;select.setAttribute('aria-hidden','true');
    var trigger=document.createElement('button');trigger.type='button';trigger.className='hub-select-trigger';trigger.setAttribute('aria-haspopup','listbox');trigger.setAttribute('aria-expanded','false');var menu=document.createElement('div');menu.className='hub-select-menu';menu.setAttribute('role','listbox');wrap.appendChild(trigger);wrap.appendChild(menu);
    function sync(){var selected=select.options[select.selectedIndex];trigger.textContent=selected?selected.textContent:'Select';trigger.disabled=select.disabled;menu.innerHTML='';Array.prototype.forEach.call(select.options,function(option){var item=document.createElement('button');item.type='button';item.className='hub-select-option'+(option.selected?' selected':'');item.textContent=option.textContent;item.disabled=option.disabled;item.setAttribute('role','option');item.setAttribute('aria-selected',option.selected?'true':'false');item.addEventListener('click',function(event){event.stopPropagation();select.value=option.value;select.dispatchEvent(new Event('change',{bubbles:true}));closeHubSelects();});menu.appendChild(item);});}
    select._hubSelectSync=sync;select.addEventListener('change',sync);new MutationObserver(sync).observe(select,{childList:true,subtree:true,attributes:true});trigger.addEventListener('click',function(event){event.stopPropagation();var open=!wrap.classList.contains('open');closeHubSelects(wrap);sync();if(open){var rect=trigger.getBoundingClientRect(),estimated=Math.min(260,menu.children.length*44+10);wrap.classList.toggle('open-up',window.innerHeight-rect.bottom-16<estimated&&rect.top>window.innerHeight-rect.bottom);}else wrap.classList.remove('open-up');wrap.classList.toggle('open',open);trigger.setAttribute('aria-expanded',open?'true':'false');});sync();
  });
}
document.addEventListener('pointerdown',function(event){if(!event.target.closest('.hub-select'))closeHubSelects();},true);
document.addEventListener('keydown',function(event){if(event.key==='Escape')closeHubSelects();});

/* dropzone */
var DROPS={};
function dz(id,multiple,accept,label){DROPS[id]={files:[],multiple:!!multiple};
  return '<div class="dz" id="dz-'+id+'" ondragover="dzOver(event,\''+id+'\')" ondragleave="dzLeave(\''+id+'\')" ondrop="dzDrop(event,\''+id+'\')" onclick="document.getElementById(\'dzi-'+id+'\').click()">'+
    '<input type="file" id="dzi-'+id+'" '+(multiple?'multiple':'')+' accept="'+(accept||'image/*')+'" style="display:none" onchange="dzPick(\''+id+'\',this.files)">'+
    '<div class="hint">'+(label||ico('camera')+'Tap to snap or upload')+'</div><div class="dz-files" id="dzf-'+id+'"></div></div>';}
function dzOver(e,id){e.preventDefault();var el=gel('dz-'+id);if(el)el.classList.add('over');}
function dzLeave(id){var el=gel('dz-'+id);if(el)el.classList.remove('over');}
function dzDrop(e,id){e.preventDefault();dzLeave(id);dzPick(id,e.dataTransfer.files);}
function dzPick(id,fl){var d=DROPS[id];if(!d)return;var arr=Array.prototype.slice.call(fl);d.files=d.multiple?d.files.concat(arr):arr.slice(0,1);dzRender(id);}
function dzRender(id){var d=DROPS[id];var el=gel('dzf-'+id);if(!el)return;el.innerHTML=d.files.map(function(f,i){return '<span class="dz-chip">'+esc(f.name)+'<b aria-label="Remove file" onclick="event.stopPropagation();dzRemove(\''+id+'\','+i+')">'+ico('x')+'</b></span>';}).join('');if(window.lucide)window.lucide.createIcons();}
function dzRemove(id,i){DROPS[id].files.splice(i,1);dzRender(id);}

/* ===================== DATA MODEL ===================== */
var DOOR_TYPES=['sliding','swing','both','none','unknown'];
var RATE_UNITS=['m²','sqft','nos','m run','ft run','lump sum'];

function parseFiles(v){
  if(Array.isArray(v))return v;
  if(typeof v==='string'){var s=v.trim();if(!s)return [];try{var j=JSON.parse(s);return Array.isArray(j)?j:[];}catch(e){return [];}}
  return [];
}
function mRec(r){return {
  id:r.id,lot:r.lot,mall:r.mall,tenant:r.tenant,
  lengthM:num_(r.length_m),heightM:num_(r.height_m),areaM2:num_(r.area_m2),
  panels:r.panels,doorType:r.door_type,doorQty:num_(r.door_qty),doorSize:r.door_size,
  drawingNo:r.drawing_no,date:(r.date||'').toString().slice(0,10),notes:r.notes,
  driveFileId:r.drive_file_id,fileName:r.file_name,createdAt:r.created_at,
  run:r.run,groupId:r.group_id,files:parseFiles(r.files)};}
function recToPayload(r){return {
  lot:r.lot,mall:r.mall,tenant:r.tenant,
  length_m:r.lengthM,height_m:r.heightM,area_m2:r.areaM2,
  panels:r.panels,door_type:r.doorType,door_qty:r.doorQty,door_size:r.doorSize,
  drawing_no:r.drawingNo,date:r.date||null,notes:r.notes,
  drive_file_id:r.driveFileId,file_name:r.fileName,run:r.run,group_id:r.groupId,
  files:JSON.stringify(r.files||[])};}
function mRate(r){return {id:r.id,mall:r.mall,item:r.item,unit:r.unit,rate:num_(r.rate_rm)};}
function mLog(r){return {id:r.id,at:r.at,kind:r.kind,message:r.message};}

/* ===================== RATE / ESTIMATE (ported from original) ===================== */
function findRate(rates, mall, itemMatch){
  var norm=function(s){return (s||'').toLowerCase();};
  var forMall=rates.filter(function(r){return norm(r.mall)===norm(mall)&&itemMatch(norm(r.item));});
  if(forMall.length)return forMall[0];
  var generic=rates.filter(function(r){return norm(r.mall)==='all'&&itemMatch(norm(r.item));});
  return generic[0]||null;
}
function hoardAmount(rate, rec){
  var u=String(rate.unit||'').toLowerCase();
  if(u==='sqft')     return rec.areaM2>0?rec.areaM2*10.7639*rate.rate:null;
  if(u==='m run')    return rec.lengthM>0?rec.lengthM*rate.rate:null;
  if(u==='ft run')   return rec.lengthM>0?rec.lengthM*3.28084*rate.rate:null;
  if(u==='lump sum') return rate.rate;
  return rec.areaM2>0?rec.areaM2*rate.rate:null;
}
function estimateValue(rec, rates){
  var total=0, any=false;
  var hoardRate=findRate(rates, rec.mall, function(i){return i.indexOf('new hoarding')>=0||i==='hoarding';});
  if(hoardRate){var amt=hoardAmount(hoardRate, rec);if(amt!==null){total+=amt;any=true;}}
  if(rec.doorQty>0){
    var wantSwing=rec.doorType==='swing';
    var doorRate=findRate(rates, rec.mall, function(i){return i.indexOf(wantSwing?'swing':'sliding')>=0&&i.indexOf('door')>=0;})
              || findRate(rates, rec.mall, function(i){return i.indexOf('door')>=0;});
    if(doorRate){total+=rec.doorQty*doorRate.rate;any=true;}
  }
  return any?total:null;
}

/* ===================== STATE ===================== */
var TABS=[['records','Records'],['rates','Rates'],['mailbot','MailBot Log']];
var RATES=[];
var REC_ROWS=[], REC_LIMIT=200, REC_HASMORE=false, REC_SEARCH='', REC_MALL='';
var REC_SORT={k:'date',dir:-1};
var KNOWN_MALLS={};
var MB_ROWS=[], MB_LIMIT=200, MB_HASMORE=false, MB_LOADED=false;

/* ===================== BOOTSTRAP ===================== */
async function boot(){
  buildNav();
  gel('dateNow').textContent=new Date().toLocaleDateString('en-MY',{day:'numeric',month:'short',year:'numeric'});
  try{
    await loadRates();
    await loadRecords();
    renderRecords();
    renderRates();
    initHubSelects(document);syncHubSelects(document);
    if(window.lucide)window.lucide.createIcons();
  }catch(e){
    gel('v-records').innerHTML='<div class="card card-error">'+ico('triangle-alert')+'<span>'+esc(e.message||e)+'</span></div>';
    if(window.lucide)window.lucide.createIcons();
  }
}
function buildNav(){var n=gel('nav');n.innerHTML=TABS.map(function(t,i){return '<button data-t="'+t[0]+'"'+(i===0?' class="active"':'')+'>'+t[1]+'</button>';}).join('');
  n.querySelectorAll('button').forEach(function(b){b.onclick=function(){show(b.dataset.t);};});}
function show(t){
  document.querySelectorAll('nav button').forEach(function(b){b.classList.toggle('active',b.dataset.t===t);});
  document.querySelectorAll('.view').forEach(function(v){v.classList.remove('active');});gel('v-'+t).classList.add('active');
  if(t==='mailbot'&&!MB_LOADED){loadMailbot().then(function(){MB_LOADED=true;renderMailbot();}).catch(function(e){gel('v-mailbot').innerHTML='<div class="card card-error">'+ico('triangle-alert')+'<span>'+esc(e.message||e)+'</span></div>';if(window.lucide)window.lucide.createIcons();});}
  window.scrollTo(0,0);
}

/* ===================== LOADERS ===================== */
async function loadRates(){
  var r=await sb.from('hlib_rates').select('*').order('mall');
  if(r.error)throw r.error;
  RATES=(r.data||[]).map(mRate);
}
async function loadRecords(){
  REC_ROWS = REC_SEARCH ? await searchRecords(REC_SEARCH) : await pageRecords();
  REC_ROWS.forEach(function(r){r.estValue=estimateValue(r,RATES);});
  // group totals across records sharing a group_id
  var gSum={}, gCount={};
  REC_ROWS.forEach(function(r){if(r.groupId){gSum[r.groupId]=(gSum[r.groupId]||0)+(r.estValue||0);gCount[r.groupId]=(gCount[r.groupId]||0)+1;}});
  REC_ROWS.forEach(function(r){r.groupTotal=(r.groupId&&gCount[r.groupId]>1)?gSum[r.groupId]:null;});
  REC_ROWS.forEach(function(r){if(r.mall)KNOWN_MALLS[r.mall]=1;});
}
async function pageRecords(){
  var q=sb.from('hlib_records').select('*');
  if(REC_MALL)q=q.eq('mall',REC_MALL);
  q=q.order('date',{ascending:false}).limit(REC_LIMIT+1);
  var r=await q;if(r.error)throw r.error;
  var rows=(r.data||[]).map(mRec);
  REC_HASMORE=rows.length>REC_LIMIT;
  if(REC_HASMORE)rows=rows.slice(0,REC_LIMIT);
  return rows;
}
// Search fires one ilike per column (lot/mall/tenant/drawing_no) then merges unique by id.
// Uses only the guaranteed .ilike surface so it works regardless of server-side OR support.
async function searchRecords(term){
  var pat='%'+term+'%';
  var cols=['lot','mall','tenant','drawing_no'];
  var res=await Promise.all(cols.map(function(c){return sb.from('hlib_records').select('*').ilike(c,pat).limit(300);}));
  var seen={}, out=[];
  res.forEach(function(r){if(r.error)return;(r.data||[]).forEach(function(row){if(!seen[row.id]){seen[row.id]=1;out.push(mRec(row));}});});
  if(REC_MALL)out=out.filter(function(r){return r.mall===REC_MALL;});
  REC_HASMORE=false;
  return out;
}
async function loadMailbot(){
  var r=await sb.from('hlib_mailbot_log').select('*').order('at',{ascending:false}).limit(MB_LIMIT+1);
  if(r.error)throw r.error;
  var rows=(r.data||[]).map(mLog);
  MB_HASMORE=rows.length>MB_LIMIT;
  if(MB_HASMORE)rows=rows.slice(0,MB_LIMIT);
  MB_ROWS=rows;
}

/* ===================== RECORDS VIEW ===================== */
function sortedRecords(){
  var rows=REC_ROWS.slice();
  var k=REC_SORT.k, dir=REC_SORT.dir;
  rows.sort(function(a,b){
    var va=a[k], vb=b[k];
    if(typeof va==='number'||typeof vb==='number')return ((va||0)-(vb||0))*dir;
    return String(va||'').localeCompare(String(vb||''))*dir;
  });
  return rows;
}
function mallOptions(sel){
  var malls=Object.keys(KNOWN_MALLS).sort();
  return '<option value="">All malls (loaded)</option>'+malls.map(function(m){return '<option'+(m===sel?' selected':'')+'>'+esc(m)+'</option>';}).join('');
}
function renderRecords(){
  var rows=sortedRecords();
  var totArea=rows.reduce(function(a,r){return a+(r.areaM2||0);},0);
  var totDoors=rows.reduce(function(a,r){return a+(r.doorQty||0);},0);
  var totVal=rows.reduce(function(a,r){return a+(r.estValue||0);},0);
  var loadedNote=REC_SEARCH?('Search matches: '+rows.length):('Latest '+rows.length+' by date'+(REC_HASMORE?' (more available)':''));

  gel('v-records').innerHTML=
    '<h2>Records</h2>'+
    '<div class="row tool-snapshot noprint">'+
      stat(rows.length,'Rows shown')+
      stat(num(totArea)+' m²','Total area')+
      stat(totDoors,'Doors')+
      stat(fmtRM(totVal||null),'Est. value')+'</div>'+
    '<div class="card noprint"><div class="toolbar">'+

/* attached-file + drawing links */
function fileLinks(r){
  var out=[];
  (r.files||[]).forEach(function(f){
    var url=f.url||(f.store==='drive'&&f.id?('https://drive.google.com/file/d/'+f.id+'/view'):'');
    if(url)out.push('<a href="'+esc(url)+'" target="_blank" rel="noopener">'+ico('file')+' '+esc(f.name||'file')+'</a>');
    else out.push('<span class="tag">'+esc(f.name||'file')+'</span>');
  });
  if(r.driveFileId){
    var durl='https://drive.google.com/file/d/'+r.driveFileId+'/view';
    if(!out.join('').includes(r.driveFileId))out.unshift('<a href="'+esc(durl)+'" target="_blank" rel="noopener">'+ico('file-text')+' '+esc(r.fileName||'Drawing (Drive)')+'</a>');
  }
  return out.length?out.join('<br>'):'<span class="muted">No files attached</span>';
}

function openDetail(id){
  var r=byId(REC_ROWS,id);if(!r)return;
  var comp=r.lengthM*r.heightM;
  var stated=r.areaM2;
  var crossHtml;
  if(comp>0&&stated>0){
    var diff=stated-comp;var pct=Math.abs(diff)/comp*100;
    var ok=pct<=5;
    crossHtml='<tr><td class="k">L × H (computed)</td><td>'+num(comp)+' m²</td></tr>'+
      '<tr><td class="k">Area stated</td><td>'+num(stated)+' m²</td></tr>'+
      '<tr><td class="k">Cross-check</td><td><span class="pill '+(ok?'p-Completed':'p-Overdue')+'">'+(ok?'OK':'CHECK')+' · Δ '+num(diff)+' m² ('+num(pct)+'%)</span></td></tr>';
  }else{
    crossHtml='<tr><td class="k">Cross-check</td><td class="muted">Need length, height and area to compare</td></tr>';
  }
  var body='<table class="kv">'+
    '<tr><td class="k">Lot</td><td><b>'+esc(r.lot||'—')+'</b>'+(r.run?' · '+esc(r.run):'')+'</td></tr>'+
    '<tr><td class="k">Mall</td><td>'+esc(r.mall||'—')+'</td></tr>'+
    '<tr><td class="k">Tenant</td><td>'+esc(r.tenant||'—')+'</td></tr>'+
    '<tr><td class="k">Length / Height</td><td>'+(r.lengthM||'?')+' m × '+(r.heightM||'?')+' m</td></tr>'+
    crossHtml+
    '<tr><td class="k">Panels</td><td>'+esc(r.panels||'—')+'</td></tr>'+
    '<tr><td class="k">Door</td><td>'+esc(r.doorType||'—')+(r.doorQty?' × '+r.doorQty:'')+(r.doorSize?' · '+esc(r.doorSize):'')+'</td></tr>'+
    '<tr><td class="k">Drawing no</td><td>'+esc(r.drawingNo||'—')+'</td></tr>'+
    '<tr><td class="k">Date</td><td>'+esc(r.date||'—')+'</td></tr>'+
    '<tr><td class="k">Est. value</td><td>'+fmtRM(r.estValue)+(r.groupTotal!=null?' · group '+fmtRM(r.groupTotal):'')+'</td></tr>'+
    '<tr><td class="k">Notes</td><td>'+esc(r.notes||'—')+'</td></tr>'+
    '<tr><td class="k">Drawing / files</td><td>'+fileLinks(r)+'</td></tr>'+
  '</table>';
  openModal(esc(r.lot||'Record')+(r.run?' · '+esc(r.run):''),body,
    '<button class="ghost" onclick="closeModal()">Close</button><button class="btn" onclick="openRecordForm(\''+r.id+'\')">'+ico('pencil')+'Edit</button>');
}

/* ===================== ADD / EDIT RECORD ===================== */
var EDIT_ID=null;
function openRecordForm(id){
  EDIT_ID=id;
  var r=id?byId(REC_ROWS,id):{lot:'',run:'',mall:'',tenant:'',lengthM:'',heightM:'',areaM2:'',panels:'',doorType:'none',doorQty:0,doorSize:'',drawingNo:'',date:new Date().toISOString().slice(0,10),notes:'',driveFileId:'',fileName:'',files:[]};
  if(!r)return;
  var doorOpts=DOOR_TYPES.map(function(t){return '<option'+(t===r.doorType?' selected':'')+'>'+t+'</option>';}).join('');
  var existingFiles=(r.files&&r.files.length)?'<div class="hint">Existing files: '+r.files.map(function(f){return esc(f.name||'file');}).join(', ')+'</div>':'';
  var body=
    '<div class="row"><div><label>Lot No *</label><input id="f-lot" value="'+esc(r.lot)+'"></div>'+
      '<div><label>Run / Area</label><input id="f-run" value="'+esc(r.run)+'" placeholder="e.g. Run A"></div></div>'+
    '<div class="row"><div><label>Mall</label><input id="f-mall" value="'+esc(r.mall)+'"></div>'+
      '<div><label>Tenant / Shop</label><input id="f-tenant" value="'+esc(r.tenant)+'"></div></div>'+
    '<div class="row"><div><label>Length (m)</label><input id="f-lengthM" type="number" step="0.01" value="'+(r.lengthM||'')+'" oninput="autoArea()"></div>'+
      '<div><label>Height (m)</label><input id="f-heightM" type="number" step="0.01" value="'+(r.heightM||'')+'" oninput="autoArea()"></div>'+
      '<div><label>Area (m²)</label><input id="f-areaM2" type="number" step="0.01" value="'+(r.areaM2||'')+'" placeholder="auto = L × H"></div></div>'+
    '<div class="row"><div><label>Panels</label><input id="f-panels" value="'+esc(r.panels)+'"></div>'+
      '<div><label>Door Type</label><select id="f-doorType">'+doorOpts+'</select></div>'+
      '<div><label>Door Qty</label><input id="f-doorQty" type="number" step="1" value="'+(r.doorQty||0)+'"></div>'+
      '<div><label>Door Size</label><input id="f-doorSize" value="'+esc(r.doorSize)+'"></div></div>'+
    '<div class="row"><div><label>Drawing No</label><input id="f-drawingNo" value="'+esc(r.drawingNo)+'"></div>'+
      '<div><label>Date</label><input id="f-date" type="date" value="'+esc(r.date)+'"></div>'+
      '<div><label>Drive File ID (legacy)</label><input id="f-driveFileId" value="'+esc(r.driveFileId||'')+'" placeholder="Google Drive id"></div></div>'+
    '<div style="margin-top:10px"><label>Notes</label><textarea id="f-notes" rows="3">'+esc(r.notes||'')+'</textarea></div>'+
    '<div style="margin-top:10px"><label>Attach drawing / site photos (uploads to hoarding-library storage)</label>'+dz('recfile',true,'.pdf,image/png,image/jpeg,image/webp',ico('upload')+'Drop PDF or images')+existingFiles+'</div>';
  openModal(id?'Edit record':'Add record',body,
    '<button class="ghost" onclick="closeModal()">Cancel</button><button class="btn" onclick="saveRecord(this)">'+ico('save')+'Save</button>');
}
function autoArea(){
  var l=parseFloat(val('f-lengthM'))||0, h=parseFloat(val('f-heightM'))||0;
  var a=gel('f-areaM2');
  if(a&&!a.value&&l&&h)a.value=(l*h).toFixed(2);
}
async function uploadDrawings(rec){
  var files=(DROPS['recfile']&&DROPS['recfile'].files)||[];
  var out=[];
  for(var i=0;i<files.length;i++){
    var f=files[i];
    var base=(rec.lot||'lot').replace(/[^\w-]+/g,'_');
    var path='drawings/'+base+'/'+Date.now()+'-'+i+'-'+f.name.replace(/[^\w.\-]+/g,'_');
    var up=await sb.storage.from('hoarding-library').upload(path,f);
    if(up.error)throw up.error;
    var stored=(up.data&&up.data.path)||path;
    var pub=sb.storage.from('hoarding-library').getPublicUrl(stored);
    out.push({name:f.name,path:stored,url:(pub.data&&pub.data.publicUrl)||'',store:'hoarding-library'});
  }
  return out;
}
async function saveRecord(btn){
  var lot=val('f-lot');
  if(!lot){toast('Lot No is required','bad');return;}
  busy(btn);
  try{
    var existing=EDIT_ID?byId(REC_ROWS,EDIT_ID):null;
    var rec={
      lot:lot,run:val('f-run'),mall:val('f-mall'),tenant:val('f-tenant'),
      lengthM:parseFloat(val('f-lengthM'))||0,heightM:parseFloat(val('f-heightM'))||0,
      areaM2:parseFloat(val('f-areaM2'))||0,panels:val('f-panels'),doorType:val('f-doorType'),
      doorQty:parseInt(val('f-doorQty'))||0,doorSize:val('f-doorSize'),drawingNo:val('f-drawingNo'),
      date:val('f-date'),notes:val('f-notes'),driveFileId:val('f-driveFileId'),
      groupId:existing?existing.groupId:''
    };
    if(!rec.areaM2&&rec.lengthM&&rec.heightM)rec.areaM2=+(rec.lengthM*rec.heightM).toFixed(2);
    var uploaded=await uploadDrawings(rec);
    var files=(existing&&existing.files)?existing.files.slice():[];
    files=files.concat(uploaded);
    rec.files=files;
    rec.fileName=(existing&&existing.fileName)||(uploaded.length?uploaded[0].name:'');
    var payload=recToPayload(rec);
    var r;
    if(EDIT_ID){
      r=await sb.from('hlib_records').update(payload).eq('id',EDIT_ID);
    }else{
      payload.id=uid();payload.created_at=new Date().toISOString();
      r=await sb.from('hlib_records').insert([payload]);
    }
    if(r.error)throw r.error;
    audit(EDIT_ID?'UPDATE':'CREATE','hoarding record',EDIT_ID||payload.id,rec.lot);
    closeModal();toast('Saved '+rec.lot,'ok');
    await loadRecords();renderRecords();
  }catch(e){toast(e.message||e,'bad');}
  finally{unbusy(btn);}
}
async function deleteRecord(id){
  var r=byId(REC_ROWS,id);
  if(!confirm('Delete record '+((r&&r.lot)||id)+'? Uploaded files stay in storage.'))return;
  try{
    var res=await sb.from('hlib_records').delete().eq('id',id);
    if(res.error)throw res.error;
    audit('DELETE','hoarding record',id,(r&&r.lot)||'');
    toast('Deleted','ok');await loadRecords();renderRecords();
  }catch(e){toast(e.message||e,'bad');}
}

/* ===================== RATES VIEW ===================== */
function renderRates(){
  var body=RATES.map(function(r){
    return '<tr>'+
      '<td><input value="'+esc(r.mall)+'" onchange="updRate(\''+r.id+'\',\'mall\',this.value)" style="min-width:130px"></td>'+
      '<td><input value="'+esc(r.item)+'" onchange="updRate(\''+r.id+'\',\'item\',this.value)" style="min-width:160px"></td>'+
      '<td><select onchange="updRate(\''+r.id+'\',\'unit\',this.value)">'+RATE_UNITS.map(function(u){return '<option'+(u===r.unit?' selected':'')+'>'+u+'</option>';}).join('')+'</select></td>'+
      '<td><input type="number" step="0.01" value="'+r.rate+'" onchange="updRate(\''+r.id+'\',\'rate\',this.value)" style="max-width:120px"></td>'+
      '<td class="right"><button class="danger sm" onclick="delRate(\''+r.id+'\')">'+ico('trash-2')+'</button></td>'+
    '</tr>';
  }).join('')||'<tr><td colspan="5" class="muted" style="text-align:center;padding:20px">No rates yet. Add one below.</td></tr>';

  gel('v-rates').innerHTML=
    '<h2>Rates</h2>'+
    '<div class="card"><div class="hint" style="margin-bottom:8px">Mall = "ALL" applies to any mall without its own rate. "New Hoarding" (per m²) plus the door items drive the Est. value column on Records.</div>'+
      '<div style="overflow-x:auto"><table><thead><tr><th>Mall</th><th>Item</th><th>Unit</th><th>Rate (RM)</th><th></th></tr></thead>'+
      '<tbody>'+body+'</tbody></table></div></div>'+
    '<div class="card"><h3 style="margin-top:0">Add rate</h3><div class="row">'+
      '<div><label>Mall</label><input id="nr-mall" placeholder="ALL or mall name"></div>'+
      '<div><label>Item</label><input id="nr-item" placeholder="e.g. New Hoarding"></div>'+
      '<div><label>Unit</label><select id="nr-unit">'+RATE_UNITS.map(function(u){return '<option>'+u+'</option>';}).join('')+'</select></div>'+
      '<div><label>Rate (RM)</label><input id="nr-rate" type="number" step="0.01"></div>'+
      '<div style="flex:0 0 auto;align-self:flex-end"><button class="btn" onclick="addRate(this)">'+ico('plus')+'Add rate</button></div>'+
    '</div></div>';
  initHubSelects(gel('v-rates'));syncHubSelects(gel('v-rates'));
  if(window.lucide)window.lucide.createIcons();
}
async function updRate(id,f,v){
  var r=byId(RATES,id);if(!r)return;
  var patch={};
  if(f==='mall')patch.mall=v;
  else if(f==='item')patch.item=v;
  else if(f==='unit')patch.unit=v;
  else if(f==='rate')patch.rate_rm=parseFloat(v)||0;
  try{
    var res=await sb.from('hlib_rates').update(patch).eq('id',id);
    if(res.error)throw res.error;
    if(f==='rate')r.rate=parseFloat(v)||0;else r[f]=v;
    // rates changed -> refresh estimates
    REC_ROWS.forEach(function(x){x.estValue=estimateValue(x,RATES);});
  }catch(e){toast(e.message||e,'bad');}
}
async function addRate(btn){
  var mall=val('nr-mall')||'ALL', item=val('nr-item'), unit=val('nr-unit'), rate=parseFloat(val('nr-rate'));
  if(!item||isNaN(rate)){toast('Item and rate required','bad');return;}
  busy(btn);
  try{
    var payload={id:uid(),mall:mall,item:item,unit:unit,rate_rm:rate};
    var res=await sb.from('hlib_rates').insert([payload]);
    if(res.error)throw res.error;
    await loadRates();renderRates();toast('Rate added','ok');
  }catch(e){toast(e.message||e,'bad');}
  finally{unbusy(btn);}
}
async function delRate(id){
  if(!confirm('Delete this rate?'))return;
  try{
    var res=await sb.from('hlib_rates').delete().eq('id',id);
    if(res.error)throw res.error;
    await loadRates();renderRates();
  }catch(e){toast(e.message||e,'bad');}
}

/* ===================== EXPORT (SheetJS) ===================== */
function exportExcel(){
  var rows=sortedRecords();
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(rows.map(function(r){return {
    Lot:r.lot,Run:r.run,Mall:r.mall,Tenant:r.tenant,
    'Length (m)':r.lengthM,'Height (m)':r.heightM,'Area (m2)':r.areaM2,'Area (sqft)':r.areaM2?round2_(r.areaM2*10.7639):'',
    Panels:r.panels,'Door Type':r.doorType,'Door Qty':r.doorQty,'Door Size':r.doorSize,
    'Est Value (RM)':r.estValue!=null?round2_(r.estValue):'','Group Total (RM)':r.groupTotal!=null?round2_(r.groupTotal):'',
    'Drawing No':r.drawingNo,Date:r.date,Notes:r.notes,'Drive File ID':r.driveFileId,'File Name':r.fileName
  };})),'Records');
  XLSX.utils.book_append_sheet(wb,XLSX.utils.json_to_sheet(RATES.map(function(r){return {
    Mall:r.mall,Item:r.item,Unit:r.unit,'Rate (RM)':r.rate
  };})),'Rates');
  XLSX.writeFile(wb,'HG-Hoarding-Library-'+new Date().toISOString().slice(0,10)+'.xlsx');
}
